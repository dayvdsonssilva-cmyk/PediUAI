<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="only light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Cardápio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── FORÇA MODO CLARO ── */
    :root { color-scheme: only light; }
    @media (prefers-color-scheme: dark) { :root { color-scheme: only light; } }

    /* ── RESET ── */
    html { touch-action: pan-y; }
    body { touch-action: pan-y; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; background: #f0e9e0; color: #1a1a1a; max-width: 540px; margin: 0 auto; min-height: 100vh; position: relative; overflow-x: hidden; }

    /* ── VARIÁVEIS ── */
    :root { --red: #C0392B; --red2: #a93226; --bg: #f0e9e0; --card: #fff; --border: #ede8e0; --text: #1a1a1a; --muted: #888; color-scheme: only light; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #f0e9e0 !important; --card: #fff !important; --text: #1a1a1a !important; --muted: #888 !important; --border: #ede8e0 !important; }
      body { background: #f0e9e0 !important; color: #1a1a1a !important; }
    }

    /* ── HEADER ── */
    #main-header {
      position: relative; overflow: hidden; min-height: 200px;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 24px 20px 22px;
      background: var(--header-bg, linear-gradient(160deg,#1e0a02,#2e1208));
      transition: background 0.4s ease;
    }
    #header-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .header-info { position: relative; z-index: 2; }
    #logo-wrap {
      position: absolute; top: 14px; right: 14px; z-index: 3;
      width: 110px; height: 110px; border-radius: 20px; overflow: hidden;
      background: var(--logo-bg, rgba(255,255,255,0.12));
      border: 2.5px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    #logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    #logo-emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
    #loja-nome { font-size: 1.6rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.1; max-width: 65%; margin-bottom: 4px; }
    #loja-desc { font-size: 0.78rem; color: rgba(255,255,255,0.65); margin-bottom: 12px; }
    .loja-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .meta-item { font-size: 0.73rem; font-weight: 500; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 4px; }

    /* ── FRESQUINHO ── */
    #fresquinho-section { background: var(--card); padding: 14px 0 14px 16px; border-bottom: 1px solid var(--border); display: none; }
    #fresquinho-section.show { display: block; }
    .fresh-label { font-size: 0.72rem; font-weight: 700; color: var(--red); letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .fresh-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
    .stories-scroll { display: flex; gap: 12px; overflow-x: auto; padding-right: 16px; scrollbar-width: none; }
    .stories-scroll::-webkit-scrollbar { display: none; }
    .story-thumb { width: 88px; height: 120px; border-radius: 14px; overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; border: 2.5px solid var(--red); }
    .story-thumb img, .story-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .story-thumb video { background: #1a1a1a; }
    .story-thumb .video-thumb-img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover; }
    .story-timer { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 0.58rem; font-weight: 700; color: #fff; background: rgba(0,0,0,0.45); padding: 2px 0; }

    /* ── ABAS ── */
    .abas { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .aba-btn { flex: 1; padding: 13px 8px; font-family: 'Poppins',sans-serif; font-size: 0.78rem; font-weight: 700; color: var(--muted); background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.2s; }
    .aba-btn.ativa { color: var(--red); border-bottom-color: var(--red); }
    .promo-dot { display: inline-block; width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin-left: 4px; vertical-align: middle; }

    /* ── FILTROS ── */
    .filtros-wrap { background: var(--card); padding: 10px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 43px; z-index: 40; }
    .filtros-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .filtros-scroll::-webkit-scrollbar { display: none; }
    .filtro-pill { padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; border: 1.5px solid var(--border); background: var(--bg); color: #555; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
    .filtro-pill.ativo { background: var(--red); color: #fff; border-color: var(--red); }

    /* ── PRODUTOS ── */
    #tab-cardapio, #tab-promo, #tab-pedidos { display: none; }
    #tab-cardapio.show, #tab-promo.show, #tab-pedidos.show { display: block; }
    .produtos-wrap { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .produto-card { background: var(--card); border-radius: 16px; display: flex; gap: 0; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: transform 0.12s; }
    .produto-card:active { transform: scale(0.985); }
    .produto-img-wrap { width: 108px; flex-shrink: 0; position: relative; background: #f5f0eb; }
    .produto-img-wrap img { width: 100%; height: 100%; object-fit: cover; min-height: 108px; }
    .produto-emoji-bg { width: 100%; min-height: 108px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; }
    .promo-badge { position: absolute; top: 6px; left: 6px; background: var(--red); color: #fff; font-size: 0.58rem; font-weight: 800; padding: 2px 7px; border-radius: 50px; }
    .produto-body { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; justify-content: space-between; min-height: 108px; }
    .produto-cat { font-size: 0.6rem; font-weight: 700; color: var(--red); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
    .produto-nome { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.2; }
    .produto-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.4; flex: 1; margin-bottom: 8px; }
    .produto-footer { display: flex; align-items: center; justify-content: space-between; }
    .produto-preco-orig { font-size: 0.68rem; color: #aaa; text-decoration: line-through; }
    .produto-preco { font-size: 1rem; font-weight: 800; color: var(--red); }
    .btn-ver { font-size: 0.72rem; font-weight: 700; color: #555; background: #f0ebe4; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    .btn-mais { width: 34px; height: 34px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(192,57,43,0.35); transition: transform 0.1s; }
    .btn-mais:active { transform: scale(0.9); }
    .empty-msg { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-msg span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── MODAL PRODUTO ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal-sheet { background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-img { width: 100%; height: 220px; object-fit: cover; }
    .modal-emoji { width: 100%; height: 160px; background: #f5f0eb; display: flex; align-items: center; justify-content: center; font-size: 5rem; }
    .modal-body { padding: 20px; }
    .modal-cat { font-size: 0.65rem; font-weight: 700; color: var(--red); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .modal-nome { font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .modal-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .modal-preco { font-size: 1.4rem; font-weight: 800; color: var(--red); margin-bottom: 20px; }
    .qtd-ctrl { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .qtd-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--red); background: none; color: var(--red); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .qtd-num { font-size: 1.1rem; font-weight: 800; min-width: 28px; text-align: center; }
    .btn-add-cart { width: 100%; padding: 15px; background: var(--red); color: #fff; border: none; border-radius: 14px; font-family: 'Poppins',sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ── FAB SACOLA ── */
    #fab { position: fixed; bottom: 24px; right: 20px; z-index: 100; background: var(--red); color: #fff; border: none; border-radius: 50px; padding: 14px 22px; font-family: 'Poppins',sans-serif; font-size: 0.9rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 24px rgba(192,57,43,0.45); display: none; align-items: center; gap: 10px; transition: transform 0.15s; }
    #fab:active { transform: scale(0.95); }
    #fab-count { background: #fff; color: var(--red); border-radius: 50%; width: 22px; height: 22px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: 800; }

    /* ── CARRINHO ── */
    #carr-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    #carr-bg.open { opacity: 1; pointer-events: all; }
    #carr-sheet { background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.25s ease; }
    .carr-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .carr-title { font-size: 1.1rem; font-weight: 800; }
    .carr-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); }
    .carr-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .carr-item-emoji { font-size: 1.8rem; }
    .carr-item-info { flex: 1; }
    .carr-item-nome { font-size: 0.9rem; font-weight: 700; }
    .carr-item-preco { font-size: 0.8rem; color: var(--muted); }
    .carr-item-qtd { display: flex; align-items: center; gap: 10px; }
    .carr-qtd-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--red); background: none; color: var(--red); font-size: 1rem; cursor: pointer; }
    .carr-qtd-num { font-size: 0.9rem; font-weight: 700; min-width: 20px; text-align: center; }
    .carr-total-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; font-weight: 800; font-size: 1rem; }
    .carr-total-val { color: var(--red); font-size: 1.2rem; }
    .carr-form { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
    .carr-form label { font-size: 0.78rem; font-weight: 700; color: #555; margin-bottom: 4px; display: block; }
    .carr-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Poppins',sans-serif; font-size: 0.88rem; background: var(--bg); outline: none; }
    .carr-input:focus { border-color: var(--red); }
    .carr-opts { display: flex; gap: 10px; }
    .carr-opt-btn { flex: 1; padding: 11px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Poppins',sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: none; color: #555; transition: all 0.15s; }
    .carr-opt-btn.ativo { border-color: var(--red); color: var(--red); background: rgba(192,57,43,0.06); }
    #campos-entrega, #campos-retirada { display: none; }
    #campos-entrega.show, #campos-retirada.show { display: block; }
    .btn-finalizar { width: 100%; padding: 15px; background: var(--red); color: #fff; border: none; border-radius: 14px; font-family: 'Poppins',sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 4px; }

    /* ── MEUS PEDIDOS ── */
    .pedidos-lista { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .ped-card { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .ped-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ped-id { font-size: 1rem; font-weight: 800; }
    .ped-status-badge { font-size: 0.68rem; font-weight: 800; padding: 4px 12px; border-radius: 50px; }
    .s-novo     { background: #fef3c7; color: #92400e; }
    .s-preparo  { background: #fde8db; color: var(--red); }
    .s-pronto   { background: #d1fae5; color: #065f46; }
    .s-recusado { background: #fee2e2; color: #dc2626; }
    .ped-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
    .ped-itens { font-size: 0.78rem; color: #555; margin-bottom: 8px; }
    .ped-total { font-size: 1rem; font-weight: 800; color: var(--red); }
    .ped-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-ped-det { flex: 1; padding: 9px; border: 1.5px solid var(--border); border-radius: 10px; background: none; font-family: 'Poppins',sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; color: #555; }
    .btn-ped-wpp { flex: 1; padding: 9px; border: none; border-radius: 10px; background: #25d366; font-family: 'Poppins',sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .ped-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .ped-empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── NOTINHA DO PEDIDO ── */
    #modal-notinha-bg { position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s; }
    #modal-notinha-bg.open { opacity:1;pointer-events:all; }
    #modal-notinha-sheet { background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp 0.25s ease;padding:24px 20px 36px; }
    .notinha-logo { font-size:1rem;font-weight:800;letter-spacing:0.05em;text-align:center;margin-bottom:2px; }
    .notinha-logo span { color:var(--red); }
    .notinha-loja { font-size:0.72rem;color:var(--muted);text-align:center;margin-bottom:16px; }
    .notinha-divider { border:none;border-top:1px dashed #ddd;margin:12px 0; }
    .notinha-row { display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;padding:3px 0; }
    .notinha-row.bold { font-weight:800;font-size:0.95rem; }
    .notinha-item-row { display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0; }
    .notinha-item-qtd { color:var(--red);font-weight:700;min-width:28px; }
    .notinha-total-row { display:flex;justify-content:space-between;font-size:1.05rem;font-weight:800;padding:8px 0; }
    .notinha-total-row span:last-child { color:var(--red); }
    .notinha-status { text-align:center;margin:14px 0 4px;font-size:0.82rem;font-weight:700;padding:8px 16px;border-radius:50px;display:inline-block; }
    .notinha-footer { text-align:center;font-size:0.65rem;color:#ccc;margin-top:16px; }
    .notinha-close { width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:14px;font-family:'Poppins',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:16px; }

    /* ── NOTIF TOAST ── */
    .notif-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 22px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; z-index: 9000; box-shadow: 0 8px 24px rgba(0,0,0,0.25); animation: toastIn 0.3s ease; pointer-events: none; white-space: nowrap; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* ── STORY VIEWER ── */
    #story-viewer {
      position:fixed;top:0;left:0;width:100vw;height:100vh;
      background:#000;z-index:9999;display:none;overflow:hidden;
    }
    #story-viewer.open { display:flex;flex-direction:column; }
    #story-bg {
      position:absolute;inset:0;
      background-size:cover;background-position:center;background-repeat:no-repeat;
    }
    #story-vid-el {
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;display:none;
    }
    #story-bars {
      position:relative;z-index:20;
      display:flex;gap:3px;padding:12px 12px 0;
    }
    .story-bar-bg   { flex:1;height:3px;background:rgba(255,255,255,0.4);border-radius:3px;overflow:hidden; }
    .story-bar-fill { height:100%;background:#fff;border-radius:3px;width:0%; }
    #story-header {
      position:relative;z-index:20;
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px;
    }
    #story-loja-nome { color:#fff;font-size:0.85rem;font-weight:700;text-shadow:0 1px 6px #000; }
    .story-close-btn {
      background:rgba(0,0,0,0.5);border:none;color:#fff;
      font-size:1.1rem;cursor:pointer;width:34px;height:34px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
    }
    #story-touches {
      position:absolute;inset:0;z-index:10;display:flex;
    }
    #story-prev { flex:0 0 35%;height:100%;cursor:pointer; }
    #story-next { flex:1;height:100%;cursor:pointer; }

    /* ── LOJA FECHADA ── */
    #banner-fechada { display: none; background: rgba(0,0,0,0.8); color: #fff; text-align: center; padding: 16px; font-size: 0.9rem; font-weight: 700; }
    #banner-fechada.show { display: block; }


    /* ── RESPONSIVO PC ── */
    @media (min-width: 540px) {
      body { box-shadow: 0 0 60px rgba(0,0,0,0.12); }
      #fab { right: calc(50% - 270px + 20px); }
  
      #carr-bg, .modal-bg { background: rgba(0,0,0,0.6); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="main-header">
  <div id="header-overlay"></div>
  <div id="logo-wrap"><div id="logo-emoji">🏪</div></div>
  <div class="header-info">
    <div id="loja-nome">Carregando...</div>
    <div id="loja-desc">Cardápio digital</div>
    <div class="loja-meta">
      <div class="meta-item">⊙ <span id="meta-tempo">--</span></div>
      <div class="meta-item" id="meta-entrega">🛵 Entrega disponível</div>
    </div>
  </div>
</div>

<!-- BANNER FECHADA -->
<div id="banner-fechada">🔒 Loja fechada no momento. Voltamos em breve!</div>

<!-- FRESQUINHO -->
<div id="fresquinho-section">
  <div class="fresh-label" style="padding-left:16px"><div class="fresh-dot"></div> FRESQUINHO</div>
  <div class="stories-scroll" id="stories-list"></div>
</div>

<!-- ABAS -->
<div class="abas">
  <button class="aba-btn ativa" onclick="irAba('cardapio',this)">CARDÁPIO</button>
  <button class="aba-btn" onclick="irAba('promo',this)">PROMOÇÃO<span class="promo-dot" id="promo-dot" style="display:none"></span></button>
  <button class="aba-btn" onclick="irAba('pedidos',this)">MEUS PEDIDOS</button>
</div>

<!-- ABA CARDÁPIO -->
<div id="tab-cardapio" class="show">
  <div class="filtros-wrap"><div class="filtros-scroll" id="filtros-lista"></div></div>
  <div class="produtos-wrap" id="lista-produtos"><div class="empty-msg"><span>⏳</span>Carregando...</div></div>
</div>

function toRgb(cor) {
  if (!cor) return null;
  if (cor.startsWith('#')) {
    const r = parseInt(cor.slice(1,3),16), g = parseInt(cor.slice(3,5),16), b = parseInt(cor.slice(5,7),16);
    return isNaN(r) ? null : {r,g,b};
  }
  const m = cor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  return m ? {r:+m[1],g:+m[2],b:+m[3]} : null;
}
function normalizeHex(cor) {
  if (!cor) return '#C0392B';
  if (cor.startsWith('#')) return cor;
  const m = cor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  return m ? '#' + [m[1],m[2],m[3]].map(n => (+n).toString(16).padStart(2,'0')).join('') : '#C0392B';
}
function darken(hex, amt) {
  const rgb = toRgb(hex); if (!rgb) return hex;
  return `rgb(${Math.max(0,rgb.r-amt)},${Math.max(0,rgb.g-amt*0.8)},${Math.max(0,rgb.b-amt*0.6)})`;
}
function mostrarToast(msg, cor) {
  const t = document.createElement('div');
  t.className = 'notif-toast';
  t.textContent = msg;
  t.style.background = cor || '#1a1a1a';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function mascaraWhats(input) {
  let v = input.value.replace(/\D/g,'').slice(0,11);
  if (v.length <= 10) v = v.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2');
  else                v = v.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
  input.value = v;
}

// ── FRESQUINHO ────────────────────────────────────────────────────────────────
async function carregarFresquinho() {
  if (!estab) return;
  const { data } = await supa.from('fresquinhos').select('*')
    .eq('estabelecimento_id', estab.id)
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false });
  const sec = $('fresquinho-section');
  const lst = $('stories-list');
  if (!data?.length) { if (sec) sec.classList.remove('show'); return; }
  if (sec) sec.classList.add('show');
  if (!lst) return;
  lst.innerHTML = data.map(f => {
    const rest = new Date(f.expires_at) - new Date();
    const h = Math.floor(rest/3600000), mn = Math.floor((rest%3600000)/60000);
    const thumbContent = f.tipo === 'video'
      ? `<video src="${f.url}" muted playsinline loop preload="metadata" style="width:100%;height:100%;object-fit:cover;background:#000"></video>`
      : `<img src="${f.url}" alt="" style="width:100%;height:100%;object-fit:cover">`;
    return `<div class="story-thumb" data-url="${f.url}" data-tipo="${f.tipo||'foto'}" onclick="abrirStory('${f.url}','${f.tipo||'foto'}')">
      ${thumbContent}
      <div class="story-timer">⏱ ${h>0?h+'h ':''} ${mn}min</div>
    </div>`;
  }).join('');
}

// ── STORY VIEWER ESTILO INSTAGRAM ────────────────────────────────────────────
let _stories      = [];  // [{url, tipo}]
let _storyIdx     = 0;
let _storyTimer   = null;
const STORY_DUR   = 5000; // ms por story

window.abrirStory = function(url, tipo) {
  // Monta lista a partir dos data attributes dos thumbnails
  const thumbs = document.querySelectorAll('.story-thumb[data-url]');
  _stories = Array.from(thumbs).map(t => ({
    url:  t.getAttribute('data-url'),
    tipo: t.getAttribute('data-tipo') || 'foto',
  }));
  // Se não achou nenhum com data-url, cria com o que foi clicado
  if (!_stories.length) _stories = [{ url, tipo }];
  _storyIdx = _stories.findIndex(s => s.url === url);
  if (_storyIdx < 0) _storyIdx = 0;
  $('story-viewer').classList.add('open');
  $('story-loja-nome').textContent = estab?.nome || '';
  renderStory();
};

function renderStory() {
  clearTimeout(_storyTimer);
  const s = _stories[_storyIdx];
  if (!s) { fecharStory(); return; }

  const bg  = $('story-bg');
  const vid = $('story-vid-el');

  if (s.tipo === 'video') {
    if (bg)  { bg.style.backgroundImage = 'none'; bg.style.display = 'none'; }
    if (vid) { vid.style.display = 'block'; vid.src = s.url; vid.load(); vid.play().catch(()=>{}); }
  } else {
    if (vid) { vid.pause(); vid.src = ''; vid.style.display = 'none'; }
    if (bg)  { bg.style.display = 'block'; bg.style.backgroundImage = `url("${s.url}")`; }
  }

  // Barras de progresso
  const bars = $('story-bars');
  bars.innerHTML = _stories.map((_, i) =>
    `<div class="story-bar-bg"><div class="story-bar-fill" id="sbar-${i}"></div></div>`
  ).join('');
  for (let i = 0; i < _storyIdx; i++) {
    const b = $(`sbar-${i}`); if (b) b.style.width = '100%';
  }
  const barAtual = $(`sbar-${_storyIdx}`);
  if (barAtual) {
    barAtual.style.transition = 'none';
    barAtual.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      barAtual.style.transition = `width ${STORY_DUR}ms linear`;
      barAtual.style.width = '100%';
    }));
  }
  if (s.tipo === 'video') {
    const v = $('story-vid-el');
    if (v) {
      const onEnd = () => { v.removeEventListener('ended', onEnd); storyProximo(); };
      v.addEventListener('ended', onEnd);
      _storyTimer = setTimeout(() => storyProximo(), 31000);
    } else { _storyTimer = setTimeout(() => storyProximo(), STORY_DUR); }
  } else {
    _storyTimer = setTimeout(() => storyProximo(), STORY_DUR);
  }
}

window.storyProximo = function() {
  if (_storyIdx < _stories.length - 1) { _storyIdx++; renderStory(); }
  else fecharStory();
};

window.storyAnterior = function() {
  if (_storyIdx > 0) { _storyIdx--; renderStory(); }
};

window.fecharStory = function() {
  clearTimeout(_storyTimer);
  $('story-viewer').classList.remove('open');
  const v = $('story-vid-el'); if (v) { v.pause(); v.src = ''; }
  const b = $('story-bg'); if (b) b.style.backgroundImage = 'none';
};

// ── PRODUTOS ──────────────────────────────────────────────────────────────────
async function carregarProdutos() {
  if (!estab) return;
  const { data } = await supa.from('produtos').select('*')
    .eq('estabelecimento_id', estab.id)
    .eq('disponivel', true)
    .order('created_at', { ascending: false });
  produtos = data || [];
  renderProdutos('Todos');
  renderFiltros();
  renderPromos();
}

function renderFiltros() {
  const el = $('filtros-lista'); if (!el) return;
  const cats = ['Todos', ...new Set(produtos.map(p => p.categoria).filter(Boolean))];
  el.innerHTML = cats.map(c =>
    `<button class="filtro-pill ${c==='Todos'?'ativo':''}" onclick="filtrar('${c}',this)">${c}</button>`
  ).join('');
}

function filtrar(cat, btn) {
  document.querySelectorAll('.filtro-pill').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderProdutos(cat);
}
window.filtrar = filtrar;

function renderProdutos(cat) {
  const lista = $('lista-produtos'); if (!lista) return;
  const filtrados = cat === 'Todos' ? produtos : produtos.filter(p => p.categoria === cat);
  if (!filtrados.length) { lista.innerHTML = '<div class="empty-msg"><span>🍽️</span>Nenhum item nesta categoria.</div>'; return; }
  filtrados.forEach(p => _prodMap.set(p.id, p));
  lista.innerHTML = filtrados.map(p => cardProdutoHTML(p)).join('');
}

function renderPromos() {
  const lista = $('lista-promo'); if (!lista) return;
  const promos = produtos.filter(p => p.promocao);
  const dot = $('promo-dot'); if (dot) dot.style.display = promos.length ? '' : 'none';
  if (!promos.length) { lista.innerHTML = '<div class="empty-msg"><span>🔥</span>Sem promoções no momento.</div>'; return; }
  promos.forEach(p => _prodMap.set(p.id, p));
  lista.innerHTML = promos.map(p => cardProdutoHTML(p)).join('');
}

function cardProdutoHTML(p) {
  return `<div class="produto-card">
    <div class="produto-img-wrap">
      ${p.foto_url
        ? `<img src="${p.foto_url}" alt="${p.nome}" loading="lazy">`
        : `<div class="produto-emoji-bg">${p.emoji||'🍔'}</div>`}

    </div>
    <div class="produto-body">
      <div>
        <div class="produto-cat">${p.categoria||''}</div>
        ${p.promocao ? `<span style="display:inline-block;background:#fff3f0;color:var(--red);font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:50px;border:1px solid rgba(192,57,43,0.15);margin-bottom:3px">🔥 PROMOÇÃO</span>` : ''}
      <div class="produto-nome">${p.nome}</div>
        <div class="produto-desc">${(p.descricao||'').slice(0,80)}${p.descricao?.length>80?'...':''}</div>
      </div>
      <div class="produto-footer">
        <div>
          ${p.promocao && p.preco_original ? `<div class="produto-preco-orig">${fmt(p.preco_original)}</div>` : ''}
          <div class="produto-preco">${fmt(p.preco)}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-ver" onclick="abrirProdutoId('${p.id}')">Ver mais</button>
          <button class="btn-mais" onclick="adicionarDiretoId('${p.id}')">+</button>
        </div>
      </div>
    </div>
  </div>`;
}

window.adicionarDiretoId = function(id) { const p = _prodMap.get(id); if(p) adicionarDireto(p); };

window.abrirProduto = function(p) {
  prodAtual = p; qtdAtual = 1; $('modal-qtd').textContent = 1;
  const media = $('modal-prod-media');
  const fotos  = (p.fotos_urls && p.fotos_urls.length) ? p.fotos_urls : (p.foto_url ? [p.foto_url] : []);
  if (fotos.length) {
    let fIdx = 0;
    const dots = () => fotos.map((_,i) =>
      `<div style="width:7px;height:7px;border-radius:50%;background:${i===fIdx?'#fff':'rgba(255,255,255,0.4)'};transition:background 0.2s"></div>`
    ).join('');
    const render = () => {
      media.innerHTML = `
        <div style="position:relative;background:#000">
          <img class="modal-img" src="${fotos[fIdx]}" alt="${p.nome}" style="cursor:zoom-in;display:block"
               onclick="abrirImagemFull('${fotos[fIdx]}', fotos, fIdx)">
          ${fotos.length > 1 ? `
            <button onclick="_modalFoto(-1)" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center">‹</button>
            <button onclick="_modalFoto(1)"  style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center">›</button>
            <div id="modal-dots" style="position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px">${dots()}</div>` : ''}
        </div>`;
    };
    window._modalFoto = function(dir) {
      fIdx = (fIdx + dir + fotos.length) % fotos.length;
      const img = media.querySelector('img'); if (img) img.src = fotos[fIdx];
      const d = $('modal-dots'); if (d) d.innerHTML = dots();
    };
    render();
  } else {
    media.innerHTML = `<div class="modal-emoji">${p.emoji||'🍔'}</div>`;
  }
  $('modal-cat').textContent  = p.categoria || '';
  $('modal-nome').textContent = p.nome;
  $('modal-desc').textContent = p.descricao || '';
  $('modal-preco').textContent = fmt(p.preco);
  $('modal-prod').classList.add('open');
};
window.fecharModal = function() { $('modal-prod').classList.remove('open'); prodAtual = null; };

window.abrirImagemFull = function(url, fotosArr, startIdx) {
  const m = $('modal-img-full'); if (!m) return;
  const img = $('modal-img-full-src');
  const ctrl = $('modal-full-controls');
  const dots = $('modal-full-dots');
  const prev = $('modal-full-prev');
  const next = $('modal-full-next');

  const fotos = fotosArr || [url];
  let idx = startIdx !== undefined ? startIdx : fotos.indexOf(url);
  if (idx < 0) idx = 0;

  const render = () => {
    img.src = fotos[idx];
    if (dots) dots.innerHTML = fotos.map((_,i) =>
      `<div style="width:7px;height:7px;border-radius:50%;background:${i===idx?'#fff':'rgba(255,255,255,0.35)'}"></div>`
    ).join('');
  };

  if (fotos.length > 1) {
    if (ctrl) ctrl.style.display = 'flex';
    if (prev) prev.onclick = () => { idx = (idx - 1 + fotos.length) % fotos.length; render(); };
    if (next) next.onclick = () => { idx = (idx + 1) % fotos.length; render(); };
  } else {
    if (ctrl) ctrl.style.display = 'none';
  }

  render();
  m.style.display = 'flex';
};
window.mudaQtd = function(d) {
  qtdAtual = Math.max(1, qtdAtual + d);
  $('modal-qtd').textContent = qtdAtual;
};
window.adicionarAoCarrinho = function() {
  if (!prodAtual) return;
  adicionarItem(prodAtual, qtdAtual);
  fecharModal();
  mostrarToast(`${prodAtual.nome} adicionado! 🛒`, '#1a1a1a');
};
window.adicionarDireto = function(p) {
  adicionarItem(p, 1);
  mostrarToast(`${p.nome} adicionado! 🛒`, '#1a1a1a');
};

// ── CARRINHO ──────────────────────────────────────────────────────────────────
function adicionarItem(p, qtd) {
  const idx = carrinho.findIndex(c => c.id === p.id);
  if (idx >= 0) carrinho[idx].qtd += qtd;
  else carrinho.push({ ...p, qtd });
  atualizarFab();
}

function atualizarFab() {
  const total = carrinho.reduce((s, c) => s + c.qtd, 0);
  const fab = $('fab');
  if (!fab) return;
  if (total > 0 && estab?.aberto !== false) { fab.style.display = 'flex'; $('fab-count').textContent = total; }
  else fab.style.display = 'none';
}

window.abrirCarrinho = function() {
  renderCarrinho();
  $('carr-bg').classList.add('open');
};
window.fecharCarrinho = function() { $('carr-bg').classList.remove('open'); };

function renderCarrinho() {
  const el = $('carr-itens'); if (!el) return;
  if (!carrinho.length) { el.innerHTML = '<div class="empty-msg" style="padding:30px 20px"><span>🛒</span>Sacola vazia.</div>'; }
  else {
    el.innerHTML = carrinho.map((c, i) => `
      <div class="carr-item">
        <div class="carr-item-emoji">${c.emoji || '🍔'}</div>
        <div class="carr-item-info">
          <div class="carr-item-nome">${c.nome}</div>
          <div class="carr-item-preco">${fmt(c.preco)} cada</div>
        </div>
        <div class="carr-item-qtd">
          <button class="carr-qtd-btn" onclick="mudarQtdCarr(${i},-1)">−</button>
          <div class="carr-qtd-num">${c.qtd}</div>
          <button class="carr-qtd-btn" onclick="mudarQtdCarr(${i},1)">+</button>
        </div>
      </div>`).join('');
  }
  const total = carrinho.reduce((s, c) => s + c.preco * c.qtd, 0);
  $('carr-total').textContent = fmt(total);
}

window.mudarQtdCarr = function(i, d) {
  carrinho[i].qtd += d;
  if (carrinho[i].qtd <= 0) carrinho.splice(i, 1);
  atualizarFab(); renderCarrinho();
};

window.selecionarOpcao = function(op) {
  opcaoEntrega = op;
  $('btn-entrega').classList.toggle('ativo', op === 'entrega');
  $('btn-retirada').classList.toggle('ativo', op === 'retirada');
  $('campos-entrega').classList.toggle('show', op === 'entrega');
  $('campos-retirada').classList.toggle('show', op === 'retirada');
};

// ── FINALIZAR PEDIDO ──────────────────────────────────────────────────────────
window.finalizarPedido = async function() {
  if (estab?.aberto === false) return mostrarToast('Loja fechada no momento.', '#333');
  if (!carrinho.length) return mostrarToast('Sua sacola está vazia.', '#333');
  const nome  = $('cli-nome')?.value.trim();
  const whats = $('cli-whats')?.value.replace(/\D/g,'');
  const endereco = opcaoEntrega === 'entrega' ? $('cli-endereco')?.value.trim() : 'Retirada no local';
  if (!nome) return mostrarToast('Digite seu nome.', '#c0392b');
  if (!whats || whats.length < 10) return mostrarToast('Digite seu WhatsApp.', '#c0392b');
  if (opcaoEntrega === 'entrega' && !endereco) return mostrarToast('Digite o endereço de entrega.', '#c0392b');

  const btn = $('btn-finalizar');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

  try {
    const itens = carrinho.map(c => ({ id: c.id, nome: c.nome, preco: c.preco, qtd: c.qtd, emoji: c.emoji }));
    const total = carrinho.reduce((s, c) => s + c.preco * c.qtd, 0);

    const { error } = await supa.from('pedidos').insert({
      estabelecimento_id: estab.id, cliente_nome: nome,
      cliente_whats: whats, observacao: $('cli-obs')?.value.trim() || '',
      itens, total, status: 'novo', endereco,
    });
    if (error) throw error;

    // Busca ID real
    const { data: pedNovo } = await supa.from('pedidos')
      .select('id,status,itens,total,endereco')
      .eq('estabelecimento_id', estab.id)
      .eq('cliente_whats', whats)
      .eq('status', 'novo')
      .order('created_at', { ascending: false })
      .limit(1).maybeSingle();

    const pedId = pedNovo?.id || ('local_' + Date.now());

    // Salva no localStorage
    const peds = JSON.parse(localStorage.getItem('pw_peds_' + slug) || '[]');
    peds.unshift({ id: pedId, itens, total, status: 'novo', endereco, cliente_whats: whats });
    localStorage.setItem('pw_peds_' + slug, JSON.stringify(peds.slice(0, 20)));

    // Inicia polling
    pollingWhats = whats;
    pollingEstabId = estab.id;
    statusAnterior[pedId] = 'novo';
    if (!pollingId) pollingId = setInterval(rodarPolling, 4000);

    carrinho = []; atualizarFab(); fecharCarrinho();
    renderPedidosCliente();
    mostrarToast('Pedido enviado! Aguardando confirmação ✅', '#16a085');
    irAba('pedidos', document.querySelectorAll('.aba-btn')[2]);
  } catch (e) {
    mostrarToast('Erro ao enviar: ' + (e.message || 'Tente novamente.'), '#c0392b');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Mandar o pedido! 🚀'; }
  }
};

// ── MEUS PEDIDOS (cliente) ────────────────────────────────────────────────────
function renderPedidosCliente() {
  const lista = $('lista-pedidos'); if (!lista) return;
  const peds  = JSON.parse(localStorage.getItem('pw_peds_' + slug) || '[]');
  if (!peds.length) { lista.innerHTML = '<div class="ped-empty"><span>📋</span>Nenhum pedido ainda.<br><small>Faça seu primeiro pedido!</small></div>'; return; }

  lista.innerHTML = peds.map(p => {
    const isEnt = p.endereco && p.endereco !== 'Retirada no local';
    const statusMap = {
      novo:     { cls:'s-novo',     lbl:'⏳ Aguardando',            desc:'Aguardando confirmação da loja.' },
      preparo:  { cls:'s-preparo',  lbl:'🔥 Aceito — preparando',  desc:'Aceito! Sendo preparado com carinho.' },
      pronto:   { cls:'s-pronto',   lbl: isEnt ? '🛵 Saiu para entrega!' : '✅ Pronto para retirada!', desc: isEnt ? 'Seu pedido está a caminho!' : 'Pode vir buscar!' },
      recusado: { cls:'s-recusado', lbl:'❌ Não confirmado',        desc:'A loja não pôde atender este pedido.' },
    };
    const st = statusMap[p.status] || statusMap.novo;
    const itensStr = Array.isArray(p.itens) ? p.itens.map(i=>`${i.qtd}x ${i.nome}`).join(', ') : '';
    const pedId4 = p.id && !p.id.startsWith('local_') ? p.id.slice(-4).toUpperCase() : '----';
    return `<div class="ped-card">
      <div class="ped-top">
        <div class="ped-id">#${pedId4}</div>
        <span class="ped-status-badge ${st.cls}">${st.lbl}</span>
      </div>
      <div class="ped-desc">${st.desc}</div>
      <div class="ped-itens">${itensStr}</div>
      <div class="ped-total">${fmt(p.total)}</div>
      <div class="ped-actions">
        <button class="btn-ped-det" onclick="verDetalhesPedido(${JSON.stringify(p).replace(/"/g,'&quot;')})">Ver detalhes</button>
        ${estab?.whatsapp ? `<a class="btn-ped-wpp" href="https://wa.me/55${estab.whatsapp.replace(/\D/g,'')}?text=Olá!%20Meu%20pedido%20%23${pedId4}" target="_blank">💬 Falar</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

window.verDetalhesPedido = function(p) {
  const statusMap = {
    novo:     { cls:'s-novo',    lbl:'⏳ Aguardando confirmação' },
    preparo:  { cls:'s-preparo', lbl:'🔥 Aceito — preparando'   },
    pronto:   { cls:'s-pronto',  lbl: (p.endereco && p.endereco !== 'Retirada no local') ? '🛵 Saiu para entrega!' : '✅ Pronto para retirada!' },
    recusado: { cls:'s-recusado',lbl:'❌ Não confirmado' },
  };
  const st    = statusMap[p.status] || statusMap.novo;
  const itens = Array.isArray(p.itens) ? p.itens : [];
  const pedId = p.id && !p.id.startsWith('local_') ? p.id.slice(-4).toUpperCase() : '----';

  const el = $('notinha-conteudo'); if (!el) return;
  const lojaEl = $('notinha-loja-nome');
  if (lojaEl) lojaEl.textContent = estab?.nome || '';

  el.innerHTML = `
    <div class="notinha-row"><span>Pedido</span><strong>#${pedId}</strong></div>
    <div class="notinha-row"><span>Entrega</span><span>${p.endereco || 'Retirada no local'}</span></div>
    <div style="text-align:center;margin:10px 0">
      <span class="ped-status-badge ${st.cls}" style="display:inline-block">${st.lbl}</span>
    </div>
    <hr class="notinha-divider">
    ${itens.map(i => `
      <div class="notinha-item-row">
        <span><span class="notinha-item-qtd">${i.qtd}x</span> ${i.nome}</span>
        <span>${fmt(i.preco * i.qtd)}</span>
      </div>`).join('')}
    <hr class="notinha-divider">
    <div class="notinha-total-row"><span>Total</span><span>${fmt(p.total)}</span></div>`;

  $('modal-notinha-bg').classList.add('open');
};

window.fecharNotinha = function() { $('modal-notinha-bg').classList.remove('open'); };

// ── POLLING DE STATUS ─────────────────────────────────────────────────────────
async function rodarPolling() {
  if (!pollingWhats || !pollingEstabId) return;
  try {
    const { data } = await supa.from('pedidos')
      .select('id,status,endereco,itens,total')
      .eq('estabelecimento_id', pollingEstabId)
      .eq('cliente_whats', pollingWhats)
      .order('created_at', { ascending: false })
      .limit(10);
    if (!data) return;

    const peds = JSON.parse(localStorage.getItem('pw_peds_' + slug) || '[]');
    let mudou = false;

    data.forEach(pedDb => {
      let local = peds.find(x => x.id === pedDb.id);
      if (!local) {
        const semId = peds.find(x => x.id?.startsWith('local_'));
        if (semId) { semId.id = pedDb.id; local = semId; mudou = true; }
        else { peds.unshift({ id:pedDb.id, itens:pedDb.itens||[], total:pedDb.total||0, status:pedDb.status, endereco:pedDb.endereco, cliente_whats:pollingWhats }); mudou = true; }
      }
      if (!local) return;
      if (local.id !== pedDb.id) { local.id = pedDb.id; mudou = true; }
      const ant = statusAnterior[pedDb.id];
      if (ant !== undefined && ant !== pedDb.status) {
        local.status = pedDb.status; mudou = true;
        const isEnt = pedDb.endereco && pedDb.endereco !== 'Retirada no local';
        if (pedDb.status === 'preparo') mostrarToast('🔥 Pedido aceito! Sendo preparado.', '#e05510');
        if (pedDb.status === 'pronto')  mostrarToast(isEnt ? '🛵 Saiu para entrega!' : '✅ Pronto para retirada!', '#16a085');
        if (pedDb.status === 'recusado') mostrarToast('❌ Pedido não confirmado.', '#dc2626');
      }
      statusAnterior[pedDb.id] = pedDb.status;
      if (!ant) local.status = pedDb.status;
    });

    if (mudou) { localStorage.setItem('pw_peds_' + slug, JSON.stringify(peds)); renderPedidosCliente(); }
  } catch(e) { console.log('Polling:', e); }
}

// ── ABAS ──────────────────────────────────────────────────────────────────────
window.irAba = function(aba, btn) {
  document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('ativa'));
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('show'));
  if (btn) btn.classList.add('ativa');
  const el = $('tab-' + aba); if (el) el.classList.add('show');
  if (aba === 'pedidos') renderPedidosCliente();
};

// ── PAGE VISIBILITY ───────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    rodarPolling();
    // Recarrega dados do estab
    if (estab) {
      supa.from('estabelecimentos').select('*').eq('slug', slug).maybeSingle()
        .then(r => { if (r.data) aplicarEstab(r.data); });
    }
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: est } = await supa.from('estabelecimentos').select('*').eq('slug', slug).maybeSingle();
  if (!est) {
    $('loja-nome').textContent = 'LOJA NÃO ENCONTRADA';
    $('lista-produtos').innerHTML = '<div class="empty-msg"><span>😕</span>Esse cardápio não existe.</div>';
    return;
  }
  aplicarEstab(est);
  await Promise.all([carregarProdutos(), carregarFresquinho()]);

  // Polling estab a cada 10s
  setInterval(() => {
    supa.from('estabelecimentos').select('*').eq('slug', slug).maybeSingle()
      .then(r => { if (r.data) aplicarEstab(r.data); });
  }, 10000);

  // Recupera whats de pedido anterior para polling automático
  const pLocal = JSON.parse(localStorage.getItem('pw_peds_' + slug) || '[]');
  if (pLocal.length && pLocal[0].cliente_whats) {
    pollingWhats    = pLocal[0].cliente_whats;
    pollingEstabId  = est.id;
    pLocal.forEach(p => { statusAnterior[p.id] = p.status; });
    pollingId = setInterval(rodarPolling, 4000);
  }

  renderPedidosCliente();

}

init();
</script>
