<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PEDIWAY — Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E05A3A;--red-d:#C44828;
  --cream:#FFFDF9;--dark:#1A0A08;--gray:#6B6460;--light:#F5F1EE;
  --nav-h:62px;--header-h:60px;
}
html,body{width:100%;min-height:100%;background:var(--light);font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased;}
#app{min-height:100vh;display:flex;flex-direction:column;}

/* ─ NAV BOTTOM ─ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:var(--nav-h);
  background:var(--cream);
  border-top:1px solid rgba(26,10,8,.09);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;position:relative;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .12s;
}
.nav-item:active{opacity:.65;}
.nav-label{font-size:10px;font-weight:600;color:var(--gray);}
.nav-item.active .nav-label{color:var(--red);font-weight:700;}
.nav-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  min-width:17px;height:17px;border-radius:9px;
  background:var(--red);color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}

/* ─ HEADER ─ */
.top-header{
  position:sticky;top:0;z-index:50;
  background:rgba(255,253,249,.95);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(26,10,8,.08);
  padding:10px 18px;
}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo-text{font-size:1.3rem;font-weight:900;letter-spacing:-.03em;line-height:1;}
.logo-text .way{color:var(--red);}
.avatar-btn{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--red-d));
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;
  box-shadow:0 4px 12px rgba(224,90,58,.28);
  font-size:13px;font-weight:800;color:#fff;font-family:'Poppins',sans-serif;
}
.cart-btn{
  width:38px;height:38px;border-radius:10px;border:none;
  background:var(--red);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(224,90,58,.35);
  position:relative;
}
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--light);border:1.5px solid rgba(26,10,8,.08);
  border-radius:12px;padding:9px 13px;
}
.search-bar input{
  border:none;background:transparent;font-family:'Poppins',sans-serif;
  font-size:13px;color:var(--dark);outline:none;width:100%;
}
.search-bar input::placeholder{color:rgba(107,100,96,.5);}

/* ─ MAIN CONTENT ─ */
.main-content{
  flex:1;
  padding-bottom:calc(var(--nav-h) + 12px);
}

/* ─ SKELETON ─ */
.skel{
  background:linear-gradient(90deg,#EEEBE7 25%,#E4E0DB 50%,#EEEBE7 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease-in-out infinite;
  border-radius:10px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─ UTILS ─ */
.tap{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .12s;}
.tap:active{opacity:.68;}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ─ CATEGORY PILLS ─ */
.cat-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:100px;white-space:nowrap;
  font-size:12px;font-weight:500;color:var(--dark);
  background:#fff;border:1.5px solid rgba(26,10,8,.09);
  cursor:pointer;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.cat-pill.active{
  background:var(--red);border-color:var(--red);
  color:#fff;font-weight:700;
  box-shadow:0 4px 12px rgba(224,90,58,.3);
}

/* ─ STORE CARD ─ */
.store-card{
  background:#fff;border-radius:18px;overflow:hidden;
  box-shadow:0 2px 14px rgba(26,10,8,.08);
  margin-bottom:14px;cursor:pointer;
  transition:transform .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
.store-card:active{transform:scale(.985);}
.store-hero{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.store-hero img{width:100%;height:100%;object-fit:cover;}
.store-emoji{font-size:58px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));}
.store-info{padding:13px 15px 15px;}
.store-name{font-weight:700;font-size:15px;color:var(--dark);margin-bottom:7px;}
.store-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.store-tag{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--gray);}
.status-dot{width:7px;height:7px;border-radius:50%;}

/* ─ ITEM ROW ─ */
.item-row{
  display:flex;gap:13px;padding:14px 0;
  border-bottom:1px solid rgba(26,10,8,.06);
  align-items:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.item-thumb{
  width:74px;height:74px;border-radius:12px;flex-shrink:0;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.item-thumb img{width:100%;height:100%;object-fit:cover;}
.item-name{font-weight:700;font-size:14px;color:var(--dark);margin-bottom:3px;}
.item-desc{font-size:11.5px;color:var(--gray);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.item-price{font-weight:800;font-size:14.5px;color:var(--dark);}

/* ─ QTY CONTROL ─ */
.qty-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qty-btn{
  width:28px;height:28px;border-radius:8px;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.qty-btn.minus{background:var(--light);}
.qty-btn.plus{background:var(--red);box-shadow:0 3px 8px rgba(224,90,58,.3);}
.qty-num{font-weight:700;font-size:14px;color:var(--dark);min-width:14px;text-align:center;}
.add-btn{
  width:32px;height:32px;border-radius:10px;border:none;
  background:var(--red);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 10px rgba(224,90,58,.35);
  -webkit-tap-highlight-color:transparent;
}

/* ─ CART CTA BAR ─ */
.cart-cta{
  position:fixed;bottom:calc(var(--nav-h) + 10px);left:16px;right:16px;z-index:80;
  background:var(--red);border-radius:14px;
  padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 8px 24px rgba(224,90,58,.42);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.cart-cta-badge{
  background:rgba(255,255,255,.22);border-radius:8px;
  padding:3px 10px;font-size:13px;font-weight:700;color:#fff;
}
.cart-cta-label{font-size:14px;font-weight:700;color:#fff;}
.cart-cta-total{font-size:13px;font-weight:700;color:rgba(255,255,255,.88);}

/* ─ MODAL SHEET ─ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
.modal-sheet{
  width:100%;background:var(--cream);border-radius:22px 22px 0 0;
  padding:10px 20px 32px;
  animation:sheetUp .3s cubic-bezier(.25,.46,.45,.94);
  max-height:90vh;overflow-y:auto;
}
.sheet-handle{width:36px;height:4px;background:rgba(26,10,8,.12);border-radius:2px;margin:0 auto 18px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ─ FORM ─ */
.form-field{margin-bottom:13px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.form-input{
  width:100%;padding:11px 13px;
  background:var(--light);border:1.5px solid rgba(26,10,8,.09);
  border-radius:11px;font-family:'Poppins',sans-serif;font-size:13.5px;color:var(--dark);outline:none;
}
.form-input:focus{border-color:var(--red);}
.form-input::placeholder{color:rgba(107,100,96,.4);}
.btn-primary{
  width:100%;padding:14px;border-radius:13px;border:none;
  background:linear-gradient(135deg,var(--red),var(--red-d));
  color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;box-shadow:0 8px 22px rgba(224,90,58,.35);
  transition:opacity .15s;
}
.btn-primary:active{opacity:.85;}
.btn-ghost{
  width:100%;padding:12px;border-radius:12px;
  border:1.5px solid rgba(26,10,8,.1);background:transparent;
  color:var(--gray);font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;cursor:pointer;
}

/* ─ SCREENS ─ */
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ─ BACK HEADER ─ */
.back-header{
  position:sticky;top:0;z-index:50;
  background:rgba(255,253,249,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(26,10,8,.08);
  padding:12px 18px;
  display:flex;align-items:center;gap:12px;
}
.back-btn{
  width:36px;height:36px;border-radius:10px;background:var(--light);
  border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.back-title{font-weight:700;font-size:16px;color:var(--dark);flex:1;}

/* ─ STORE HERO SCREEN ─ */
.store-screen-hero{
  height:180px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.store-screen-hero img{width:100%;height:100%;object-fit:cover;opacity:.6;}

/* ─ CART SUMMARY ─ */
.summary-box{
  background:#fff;border-radius:14px;padding:15px;
  border:1px solid rgba(26,10,8,.06);margin-bottom:13px;
}
.summary-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.summary-label{font-size:13px;color:var(--gray);}
.summary-value{font-size:13px;font-weight:600;color:var(--dark);}
.summary-total-label{font-size:14px;font-weight:700;color:var(--dark);}
.summary-total-value{font-size:17px;font-weight:900;color:var(--dark);}
.summary-divider{height:1px;background:rgba(26,10,8,.07);margin:10px 0;}

/* ─ CONFIRM ─ */
.confirm-icon{font-size:64px;text-align:center;margin-bottom:16px;}
.confirm-title{font-size:22px;font-weight:800;color:var(--dark);text-align:center;margin-bottom:8px;}
.confirm-desc{font-size:13.5px;color:var(--gray);text-align:center;line-height:1.65;margin-bottom:28px;}
.progress-bar-wrap{height:6px;background:var(--light);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.progress-bar-fill{height:100%;background:var(--red);border-radius:3px;transition:width 1s cubic-bezier(.25,.46,.45,.94);}
.progress-steps{display:flex;justify-content:space-between;}
.progress-step{font-size:9.5px;text-align:center;flex:1;font-weight:500;}
.order-code-box{
  background:var(--light);border-radius:12px;padding:13px 20px;
  text-align:center;border:1px solid rgba(26,10,8,.07);margin-bottom:24px;
}
.order-code-label{font-size:10.5px;color:var(--gray);margin-bottom:4px;}
.order-code{font-size:20px;font-weight:900;color:var(--dark);letter-spacing:.06em;}

/* ─ BANNER ─ */
.hero-banner{
  background:linear-gradient(135deg,var(--dark) 0%,#3D1A10 100%);
  border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;margin-bottom:4px;
}
.hero-banner::after{content:'🍽️';position:absolute;right:-12px;bottom:-18px;font-size:84px;opacity:.1;pointer-events:none;}

/* ─ EMPTY STATE ─ */
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--gray);}

@media(min-width:640px){
  .main-content,.top-header,.back-header{max-width:540px;margin-left:auto;margin-right:auto;width:100%;}
  .bottom-nav{justify-content:center;}
  .bottom-nav>.nav-item{max-width:100px;}
  .cart-cta{max-width:508px;left:50%;transform:translateX(-50%);}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── SUPABASE ───────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(
  'https://nmttkjmfazcipefeakkx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdHRram1mYXpjaXBlZmVha2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTM3NjQsImV4cCI6MjA5MDI4OTc2NH0.MMTX_6iQJk7Uv3HPSk0m32_BihvqsWhHJ_qiRkw0WYo'
);
const IBGE = 'https://servicodados.ibge.gov.br/api/v1/localidades';

// ─── STATE ──────────────────────────────────────────────────────
const EMOJIS = ['🍔','🍕','🍣','🍗','🥗','🍜','🥩','🌮','🥪','🍱','🥘','🍛'];
const BGS    = ['#2D1B0E','#1A0A08','#0A1A10','#1A0808','#0A0A1A','#1A1008'];

let state = {
  screen: localStorage.getItem('pw-screen') || 'home',
  lojas: null,
  lojaAtual: null,
  itemAtual: null,
  itemsLoja: null,
  catAtiva: 'all',
  catMenu: null,
  busca: '',
  cidade: '',
  cart: [],
  user: null,
  step: 0,
  orderCode: '',
  modal: null,   // 'perfil'
  showPerfilModal: false,
};

try { state.user = JSON.parse(localStorage.getItem('pw_cliente')); } catch(e) {}

const CATS = [
  {id:'all',label:'Todos',emoji:'🍽️'},
  {id:'burger',label:'Burger',emoji:'🍔'},
  {id:'pizza',label:'Pizza',emoji:'🍕'},
  {id:'acai',label:'Açaí',emoji:'🍇'},
  {id:'restaurante',label:'Restaurante',emoji:'🥘'},
  {id:'lanche',label:'Lanches',emoji:'🥪'},
];

// ─── HELPERS ────────────────────────────────────────────────────
function fmt(v) { return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',','); }
function cartCount() { return state.cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal() { return state.cart.reduce((s,i)=>s+i.price*i.qty,0); }
function getQty(id)  { const it = state.cart.find(i=>i.id===id); return it?it.qty:0; }
function initials()  { return state.user?.nome ? state.user.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : '?'; }

function addToCart(item) {
  const ex = state.cart.find(i=>i.id===item.id);
  if(ex) ex.qty++;
  else state.cart.push({...item, qty:1});
  render();
}
function removeFromCart(id) {
  const ex = state.cart.find(i=>i.id===id);
  if(!ex) return;
  if(ex.qty===1) state.cart = state.cart.filter(i=>i.id!==id);
  else ex.qty--;
  render();
}

function goTo(screen, extra) {
  if(extra) Object.assign(state, extra);
  state.screen = screen;
  localStorage.setItem('pw-screen', screen);
  window.scrollTo(0,0);
  render();
}

function matchCat(l, cat) {
  if(!cat||cat==='all') return true;
  const n = (l.nome||'').toLowerCase();
  const m = {burger:['burger','hamburguer','smash'],pizza:['pizza','pizzaria'],acai:['açaí','acai'],restaurante:['restaurante','marmita'],lanche:['lanche','sanduíche','tapioca']};
  return (m[cat]||[]).some(k=>n.includes(k));
}

function mskTel(v) {
  v = v.replace(/\D/g,'').slice(0,11);
  if(v.length>10) v=v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
  else if(v.length>6) v=v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d*)$/,'($1) $2');
  else if(v.length>0) v='('+v;
  return v;
}

// ─── SVG ICONS ──────────────────────────────────────────────────
const icons = {
  home: (active) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="${active?'rgba(224,90,58,.12)':'none'}" stroke="${active?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 10L12 3l9 7v11a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/></svg>`,
  search: (active) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${active?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`,
  cart: (active) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="${active?'rgba(224,90,58,.12)':'none'}" stroke="${active?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
  orders: (active) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="${active?'rgba(224,90,58,.12)':'none'}" stroke="${active?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h4"/></svg>`,
  back: () => `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A0A08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  search_sm: () => `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`,
  plus: (white) => `<svg width="${white?'14':'16'}" height="${white?'14':'16'}" viewBox="0 0 16 16" fill="none" stroke="${white?'#fff':'#E05A3A'}" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>`,
  minus: () => `<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#1A0A08" stroke-width="2" stroke-linecap="round"><path d="M2 7h10"/></svg>`,
  cart_sm: (white) => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${white?'#fff':'#1A0A08'}" stroke-width="1.8" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
  clock: () => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
  pin: () => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="1.8" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  truck: () => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22A85A" stroke-width="1.8" stroke-linecap="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  check: () => `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>`,
};

// ─── RENDER BOTTOM NAV ───────────────────────────────────────────
function renderBottomNav(screen) {
  const items = [
    {id:'home',   label:'Início',  icon:icons.home},
    {id:'search', label:'Buscar',  icon:icons.search},
    {id:'cart',   label:'Carrinho',icon:icons.cart},
    {id:'orders', label:'Pedidos', icon:icons.orders},
  ];
  const cn = cartCount();
  return `<nav class="bottom-nav">
    ${items.map(it => `
      <div class="nav-item ${screen===it.id?'active':''}" onclick="goTo('${it.id}')">
        ${it.id==='cart' && cn>0 ? `<span class="nav-badge">${cn}</span>` : ''}

      <div style="font-size:12.5px;color:var(--gray);margin-bottom:20px;">${u.nome?'Atualize seus dados':'Cadastro rápido para começar'}</div>
      <div class="form-field"><label class="form-label">Nome</label><input class="form-input" id="pf-nome" value="${u.nome||''}" placeholder="João Silva"/></div>
      <div class="form-field"><label class="form-label">WhatsApp</label><input class="form-input" id="pf-tel" value="${u.tel||''}" placeholder="(11) 99999-9999" oninput="this.value=mskTel(this.value)" type="tel"/></div>
      <div class="form-field"><label class="form-label">E-mail</label><input class="form-input" id="pf-email" value="${u.email||''}" placeholder="seu@email.com" type="email"/></div>
      <div class="form-field"><label class="form-label">Estado</label>
        <select class="form-input" id="pf-estado" onchange="loadCidades()">
          <option value="">Selecione...</option>
          ${(state._estados||[]).map(e=>`<option value="${e.sigla}" ${u.estadoSigla===e.sigla?'selected':''}>${e.nome}</option>`).join('')}
        </select>
      </div>
      <div class="form-field"><label class="form-label">Cidade</label>
        <select class="form-input" id="pf-cidade">
          <option value="${u.cidade||''}">${u.cidade||'Selecione o estado primeiro'}</option>
          ${(state._cidades||[]).filter(c=>c!==u.cidade).map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <button class="btn-primary" style="margin-top:8px;" onclick="salvarPerfil()">Salvar e entrar</button>
      <button class="btn-ghost" style="margin-top:10px;" onclick="state.showPerfilModal=false;render()">Continuar sem cadastro</button>
    </div>
  </div>`;
}

async function loadCidades() {
  const uf = document.getElementById('pf-estado')?.value;
  if(!uf) return;
  try {
    const r = await fetch(`${IBGE}/estados/${uf}/municipios?orderBy=nome`);
    const data = await r.json();
    state._cidades = data.map(c=>c.nome);
    const sel = document.getElementById('pf-cidade');
    if(sel) {
      sel.innerHTML = state._cidades.map(c=>`<option value="${c}">${c}</option>`).join('');
    }
  } catch(e) {}
}

async function salvarPerfil() {
  const nome  = document.getElementById('pf-nome')?.value.trim();
  const tel   = document.getElementById('pf-tel')?.value.trim();
  const email = document.getElementById('pf-email')?.value.trim();
  const uf    = document.getElementById('pf-estado')?.value;
  const cidade= document.getElementById('pf-cidade')?.value;
  if(!nome) return alert('Digite seu nome');
  const estadoNome = (state._estados||[]).find(e=>e.sigla===uf)?.nome||uf;
  try {
    await db.from('clientes').upsert({nome,telefone:tel.replace(/\D/g,''),email,estado:estadoNome,cidade},{onConflict:'email'});
  } catch(e) {}
  state.user = {nome,tel,email,estadoSigla:uf,estado:estadoNome,cidade};
  localStorage.setItem('pw_cliente', JSON.stringify(state.user));
  state.showPerfilModal = false;
  if(cidade && state.lojas) {
    const cidades = [...new Set(state.lojas.map(l=>l.cidade).filter(Boolean))];
    if(cidades.includes(cidade)) state.cidade = cidade;
  }
  render();
}

const stepData = [

function startConfirmSteps() {
  if(state._stepTimer) clearTimeout(state._stepTimer);
  state.step = 0;
  const next = () => {
    if(state.step<3 && state.screen==='confirm') {
      state._stepTimer = setTimeout(() => { state.step++; render(); next(); }, state.step===0?1200:2400);
    }
  };
  next();
}

function renderConfirm() {
  const s = stepData[state.step];
  const prog = ((state.step+1)/4*100).toFixed(0);
  const labels = ['Confirmado','Preparando','A caminho','Entregue'];
  return `
  <div class="screen active" style="flex-direction:column;">
    <div style="padding:13px 18px;border-bottom:1px solid rgba(26,10,8,.07);background:var(--cream);">

      <div class="confirm-desc">${s.desc}</div>

      <div style="width:100%;margin-bottom:28px;">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%;"></div></div>
        <div class="progress-steps">
          ${labels.map((l,i)=>`<div class="progress-step" style="color:${i<=state.step?'var(--red)':'rgba(107,100,96,.3)'};font-weight:${i===state.step?'700':'500'};">${l}</div>`).join('')}

    </div>
    ${renderBottomNav('')}
  </div>`;

  state.catMenu = null;
  state.screen = 'store';
  window.scrollTo(0,0);
  render();

  // Fetch items
  const loja = state.lojas[idx];
  const tabelas = ['produtos','cardapio','itens','menu','items'];
  let items = null;
  for(const t of tabelas) {
    try {
      const {data,error} = await db.from(t).select('*').eq('estabelecimento_id',loja.id);
      if(!error && data && data.length>0) {
        items = data.map((p,i)=>({
          _idx: i,
          id: p.id,
          name: p.nome||p.name||p.titulo||'Produto',
          desc: p.descricao||p.description||'',
          price: parseFloat(p.preco||p.price||p.valor||0),
          cat: p.categoria||p.category||p.tipo||'Cardápio',
          img: p.foto||p.image||p.imagem||p.foto_url||null,
          emoji: loja._emoji,
        }));
        break;
      }
    } catch(e) {}
  }
  if(!items) {
    items = [
      {_idx:0,id:loja.id+'-1',name:'Prato do dia',desc:'Peça já e descubra o sabor da casa',price:22.90,cat:'Destaques',emoji:loja._emoji,img:null},
      {_idx:1,id:loja.id+'-2',name:'Combo especial',desc:'Inclui bebida e acompanhamento',price:38.90,cat:'Destaques',emoji:loja._emoji,img:null},
      {_idx:2,id:loja.id+'-3',name:'Bebida gelada 500ml',desc:'Refrigerante ou suco natural',price:8.90,cat:'Bebidas',emoji:'🥤',img:null},
    ];
  }
  state.itemsLoja = items;
  render();
}

// ─── OPEN ITEM ────────────────────────────────────────────────────
function openItem(idx) {
  state.itemAtual = state.itemsLoja[idx];
  goTo('item');
}

// ─── SCREEN: ITEM ─────────────────────────────────────────────────
function renderItem() {
  const item = state.itemAtual;
  const l = state.lojaAtual;
  if(!item||!l) return renderHome();
  const qty = getQty(item.id);
  const cn = cartCount();
  const ct = cartTotal();

  return `
  <div class="screen active" style="flex-direction:column;">
    <!-- Hero -->
    <div style="height:240px;background:${l._bg};position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
      ${item.img ? `<img src="${item.img}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div style="display:none;font-size:90px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3))">${item.emoji}</div>` : `<div style="font-size:90px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3))">${item.emoji}</div>`}
      <button class="back-btn tap" style="position:absolute;top:14px;left:18px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);" onclick="goTo('store')">${icons.back().replace('stroke="#1A0A08"','stroke="#fff"')}</button>
    </div>

    <div class="main-content" style="padding:20px 18px 120px;">
      <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">${l.nome} · ${item.cat}</div>
      <div style="font-size:22px;font-weight:800;color:var(--dark);line-height:1.2;margin-bottom:10px;">${item.name}</div>
      ${item.desc ? `<div style="font-size:13.5px;color:var(--gray);line-height:1.72;margin-bottom:18px;">${item.desc}</div>` : ''}
      <div style="height:1px;background:rgba(26,10,8,.07);margin-bottom:16px;"></div>
      <div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px;">Observações</div>
      <textarea style="width:100%;border:1.5px solid rgba(26,10,8,.09);border-radius:12px;padding:11px 13px;font-family:'Poppins',sans-serif;font-size:13px;color:var(--gray);line-height:1.5;resize:none;outline:none;background:var(--light);" rows="3" placeholder="Ex: sem cebola, bem passado..."></textarea>
    </div>

    <!-- Bottom action -->
    <div style="position:fixed;bottom:calc(var(--nav-h)+10px);left:0;right:0;padding:10px 18px;background:var(--cream);border-top:1px solid rgba(26,10,8,.07);z-index:80;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;color:var(--gray);">Valor unitário</span>
        <span style="font-size:21px;font-weight:900;color:var(--dark);">${fmt(item.price)}</span>
      </div>
      ${qty===0 ? `
        <button class="btn-primary" style="display:flex;align-items:center;justify-content:center;gap:8px;" onclick="addToCart(state.itemAtual);render();">
          ${icons.plus(true)}&nbsp;Adicionar ao carrinho
        </button>` : `
        <div style="display:flex;gap:10px;align-items:center;">
          <div style="display:flex;gap:10px;align-items:center;background:var(--light);border-radius:12px;padding:11px 18px;flex:1;justify-content:center;">
            <button class="qty-btn minus tap" onclick="removeFromCart('${item.id}');render();">${icons.minus()}</button>
            <span style="font-size:17px;font-weight:800;color:var(--dark);min-width:20px;text-align:center;">${qty}</span>
            <button class="qty-btn plus tap" onclick="addToCart(state.itemAtual);render();">${icons.plus(true)}</button>
          </div>
          <button style="background:var(--red);border:none;border-radius:12px;padding:13px 18px;font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:#fff;cursor:pointer;white-space:nowrap;box-shadow:0 6px 16px rgba(224,90,58,.4);" onclick="goTo('cart')">Ver carrinho (${fmt(ct)})</button>
        </div>`}
    </div>
    ${renderBottomNav('')}
  </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const screens = {
    home:    renderHome,
    store:   renderStore,
    item:    renderItem,
    cart:    renderCart,
    confirm: renderConfirm,
    search:  renderSearch,
    orders:  renderOrders,
  };
  const fn = screens[state.screen] || renderHome;
  document.getElementById('app').innerHTML = fn();
}

// Partial re-render (preserva cursor no input)
function renderInPlace() {
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────
async function init() {
  // Carrega estados IBGE
  try {
    const r = await fetch(IBGE+'/estados?orderBy=nome');
    state._estados = await r.json();
  } catch(e) {}

  render();

  // Carrega lojas do Supabase
  const {data} = await db.from('estabelecimentos').select('id,nome,slug,logo_url,cidade,aberto').order('nome');
  if(data) {
    state.lojas = data.map((l,i)=>({...l,_idx:i,_emoji:EMOJIS[i%EMOJIS.length],_bg:BGS[i%BGS.length]}));
  } else {
    state.lojas = [];
  }

  // Mostrar modal perfil na primeira visita
  if(!state.user) {
    setTimeout(()=>{ state.showPerfilModal=true; render(); }, 800);
  }

  render();
}

init();
</script>
</body>
</html>
