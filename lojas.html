<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FFFDF9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>PEDIWAY — Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E05A3A;--red-d:#C44828;--cream:#FFFDF9;--dark:#1A0A08;--gray:#6B6460;--light:#F5F1EE;--nav-h:62px;}
html,body{width:100%;min-height:100%;background:var(--light);font-family:"Poppins",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
#app{min-height:100vh;display:flex;flex-direction:column;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);background:var(--cream);border-top:1px solid rgba(26,10,8,.09);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;transition:opacity .12s;}
.nav-item:active{opacity:.65;}
.nav-label{font-size:10px;font-weight:600;color:var(--gray);}
.nav-item.active .nav-label{color:var(--red);font-weight:700;}
.nav-badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:17px;height:17px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.top-header{position:sticky;top:0;z-index:50;background:rgba(255,253,249,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(26,10,8,.08);padding:12px 18px;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.logo-text{font-size:1.3rem;font-weight:900;letter-spacing:-.03em;line-height:1;}
.logo-text .way{color:var(--red);}
.avatar-btn{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-d));display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 12px rgba(224,90,58,.28);font-size:13px;font-weight:800;color:#fff;font-family:"Poppins",sans-serif;}
.cart-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(224,90,58,.35);position:relative;}
.main-content{flex:1;padding-bottom:calc(var(--nav-h) + 12px);}
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}
.skel{background:linear-gradient(90deg,#EEEBE7 25%,#E4E0DB 50%,#EEEBE7 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.tap{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .12s;}
.tap:active{opacity:.68;}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:100px;white-space:nowrap;font-size:12px;font-weight:500;color:var(--dark);background:#fff;border:1.5px solid rgba(26,10,8,.09);cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.cat-pill.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(224,90,58,.3);}
.store-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(26,10,8,.08);margin-bottom:14px;cursor:pointer;transition:transform .18s,box-shadow .18s;-webkit-tap-highlight-color:transparent;}
.store-card:active{transform:scale(.985);}
.store-hero{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.store-hero img{width:100%;height:100%;object-fit:cover;}
.store-emoji{font-size:58px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));}
.store-info{padding:13px 15px 15px;}
.store-name{font-weight:700;font-size:15px;color:var(--dark);margin-bottom:7px;}
.store-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.store-tag{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--gray);}
.status-dot{width:7px;height:7px;border-radius:50%;}
.back-header{position:sticky;top:0;z-index:50;background:rgba(255,253,249,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(26,10,8,.08);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--light);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.back-title{font-weight:700;font-size:16px;color:var(--dark);flex:1;}
.item-row{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid rgba(26,10,8,.06);align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.item-thumb{width:74px;height:74px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.item-thumb img{width:100%;height:100%;object-fit:cover;}
.item-name{font-weight:700;font-size:14px;color:var(--dark);margin-bottom:3px;}
.item-desc{font-size:11.5px;color:var(--gray);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.item-price{font-weight:800;font-size:14.5px;color:var(--dark);}
.qty-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qty-btn{width:28px;height:28px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.qty-btn.minus{background:var(--light);}
.qty-btn.plus{background:var(--red);box-shadow:0 3px 8px rgba(224,90,58,.3);}
.qty-num{font-weight:700;font-size:14px;color:var(--dark);min-width:14px;text-align:center;}
.add-btn{width:32px;height:32px;border-radius:10px;border:none;background:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(224,90,58,.35);-webkit-tap-highlight-color:transparent;}
.cart-cta{position:fixed;bottom:calc(var(--nav-h) + 10px);left:16px;right:16px;z-index:80;background:var(--red);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 24px rgba(224,90,58,.42);cursor:pointer;}
.cart-cta-badge{background:rgba(255,255,255,.22);border-radius:8px;padding:3px 10px;font-size:13px;font-weight:700;color:#fff;}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:flex;align-items:flex-end;animation:fadeIn .2s ease;}
.modal-sheet{width:100%;background:var(--cream);border-radius:22px 22px 0 0;padding:10px 20px 32px;animation:sheetUp .3s cubic-bezier(.25,.46,.45,.94);max-height:92vh;overflow-y:auto;}
.sheet-handle{width:36px;height:4px;background:rgba(26,10,8,.12);border-radius:2px;margin:0 auto 18px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.form-field{margin-bottom:13px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.form-input{width:100%;padding:11px 13px;background:var(--light);border:1.5px solid rgba(26,10,8,.09);border-radius:11px;font-family:"Poppins",sans-serif;font-size:13.5px;color:var(--dark);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--red);}
.form-input::placeholder{color:rgba(107,100,96,.4);}
.btn-primary{width:100%;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;font-family:"Poppins",sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 22px rgba(224,90,58,.35);transition:opacity .15s;}
.btn-primary:active{opacity:.85;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{width:100%;padding:12px;border-radius:12px;border:1.5px solid rgba(26,10,8,.1);background:transparent;color:var(--gray);font-family:"Poppins",sans-serif;font-weight:600;font-size:13px;cursor:pointer;}
.store-screen-hero{height:200px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.store-screen-hero img{width:100%;height:100%;object-fit:cover;opacity:.6;}
.story-thumb{width:70px;height:70px;border-radius:50%;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;border:3px solid var(--red);}
.story-thumb img,.story-thumb video{width:100%;height:100%;object-fit:cover;}
.story-viewer{position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;}
.summary-box{background:#fff;border-radius:14px;padding:15px;border:1px solid rgba(26,10,8,.06);margin-bottom:13px;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.summary-label{font-size:13px;color:var(--gray);}
.summary-value{font-size:13px;font-weight:600;color:var(--dark);}
.summary-divider{height:1px;background:rgba(26,10,8,.07);margin:10px 0;}
.confirm-icon{font-size:64px;text-align:center;margin-bottom:16px;}
.confirm-title{font-size:22px;font-weight:800;color:var(--dark);text-align:center;margin-bottom:8px;}
.confirm-desc{font-size:13.5px;color:var(--gray);text-align:center;line-height:1.65;margin-bottom:28px;}
.progress-bar-wrap{height:6px;background:var(--light);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.progress-bar-fill{height:100%;background:var(--red);border-radius:3px;transition:width 1s cubic-bezier(.25,.46,.45,.94);}
.hero-banner{background:linear-gradient(135deg,var(--dark) 0%,#3D1A10 100%);border-radius:16px;padding:22px 22px 18px;position:relative;overflow:hidden;}
.hero-banner::after{content:"🍽️";position:absolute;right:-12px;bottom:-18px;font-size:84px;opacity:.1;pointer-events:none;}
.promo-badge{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;box-shadow:0 3px 10px rgba(224,90,58,.4);}
.adic-group{margin-bottom:18px;}
.adic-group-title{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:10px;}
.adic-opt{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid #e0dbd5;border-radius:10px;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.adic-opt.sel{border-color:var(--red);background:#fff5f5;}
.adic-check{width:20px;height:20px;border-radius:5px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.pag-pill{flex:1;padding:10px;border:1.5px solid rgba(26,10,8,.1);border-radius:10px;background:transparent;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;text-align:center;transition:all .15s;}
.pag-pill.ativo{background:var(--red);border-color:var(--red);color:#fff;}
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--gray);}
.pw-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .3s;white-space:nowrap;}
.pw-toast.show{transform:translateX(-50%) translateY(0);}
.cart-store-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 6px;margin-bottom:4px;}
.cart-store-logo{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f0ebe4;font-size:16px;flex-shrink:0;}
.cart-store-logo img{width:100%;height:100%;object-fit:cover;}
@media(min-width:640px){.main-content,.top-header,.back-header{max-width:540px;margin-left:auto;margin-right:auto;width:100%;}.bottom-nav{justify-content:center;}.bottom-nav>.nav-item{max-width:100px;}.cart-cta{max-width:508px;left:50%;transform:translateX(-50%);}}
</style>
</head>

<script>
const{createClient}=supabase;
const db=createClient('https://nmttkjmfazcipefeakkx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdHRram1mYXpjaXBlZmVha2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTM3NjQsImV4cCI6MjA5MDI4OTc2NH0.MMTX_6iQJk7Uv3HPSk0m32_BihvqsWhHJ_qiRkw0WYo');
const IBGE='https://servicodados.ibge.gov.br/api/v1/localidades';
const EMOJIS=['🍔','🍕','🍣','🍗','🥗','🍜','🥩','🌮','🥪','🍱'];
const BGS=['#2D1B0E','#1A0A08','#0A1A10','#1A0808','#0A0A1A'];
const CATS=[{id:'all',label:'Todos',emoji:'🍽️'},{id:'promo',label:'Promoção',emoji:'🔥'},{id:'burger',label:'Burger',emoji:'🍔'},{id:'pizza',label:'Pizza',emoji:'🍕'},{id:'acai',label:'Açaí',emoji:'🍇'},{id:'restaurante',label:'Restaurante',emoji:'🥘'},{id:'lanche',label:'Lanches',emoji:'🥪'}];

let S={screen:'home',lojas:null,promoItems:null,_estados:[],_cidades:[],lojaAtual:null,produtos:null,fresquinhos:[],catMenu:'Todos',itemAtual:null,adicionaisSel:{},qtdAtual:1,carts:{},checkoutLojaId:null,pedidos:[],catAtiva:'all',busca:'',cidade:'',user:null,showPerfilModal:false,storyIdx:undefined,_step:0};
try{S.user=JSON.parse(localStorage.getItem('pw_cliente'));}catch(e){}
try{S.carts=JSON.parse(localStorage.getItem('pw_carts'))||{};}catch(e){}

// HELPERS
function fmt(v){return'R$ '+parseFloat(v||0).toFixed(2).replace('.',',');}
function initials(){return S.user?.nome?S.user.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase():'?';}
function cartTotalCount(){return Object.values(S.carts).reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+i.qtd,0),0);}
function cartTotalValue(){return Object.values(S.carts).reduce((s,c)=>{const sub=c.items.reduce((ss,i)=>ss+i.preco*i.qtd,0);const taxa=(c.opcao==='entrega'&&c.loja?.taxa_entrega)?Number(c.loja.taxa_entrega):0;return s+sub+taxa;},0);}
function getQty(pid){if(!S.lojaAtual)return 0;const c=S.carts[S.lojaAtual.id];if(!c)return 0;return c.items.filter(i=>i.id===pid&&!i.adicionais?.length).reduce((s,i)=>s+i.qtd,0);}
function saveCartsLS(){try{localStorage.setItem('pw_carts',JSON.stringify(S.carts));}catch(e){}}
function matchCat(l,cat){if(!cat||cat==='all')return true;if(cat==='promo')return l.tem_promo;const n=(l.nome||'').toLowerCase();const m={burger:['burger','hamburguer','smash'],pizza:['pizza','pizzaria'],acai:['açaí','acai'],restaurante:['restaurante','marmita'],lanche:['lanche','sanduíche','tapioca']};return(m[cat]||[]).some(k=>n.includes(k));}
function toast(msg,dur=3000){const el=document.getElementById('pw-toast');if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);}
function goTo(sc,extra){if(extra)Object.assign(S,extra);S.screen=sc;window.scrollTo(0,0);render();}
function mskTel(v){v=v.replace(/\D/g,'').slice(0,11);if(v.length>10)v=v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');else if(v.length>6)v=v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3');else if(v.length>2)v=v.replace(/^(\d{2})(\d*)$/,'($1) $2');else if(v.length>0)v='('+v;return v;}

// ICONS
const I={
home:(a)=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="${a?'rgba(224,90,58,.12)':'none'}" stroke="${a?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 10L12 3l9 7v11a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/></svg>`,
search:(a)=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${a?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`,
cart:(a)=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="${a?'rgba(224,90,58,.12)':'none'}" stroke="${a?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
orders:(a)=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="${a?'rgba(224,90,58,.12)':'none'}" stroke="${a?'#E05A3A':'#6B6460'}" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h4"/></svg>`,
back:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A0A08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
backW:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
plus:(w)=>`<svg width="${w?'14':'16'}" height="${w?'14':'16'}" viewBox="0 0 16 16" fill="none" stroke="${w?'#fff':'#E05A3A'}" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>`,
minus:()=>`<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#1A0A08" stroke-width="2" stroke-linecap="round"><path d="M2 7h10"/></svg>`,
cartSm:(w)=>`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${w?'#fff':'#1A0A08'}" stroke-width="1.8" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
clock:()=>`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
pin:()=>`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="1.8" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
truck:()=>`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22A85A" stroke-width="1.8" stroke-linecap="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
srcSm:()=>`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B6460" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`,
};

// NAV
function renderNav(sc){
const cn=cartTotalCount();
const items=[{id:'home',label:'Início',icon:I.home},{id:'search',label:'Buscar',icon:I.search},{id:'cart',label:'Carrinho',icon:I.cart},{id:'orders',label:'Pedidos',icon:I.orders}];
return `<nav class="bottom-nav">${items.map(it=>`<div class="nav-item ${sc===it.id?'active':''}" onclick="goTo('${it.id}')">${it.id==='cart'&&cn>0?`<span class="nav-badge">${cn}</span>`:''}${it.icon(sc===it.id)}<span class="nav-label">${it.label}</span></div>`).join('')}</nav>`;}

// PERFIL MODAL
function renderPerfilModal(){
const u=S.user||{};const logado=!!u.nome;
return `<div class="modal-overlay" onclick="if(event.target===this){S.showPerfilModal=false;render();}"><div class="modal-sheet"><div class="sheet-handle"></div>
${logado?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;"><div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--red),var(--red-d));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;">${initials()}</div><div><div style="font-size:16px;font-weight:800;color:var(--dark);">${u.nome}</div><div style="font-size:12px;color:var(--gray);">${u.cidade||''}</div></div></div><div style="height:1px;background:rgba(26,10,8,.07);margin-bottom:16px;"></div>`:
`<div style="font-size:19px;font-weight:800;color:var(--dark);margin-bottom:4px;">👋 Bem-vindo!</div><div style="font-size:12.5px;color:var(--gray);margin-bottom:20px;">Cadastro rápido para começar</div>`}

<div class="form-field"><label class="form-label">E-mail</label><input class="form-input" id="pf-email" value="${u.email||''}" placeholder="seu@email.com" type="email"/></div>
<div class="form-field"><label class="form-label">Estado</label><select class="form-input" id="pf-estado" onchange="loadCidades()"><option value="">Selecione...</option>${(S._estados||[]).map(e=>`<option value="${e.sigla}" ${u.estadoSigla===e.sigla?'selected':''}>${e.nome}</option>`).join('')}</select></div>

<button class="btn-primary" style="margin-top:8px;" onclick="salvarPerfil()">${logado?'💾 Salvar':'Entrar →'}</button>
${logado?`<div style="height:1px;background:rgba(26,10,8,.07);margin:12px 0;"></div><button class="btn-ghost" onclick="sairConta()" style="color:var(--red);border-color:rgba(224,90,58,.2);">Sair da conta</button>`:
`<button class="btn-ghost" style="margin-top:10px;" onclick="S.showPerfilModal=false;render()">Continuar sem cadastro</button>`}
</div></div>`;}

async function loadCidades(){const uf=document.getElementById('pf-estado')?.value;if(!uf)return;try{const r=await fetch(`${IBGE}/estados/${uf}/municipios?orderBy=nome`);S._cidades=(await r.json()).map(c=>c.nome);const sel=document.getElementById('pf-cidade');if(sel)sel.innerHTML=S._cidades.map(c=>`<option value="${c}">${c}</option>`).join('');}catch(e){}}
async function salvarPerfil(){const nome=document.getElementById('pf-nome')?.value.trim();const tel=document.getElementById('pf-tel')?.value.trim();const email=document.getElementById('pf-email')?.value.trim();const estEl=document.getElementById('pf-estado');const uf=estEl?.value;const cidade=document.getElementById('pf-cidade')?.value;if(!nome)return toast('Digite seu nome');const estadoNome=S._estados.find(e=>e.sigla===uf)?.nome||uf||'';try{await db.from('clientes').upsert({nome,telefone:tel?.replace(/\D/g,''),email,estado:estadoNome,cidade},{onConflict:'email'});}catch(e){}S.user={nome,tel,email,estadoSigla:uf,estado:estadoNome,cidade};localStorage.setItem('pw_cliente',JSON.stringify(S.user));S.showPerfilModal=false;if(cidade)S.cidade=cidade;render();toast('✅ Perfil salvo!');}
function sairConta(){S.user=null;S.cidade='';localStorage.removeItem('pw_cliente');S.showPerfilModal=false;render();}

// BANNER PROMO
let _bannerTimer=null,_bannerIdx=0;
function renderBanner(){
const items=S.promoItems||[];
if(!items.length)return`<div style="padding:14px 18px 0;"><div class="hero-banner" style="min-height:130px;padding:22px;"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Plataforma independente</div><div style="font-size:22px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px;">Peça direto.</div><div style="font-size:13px;color:rgba(255,255,255,.55);">Sem comissão, sem taxa extra.</div></div></div>`;
const idx=_bannerIdx%items.length;const item=items[idx];const loja=(S.lojas||[]).find(l=>l.id===item.estabelecimento_id)||{};
clearTimeout(_bannerTimer);_bannerTimer=setTimeout(()=>{_bannerIdx++;const el=document.getElementById('promo-banner');if(el)el.outerHTML=renderBanner();},3500);
const dots=items.length>1?`<div style="display:flex;gap:5px;margin-top:12px;">${items.map((_,i)=>`<div style="width:${i===idx?'18':'6'}px;height:6px;border-radius:3px;background:${i===idx?'#fff':'rgba(255,255,255,.3)'};transition:all .3s;"></div>`).join('')}</div>`:''
return`<div id="promo-banner" style="padding:14px 18px 0;cursor:pointer;" onclick="if('${loja.id}')abrirLoja('${loja.id}')"><div class="hero-banner" style="min-height:150px;padding:22px 22px 16px;cursor:pointer;"><div style="position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,209,102,.18) 0%,transparent 70%);pointer-events:none;"></div><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">🔥 Promoção ativa</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${loja.logo_url?`<img src="${loja.logo_url}" style="width:100%;height:100%;object-fit:cover;">`:(`<span style="font-size:22px;">${loja._emoji||'🍽️'}</span>`)}</div><div style="flex:1;min-width:0;"><div style="font-size:11px;color:rgba(255,255,255,.6);margin-bottom:2px;">${loja.nome||''}</div><div style="font-size:16px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.name}</div></div><div style="flex-shrink:0;background:#FFD166;border-radius:10px;padding:6px 12px;text-align:center;"><div style="font-size:18px;font-weight:900;color:#1A0A08;line-height:1;">-${item.desconto}%</div><div style="font-size:9px;font-weight:700;color:rgba(26,10,8,.6);">OFF</div></div></div><div style="display:flex;align-items:center;justify-content:space-between;"><div><span style="font-size:12px;color:rgba(255,255,255,.45);text-decoration:line-through;">${item.preco_original}</span><span style="font-size:16px;font-weight:900;color:#FFD166;margin-left:6px;">${item.preco_promo}</span></div><div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.6);">Ver oferta →</div></div>${dots}</div></div>`;}

const filtered=(S.lojas||[]).filter(l=>{const mc=!S.cidade||l.cidade===S.cidade;const mb=!S.busca||(l.nome||'').toLowerCase().includes(S.busca.toLowerCase());return mc&&mb&&matchCat(l,S.catAtiva);});

<div style="display:flex;gap:8px;align-items:center;">${cn>0?`<button class="cart-btn tap" onclick="goTo('cart')">${I.cartSm(true)}<span style="position:absolute;top:-4px;right:-4px;min-width:17px;height:17px;border-radius:9px;background:#fff;color:var(--red);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;">${cn}</span></button>`:''}<button class="avatar-btn tap" onclick="S.showPerfilModal=true;render();">${initials()}</button></div></div></div>

</div></div>
${renderNav('home')}${S.showPerfilModal?renderPerfilModal():''}

function renderStore(){
const l=S.lojaAtual;if(!l)return renderHome();
const ab=l.aberto!==false;const prods=S.produtos||[];
const cats=['Todos',...new Set(prods.map(p=>p.categoria).filter(Boolean))];
const promosProd=prods.filter(p=>p.promocao||p.em_promocao);
const allCats=[...cats,...(promosProd.length?['Promoções']:[])];
const cur=S.catMenu||'Todos';
const shown=cur==='Promoções'?promosProd:prods.filter(p=>cur==='Todos'||p.categoria===cur);
const cart=S.carts[l.id];const cn=cart?.items.reduce((s,i)=>s+i.qtd,0)||0;
const ct=cart?.items.reduce((s,i)=>s+i.preco*i.qtd,0)||0;
const taxa=(cart?.opcao==='entrega'&&l.taxa_entrega)?Number(l.taxa_entrega):0;

${S.fresquinhos.length?`<div style="padding:14px 0 14px 18px;border-bottom:1px solid rgba(26,10,8,.07);background:var(--cream);"><div style="font-size:12px;font-weight:700;color:var(--gray);margin-bottom:10px;padding-right:18px;">✨ Fresquinho</div><div class="scroll-x" style="display:flex;gap:10px;padding-right:18px;">${S.fresquinhos.map((f,i)=>{const rest=new Date(f.expires_at)-new Date();const h=Math.floor(rest/3600000),mn=Math.floor((rest%3600000)/60000);return`<div class="story-thumb tap" onclick="S.storyIdx=${i};render()">${f.tipo==='video'?`<video src="${f.url}" muted playsinline loop preload="metadata" style="width:100%;height:100%;object-fit:cover;"></video>`:`<img src="${f.url}" alt="">`}<div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:4px;text-align:center;font-size:9px;font-weight:700;color:#fff;">⏱ ${h>0?h+'h':''} ${mn}m</div></div>`;}).join('')}</div></div>`:''}

</div>

${renderNav('home')}</div>`;}

function toggleAdic(gi,oi,nome,preco,max){
if(!S.adicionaisSel[gi])S.adicionaisSel[gi]=[];
const idx=S.adicionaisSel[gi].findIndex(s=>s.nome===nome);
if(idx>=0){S.adicionaisSel[gi].splice(idx,1);}else{if(S.adicionaisSel[gi].length>=max)return toast('Máximo de '+max+' opções');S.adicionaisSel[gi].push({nome,preco});}
renderInPlace();}

function confirmarItem(){
const p=S.itemAtual;const l=S.lojaAtual;if(!p||!l)return;
const grupos=p.grupo_adicionais?.opcoes?[p.grupo_adicionais]:(Array.isArray(p.adicionais)?p.adicionais:[]);
for(let gi=0;gi<grupos.length;gi++){const g=grupos[gi];if(g.min>0&&(!S.adicionaisSel[gi]||S.adicionaisSel[gi].length<g.min))return toast('Escolha ao menos '+g.min+' em "'+(g.grupo||g.nome)+'"');}
const adicFlat=Object.values(S.adicionaisSel).flat();
let extra=adicFlat.reduce((s,a)=>s+a.preco,0);
const precoBase=(p.em_promocao&&p.desconto_percent>0)?p.preco*(1-p.desconto_percent/100):p.preco;
const itemFinal={...p,preco:precoBase+extra,adicionais:adicFlat};
addToCartItem(itemFinal,S.qtdAtual,l);
toast(p.nome+' adicionado! 🛒');goTo('store');}

function addToCartItem(p,qty,loja){

function addDirect(pid){const p=S.produtos?.find(x=>x.id===pid);const l=S.lojaAtual;if(!p||!l)return;if(p.grupo_adicionais?.opcoes?.length){S.itemAtual=p;S.adicionaisSel={};S.qtdAtual=1;goTo('item');return;}addToCartItem(p,1,l);toast(p.nome+' adicionado! 🛒');renderInPlace();}
function rmDirect(pid){const l=S.lojaAtual;if(!l)return;const c=S.carts[l.id];if(!c)return;const idx=c.items.findIndex(i=>i.id===pid&&!i.adicionais?.length);if(idx<0)return;c.items[idx].qtd--;if(c.items[idx].qtd<=0)c.items.splice(idx,1);if(!c.items.length)delete S.carts[l.id];saveCartsLS();renderInPlace();}

function addCartItem(lid,i){const c=S.carts[lid];if(!c)return;c.items[i].qtd++;saveCartsLS();render();}

// FINALIZAR PEDIDO
async function finalizarPedido(lid){
const c=S.carts[lid];if(!c||!c.items.length)return toast('Carrinho vazio');
const nome=document.getElementById('ch-nome')?.value.trim();
const tel=document.getElementById('ch-tel')?.value.replace(/\D/g,'');
const rua=document.getElementById('ch-rua')?.value.trim()||'';
const num=document.getElementById('ch-num')?.value.trim()||'';
const compl=document.getElementById('ch-compl')?.value.trim()||'';
const bairro=document.getElementById('ch-bairro')?.value.trim()||'';
const obs=document.getElementById('ch-obs')?.value.trim()||'';
if(!nome)return toast('Digite seu nome');
if(!tel||tel.length<10)return toast('Digite seu WhatsApp');
if(c.opcao==='entrega'){if(!rua)return toast('Digite a rua');if(!num)return toast('Digite o número');}
const endereco=c.opcao==='entrega'?[rua,num?'Nº'+num:'',compl,bairro].filter(Boolean).join(', '):'Retirada no local';
const sub=c.items.reduce((s,i)=>s+i.preco*i.qtd,0);
const taxa=(c.opcao==='entrega'&&c.loja?.taxa_entrega)?Number(c.loja.taxa_entrega):0;
const total=sub+taxa;
const troco=(c.pag==='dinheiro')?document.getElementById('ch-troco')?.value.trim()||'':'';
const itens=c.items.map(i=>({id:i.id,nome:i.nome,preco:i.preco,qtd:i.qtd,emoji:i.emoji||i._emoji||'🍽️',adicionais:i.adicionais||[]}));
const btn=document.getElementById('btn-finalizar');if(btn){btn.disabled=true;btn.textContent='Enviando...';}
try{
const{error}=await db.from('pedidos').insert({estabelecimento_id:c.loja.id,cliente_nome:nome,cliente_whats:tel,itens,total,status:'novo',endereco,pagamento:c.pag,troco,taxa_entrega:taxa,observacao:obs});
if(error)throw error;
const{data:pNovo}=await db.from('pedidos').select('id,status').eq('estabelecimento_id',c.loja.id).eq('cliente_whats',tel).eq('status','novo').order('created_at',{ascending:false}).limit(1).maybeSingle();
S.pedidos.unshift({id:pNovo?.id||'local_'+Date.now(),loja_nome:c.loja.nome,itens,total,status:'novo'});
delete S.carts[lid];saveCartsLS();
_step=0;goTo('confirm');startSteps();
if(pNovo?.id)iniciarPolling(pNovo.id,S.pedidos[0]);
}catch(e){toast('Erro ao enviar pedido. Tente novamente.');if(btn){btn.disabled=false;btn.textContent='Mandar o pedido! 🚀';}}}

let _pollingId=null;
function iniciarPolling(pedId,pedObj){
if(_pollingId)clearInterval(_pollingId);
const LBLS={confirmado:'✅ Confirmado',em_preparo:'👨‍🍳 Preparando',pronto:'🛵 Saiu para entrega!',entregue:'🎉 Entregue!'};
_pollingId=setInterval(async()=>{try{const{data}=await db.from('pedidos').select('status').eq('id',pedId).maybeSingle();if(data&&data.status!==pedObj.status){pedObj.status=data.status;if(LBLS[data.status])toast(LBLS[data.status],5000);if(data.status==='entregue')clearInterval(_pollingId);render();}}catch(e){}},6000);}

// OPEN STORE
async function abrirLoja(lojaId){
const l=(S.lojas||[]).find(x=>x.id===lojaId);if(!l)return;
S.lojaAtual=l;S.produtos=null;S.fresquinhos=[];S.catMenu='Todos';goTo('store');
try{const{data:fr}=await db.from('fresquinhos').select('*').eq('estabelecimento_id',l.id).gt('expires_at',new Date().toISOString()).order('created_at',{ascending:false});S.fresquinhos=fr||[];}catch(e){}
try{const{data:prods,error}=await db.from('produtos').select('*').eq('estabelecimento_id',l.id).eq('disponivel',true).order('created_at',{ascending:false});if(error)throw error;let produtos=prods||[];const gIds=[...new Set(produtos.filter(p=>p.grupo_adicional_id).map(p=>p.grupo_adicional_id))];if(gIds.length){const{data:grupos}=await db.from('grupos_adicionais').select('*').in('id',gIds);const gMap={};(grupos||[]).forEach(g=>gMap[g.id]=g);produtos.forEach(p=>{if(p.grupo_adicional_id)p.grupo_adicionais=gMap[p.grupo_adicional_id]||null;});}S.produtos=produtos;}catch(e){S.produtos=[];}
render();}

function abrirItem(prodId){const p=S.produtos?.find(x=>x.id===prodId);if(!p)return;S.itemAtual=p;S.adicionaisSel={};S.qtdAtual=1;goTo('item');}

// RENDER
function render(){
const screens={home:renderHome,search:renderSearch,store:renderStore,item:renderItem,cart:renderCart,checkout:renderCheckout,confirm:renderConfirm,orders:renderOrders};
const html=(screens[S.screen]||renderHome)();
const story=S.storyIdx!==undefined?renderStoryViewer():'';
document.getElementById('app').innerHTML=html+story;}

let _rip=null;function renderInPlace(){clearTimeout(_rip);_rip=setTimeout(render,0);}
let _srchT=null;
function onBusca(v){S.busca=v;clearTimeout(_srchT);_srchT=setTimeout(()=>{const el=document.querySelector('#srch-inp');const pos=[el?.selectionStart,el?.selectionEnd];render();const nel=document.querySelector('#srch-inp');if(nel){nel.focus();try{nel.setSelectionRange(...pos);}catch(e){}}},50);}

// INIT
async function init(){
try{const r=await fetch(IBGE+'/estados?orderBy=nome');S._estados=await r.json();}catch(e){}
render();
const{data}=await db.from('estabelecimentos').select('id,nome,slug,logo_url,cidade,aberto,taxa_entrega,tempo_entrega,faz_entrega,faz_retirada,endereco,cor_primaria').order('nome');
if(data){S.lojas=data.map((l,i)=>({...l,_idx:i,_emoji:EMOJIS[i%EMOJIS.length],_bg:l.cor_primaria||BGS[i%BGS.length]}));}else{S.lojas=[];}
try{const{data:prs}=await db.from('produtos').select('id,nome,preco,desconto_percent,estabelecimento_id').eq('em_promocao',true).gt('desconto_percent',0).eq('disponivel',true);if(prs?.length){S.promoItems=prs.map(p=>{const pn=parseFloat(p.preco||0),d=parseInt(p.desconto_percent||0);return{id:p.id,name:p.nome,desconto:d,estabelecimento_id:p.estabelecimento_id,preco_original:fmt(pn),preco_promo:fmt(pn*(1-d/100))};});S.lojas.forEach(l=>{l.tem_promo=S.promoItems.some(p=>p.estabelecimento_id===l.id);});}else{S.promoItems=[];}}catch(e){S.promoItems=[];}
if(S.user?.cidade)S.cidade=S.user.cidade;
if(!S.user)setTimeout(()=>{S.showPerfilModal=true;render();},800);
render();}

init();
</script>
