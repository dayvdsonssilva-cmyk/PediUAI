<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PEDIUAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#E05A3A;--red-d:#b84425;--dark:#1A0A08;--mid:#5C3D35;--gray:#9B7B72;
  --light:#FFF9F7;--cream:#FFF3EE;--card:#FFFFFF;--border:rgba(26,10,8,.08);
  --font:'Poppins',sans-serif;
  /* store theme (dynamic) */
  --st-red:#C0392B;--st-red2:#a93226;
}
html,body{height:100%;overflow:hidden;background:var(--light);font-family:var(--font);}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--light);}
.screen.active{display:flex;}

/* ── NAV ── */
.bottom-nav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;font-family:var(--font);font-size:10px;font-weight:600;color:var(--gray);position:relative;transition:color .15s;}
.nav-item.active{color:var(--red);}
.nav-item svg{width:22px;height:22px;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);min-width:16px;height:16px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* ── HEADER ── */
.top-header{flex-shrink:0;background:rgba(255,249,247,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo-text{font-size:1.3rem;font-weight:900;letter-spacing:-.03em;color:var(--dark);}
.logo-text .way{color:var(--red);}
.avatar-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cart-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}

/* ── HERO BANNER ── */
.hero-banner{background:linear-gradient(135deg,#1A0A08 0%,#3D1A10 60%,#1A0A08 100%);border-radius:18px;overflow:hidden;position:relative;min-height:150px;padding:22px 22px 18px;}
.hero-banner::after{content:'🍽️';position:absolute;right:-12px;bottom:-18px;font-size:84px;opacity:.08;pointer-events:none;}

/* ── CATEGORIES ── */
.cat-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.cat-pill.active{background:var(--red);border-color:var(--red);color:#fff;}
.scroll-x{overflow-x:auto;scrollbar-width:none;display:flex;gap:8px;padding:14px 18px 6px;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── STORE CARD ── */
.store-card{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(26,10,8,.07);border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.store-card:active{transform:scale(.99);}
.store-hero{height:120px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.store-hero-logo{width:72px;height:72px;border-radius:18px;object-fit:cover;border:3px solid rgba(255,255,255,.3);box-shadow:0 4px 16px rgba(0,0,0,.35);display:block;}
.store-hero-emoji{width:72px;height:72px;border-radius:18px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid rgba(255,255,255,.2);}
.store-info{padding:12px 14px 14px;}
.store-name{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Card B — horizontal: logo grande + info lado a lado */
.store-card-b{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(26,10,8,.07);border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:stretch;}
.store-card-b:active{transform:scale(.98);}
.store-card-b-img{width:110px;flex-shrink:0;position:relative;overflow:hidden;}
.store-card-b-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.store-card-b-img .store-card-b-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;}
.store-card-b-body{flex:1;padding:14px 14px 12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.store-card-b-nome{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.store-card-b-meta{display:flex;gap:5px;flex-wrap:wrap;}
.store-card-b-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--gray);font-weight:500;background:var(--cream);padding:3px 7px;border-radius:6px;}
.store-emoji{font-size:48px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}

.store-name{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:5px;}
.store-meta{display:flex;gap:8px;flex-wrap:wrap;}
.store-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--gray);font-weight:500;background:var(--cream);padding:3px 8px;border-radius:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* ── SEARCH INPUT ── */
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px;box-shadow:0 2px 8px rgba(26,10,8,.06);}
.search-box input{border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--dark);outline:none;width:100%;}
.search-box input::placeholder{color:var(--gray);}

/* ── BACK HEADER ── */
.back-header{flex-shrink:0;background:rgba(255,249,247,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ══════════════════════════════════════
   STORE SCREEN — Cardápio
══════════════════════════════════════ */
/* Capa do estabelecimento */
.store-capa{flex-shrink:0;background:var(--st-red,#C0392B);}
.loja-capa-header{display:flex;align-items:center;gap:14px;padding:18px 16px 10px;}
.loja-capa-logo{width:68px;height:68px;border-radius:16px;flex-shrink:0;background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.loja-capa-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.loja-capa-nome{font-size:17px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:2px;}
.loja-capa-desc{font-size:11px;color:rgba(255,255,255,.7);line-height:1.4;}
.loja-capa-meta{display:flex;gap:6px;padding:6px 16px 14px;flex-wrap:wrap;}
.loja-capa-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.22);backdrop-filter:blur(4px);border-radius:7px;padding:4px 9px;font-size:10px;font-weight:600;color:#fff;}
.badge-capa{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:#fff;font-weight:600;}

/* Tabs */
.store-tabs{flex-shrink:0;display:flex;background:var(--card);border-bottom:1px solid var(--border);}
.store-tab{flex:1;padding:12px 4px;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2.5px solid transparent;transition:all .15s;}
.store-tab.active{color:var(--st-red);border-bottom-color:var(--st-red);}
.tab-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--st-red);margin-left:4px;flex-shrink:0;}
.tab-dot.show{display:inline-block;}

/* Fresquinho */
.fresquinho-wrap{flex-shrink:0;padding:12px 0 12px 14px;border-bottom:1px solid var(--border);background:var(--card);}
.story-thumb{width:64px;height:64px;border-radius:16px;overflow:hidden;position:relative;flex-shrink:0;cursor:pointer;border:2.5px solid var(--st-red);}
.story-thumb img,.story-thumb video{width:100%;height:100%;object-fit:cover;}
.story-timer{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.story-viewer{display:none;position:fixed;inset:0;background:#000;z-index:9999;flex-direction:column;}
.story-viewer.open{display:flex;}
.story-bars{display:flex;gap:4px;padding:12px 14px 0;}
.story-bar-bg{flex:1;height:3px;background:rgba(255,255,255,.35);border-radius:2px;overflow:hidden;}
.story-bar-fill{height:100%;background:#fff;width:0%;border-radius:2px;}

/* Filtros categorias */
.filtro-pill{display:inline-flex;align-items:center;padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.filtro-pill.ativo{background:var(--st-red);border-color:var(--st-red);color:#fff;}

/* Produto card */
.produto-card{background:var(--card);border-radius:14px;overflow:hidden;display:flex;align-items:stretch;box-shadow:0 1px 8px rgba(26,10,8,.07);border:1px solid var(--border);cursor:pointer;transition:transform .12s;}
.produto-card:active{transform:scale(.99);}
.produto-img-wrap{width:100px;height:auto;min-height:100px;min-width:100px;overflow:hidden;background:var(--cream);flex-shrink:0;align-self:stretch;}
.produto-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;min-height:100px;}
.produto-emoji-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;}

.produto-body{flex:1;padding:12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.produto-cat{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px;}
.produto-nome{font-size:13px;font-weight:800;color:var(--dark);line-height:1.3;margin-bottom:3px;}
.produto-desc{font-size:11px;color:var(--gray);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.produto-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.produto-preco{font-size:15px;font-weight:800;color:var(--st-red);}
.produto-preco-orig{font-size:11px;color:var(--gray);text-decoration:line-through;}
.btn-mais{width:32px;height:32px;border-radius:10px;background:var(--st-red);color:#fff;border:none;font-size:1.3rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-ver{padding:6px 12px;border-radius:8px;background:var(--cream);border:none;font-family:var(--font);font-size:11px;font-weight:700;color:var(--st-red);cursor:pointer;}

/* Modal produto */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:800;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:rgba(26,10,8,.15);border-radius:2px;margin:12px auto 0;}
.modal-img{width:100%;display:block;max-height:260px;object-fit:cover;}
.modal-emoji{display:flex;align-items:center;justify-content:center;font-size:80px;padding:32px;background:var(--cream);}
.modal-body{padding:18px 18px 24px;}
.modal-cat{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.modal-nome{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:6px;}
.modal-desc{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px;}
.modal-preco{font-size:20px;font-weight:900;color:var(--st-red);margin-bottom:16px;}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.qty-btn{width:36px;height:36px;border-radius:10px;background:var(--cream);border:none;font-size:1.3rem;font-weight:800;cursor:pointer;color:var(--dark);}
.qty-num{font-size:18px;font-weight:800;color:var(--dark);min-width:24px;text-align:center;}
.adicional-grupo{margin-bottom:14px;}
.adicional-titulo{font-size:12px;font-weight:800;color:var(--dark);margin-bottom:6px;}
.adicional-sub{font-size:10px;color:var(--gray);margin-bottom:8px;}
.adicional-opcao{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid #e0dbd5;border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .15s;}
.adicional-opcao .adic-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all .15s;}
.btn-add-cart{width:100%;padding:14px;border-radius:14px;background:var(--st-red);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;transition:background .15s;}
.btn-add-cart:hover{background:var(--st-red2,#b84425);}

/* FAB carrinho */
.fab-bar{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);max-width:460px;width:calc(100% - 16px);background:var(--dark);border-radius:16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:700;display:none;cursor:pointer;}
.fab-bar.show{display:flex;}

/* ══ CARRINHO / CHECKOUT ══ */
.cart-loja-header{padding:14px 18px 8px;border-top:1px solid var(--border);margin-top:4px;}
.cart-loja-nome{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:2px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);}
.cart-item-nome{font-size:13px;font-weight:700;color:var(--dark);flex:1;}
.cart-item-adic{font-size:10px;color:var(--gray);line-height:1.5;}
.cart-item-preco{font-size:13px;font-weight:800;color:var(--st-red);white-space:nowrap;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-ctrl button{width:26px;height:26px;border-radius:8px;background:var(--cream);border:none;font-size:1rem;font-weight:800;cursor:pointer;color:var(--dark);}
.checkout-section{padding:16px 18px;border-top:1px solid var(--border);}
.checkout-label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.checkout-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--light);font-family:var(--font);font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;margin-bottom:8px;}
.checkout-input:focus{border-color:var(--st-red);}
.pag-opt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.pag-btn{padding:9px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;transition:all .15s;}
.pag-btn.ativo{background:var(--st-red);border-color:var(--st-red);color:#fff;}
.resumo-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mid);padding:4px 0;}
.resumo-total{font-size:16px;font-weight:900;color:var(--dark);}
.btn-finalizar{width:100%;padding:16px;border-radius:14px;background:var(--st-red);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;}

/* ── MEUS PEDIDOS ── */
.pedido-card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(26,10,8,.05);}
.pedido-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;}

/* ── PERFIL MODAL ── */
.perfil-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.perfil-modal.open{display:flex;}
.perfil-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
.form-field{margin-bottom:12px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--light);font-family:var(--font);font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--red);}
.form-input:disabled{opacity:.5;}
.form-input option{background:#fff;}
.btn-primary{width:100%;padding:14px;border-radius:14px;background:var(--red);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;}
.btn-ghost{width:100%;padding:12px;border-radius:14px;background:transparent;color:var(--gray);border:1.5px solid var(--border);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CARROSSEL BANNER ── */
.promo-carousel{position:relative;border-radius:18px;overflow:hidden;min-height:150px;}
.promo-slides{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.promo-slide{min-width:100%;padding:24px 22px 20px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.promo-slide::after{content:'';position:absolute;right:-20px;bottom:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.07);}
.carousel-dots{display:flex;gap:5px;justify-content:center;margin-top:10px;}
.carousel-dot{height:5px;border-radius:3px;background:rgba(255,255,255,.35);transition:all .3s;cursor:pointer;}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--gray);line-height:1.6;}


</style>
</head>
<body>
<div id="app">

  <!-- ══ STORY VIEWER ══ -->
  <div id="story-viewer" class="story-viewer">
    <div style="padding:50px 14px 12px;position:relative;z-index:2;flex-shrink:0;">
      <div class="story-bars" id="story-bars" style="padding:0;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;">🏪</div>
          <span id="story-loja-nome" style="font-size:13px;font-weight:700;color:#fff;"></span>
        </div>
        <button onclick="fecharStory()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
    </div>
    <div style="flex:1;position:relative;" onclick="storyTap(event)">
      <div id="story-bg" style="position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPA_URL = 'https://nmttkjmfazcipefeakkx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdHRram1mYXpjaXBlZmVha2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTM3NjQsImV4cCI6MjA5MDI4OTc2NH0.MMTX_6iQJk7Uv3HPSk0m32_BihvqsWhHJ_qiRkw0WYo';
const IBGE = 'https://servicodados.ibge.gov.br/api/v1/localidades';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let _user     = null;
let _lojas    = [];
let _catAtiva = 'all';
let _busca    = '';
let _cidade   = '';
let _screen   = 'home';
let _prevScreen = 'home';

// Store atual
let _loja     = null;
let _produtos = [];
let _prodMap  = new Map();
let _prodAtual= null;
let _qtdAtual = 1;
let _tabAtiva = 'cardapio';
let _opcaoEntrega = 'entrega';
let _opcaoPag     = 'pix';
let _precisaTroco = false;

// Carrinho multi-loja: { [estabId]: { loja, itens:[] } }
let _carrinhos = {};

// Stories
let _stories = [], _storyIdx = 0, _storyTimer = null;

// Polling pedidos
let _pollingId = null;
let _statusAnt = {};

const CATS = [
  {id:'all',    label:'Todos',      emoji:'🍽️'},
  {id:'promo',  label:'Promoção',   emoji:'🔥'},
  {id:'burger', label:'Burger',     emoji:'🍔'},
  {id:'pizza',  label:'Pizza',      emoji:'🍕'},
  {id:'acai',   label:'Açaí',       emoji:'🍇'},
  {id:'restaurante',label:'Restaurante',emoji:'🥘'},
  {id:'lanche', label:'Lanches',    emoji:'🥪'},
];

const $ = id => document.getElementById(id);
const fmt = v => 'R$ ' + Number(v||0).toFixed(2).replace('.',',');

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  // Carrega usuário
  try { const s = localStorage.getItem('pw_cliente'); if(s) _user = JSON.parse(s); } catch(e){}
  if(_user?.nome) {
    $('home-avatar').textContent = _user.nome[0].toUpperCase();
    $('search-avatar').textContent = _user.nome[0].toUpperCase();
    if(_user.cidade) { _cidade = _user.cidade; $('home-cidade').textContent = '📍 ' + _cidade; $('home-cidade').style.display='block'; }
  }

  // Carrega estados IBGE em background
  carregarEstados();

  // Carrega lojas
  const {data, error} = await db.from('estabelecimentos')
    .select('id,nome,slug,logo_url,cor_primaria,cidade,aberto,descricao,taxa_entrega,tempo_entrega,faz_entrega,faz_retirada,whatsapp,promocao_ativa,desconto_percent')
    .order('nome');
  if(!error) {
    _lojas = (data||[]).map(l => ({
      ...l,
      _emoji: lojaEmoji(l.nome),
      _bg: l.cor_primaria||'#C0392B',
    }));
    renderHome();
    renderBanner();
    renderSearchCats();
  }

  // Modal primeira visita
  if(!_user) setTimeout(() => abrirPerfil(true), 700);

  // Carrega pedidos salvos
  renderOrders();

  // Inicia polling
  _pollingId = setInterval(pollarPedidos, 5000);
}

// ═══════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════
function showScreen(name) {
  if(name !== 'store' && name !== 'cart' && name !== 'orders') _prevScreen = _screen;
  _screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const scEl = $('screen-'+name);
  if(scEl) scEl.classList.add('active');
  // nav
  ['home','search','cart','orders'].forEach(n => {
    $('nav-'+n)?.classList.toggle('active', n===name);
  });
  if(name==='cart') renderCarrinho();
  if(name==='orders') renderOrders();
  if(name==='search') setTimeout(()=>$('search-input')?.focus(), 150);
  atualizarFab(name);
}

function voltarHome() { showScreen('home'); }
function voltarDo(from) {
  if(from==='cart') showScreen(_loja ? 'store' : 'home');
  else showScreen(_prevScreen||'home');
}

// ═══════════════════════════════════════════════════════
// HOME RENDER
// ═══════════════════════════════════════════════════════
function renderHome() {
  // Categories
  const catsEl = $('home-cats');
  catsEl.innerHTML = CATS.map(c =>
    `<div class="cat-pill${_catAtiva===c.id?' active':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.label}</div>`
  ).join('');

  // Lojas
  const filtered = filtrarLojas();
  $('home-lojas-title').textContent = (CATS.find(c=>c.id===_catAtiva)?.label||'Todos') + ' os restaurantes';
  const grid = $('home-grid');
  if(!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Nenhum restaurante</div><div class="empty-desc">Tente outra cidade ou categoria</div></div>';
  } else {
    grid.innerHTML = filtered.map(l => storeCardHTML(l)).join('');
  }
  atualizarCartBtn();
}

function filtrarPorDesconto(pct) {
  // Pega itens com >= pct% de desconto
  const itens = _promoItems.filter(item => item.desconto >= pct);
  if(!itens.length) {
    toast('Nenhuma promoção de ' + pct + '% no momento');
    return;
  }
  abrirTelaPromos(pct, itens);
}

function abrirTelaPromos(pct, itens) {
  const el = $('screen-promos');
  if(!el) return;

  $('promos-title').textContent = '-' + pct + '% OFF ou mais';

  const html = itens.map(item => {
    const loja = _lojas.find(l => l.id === item.estabelecimento_id) || {};
    const precoOrig = parseFloat(item.preco || 0);
    const precoDesc = precoOrig * (1 - item.desconto / 100);
    const lojaHex = normalizeHex(loja.cor_primaria || '#C0392B');
    return `<div style="background:#fff;border-radius:16px;overflow:hidden;display:flex;align-items:stretch;box-shadow:0 1px 8px rgba(26,10,8,.07);border:1px solid rgba(26,10,8,.07);cursor:pointer;margin-bottom:10px;" onclick="abrirLoja('${loja.id || ''}')">
      <div style="width:96px;min-height:96px;flex-shrink:0;background:${lojaHex}22;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;">
        ${item.foto_url ? `<img src="${item.foto_url}" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;">` : (loja._emoji || '🍽️')}
        <div style="position:absolute;top:6px;left:6px;background:#E05A3A;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;">-${item.desconto}%</div>
      </div>
      <div style="flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between;">
        <div>
          <div style="font-size:10px;font-weight:700;color:#9B7B72;text-transform:uppercase;margin-bottom:2px;">${loja.nome || ''}</div>
          <div style="font-size:14px;font-weight:800;color:#1A0A08;margin-bottom:4px;">${item.name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#9B7B72;text-decoration:line-through;">${fmt(precoOrig)}</span>
          <span style="font-size:16px;font-weight:900;color:#E05A3A;">${fmt(precoDesc)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  $('promos-list').innerHTML = html;
  showScreen('promos');
}

function filtrarLojas() {
  return _lojas.filter(l => {
    const mc = !_cidade || (l.cidade||'').trim() === _cidade;
    const mb = !_busca  || (l.nome||'').toLowerCase().includes(_busca.toLowerCase());
    if(_catAtiva==='promo') return mc && mb && l.promocao_ativa;
    if(_catAtiva==='all')   return mc && mb;
    const n = (l.nome||'').toLowerCase();
    const m = {burger:['burger','hamburguer','smash'],pizza:['pizza','pizzaria'],acai:['açaí','acai'],restaurante:['restaurante','marmita'],lanche:['lanche','sanduíche','tapioca']};
    return mc && mb && (m[_catAtiva]||[]).some(k=>n.includes(k));
  });
}

function setCat(id) { _catAtiva=id; renderHome(); }

function toggleCardStyle() {
  _cardStyle = _cardStyle === 'A' ? 'B' : 'A';
  const btn = $('toggle-card-btn');
  if(btn) btn.textContent = _cardStyle === 'A' ? '⊞' : '☰';
  renderHome();
}

let _cardStyle = 'A';

function storeCardHTML(l) {
  const ab = l.aberto!==false;
  const temPromo = l.promocao_ativa && l.desconto_percent>0;
  if(_cardStyle === 'B') return storeCardHTMLb(l, ab, temPromo);
  const hex = normalizeHex(l.cor_primaria||'#C0392B');
  const logoContent = l.logo_url
    ? `<img class="store-hero-logo" src="${l.logo_url}" alt="${l.nome}" onerror="this.outerHTML='<div class=store-hero-emoji>${l._emoji}</div>'">`
    : `<div class="store-hero-emoji">${l._emoji}</div>`;
  return `<div class="store-card" onclick="abrirLoja('${l.id}')">
    <div class="store-hero" style="background:linear-gradient(160deg,${hex}cc,${darken(hex,35)}ff);">
      <!-- esferas deco -->
      <div style="position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07);top:-40px;right:-30px;pointer-events:none;"></div>
      <div style="position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-20px;left:10px;pointer-events:none;"></div>
      <!-- logo centralizada -->
      <div style="position:relative;z-index:2;">${logoContent}</div>
      ${!ab?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:3;"><span style="color:#fff;font-size:12px;font-weight:700;background:rgba(0,0,0,.4);padding:5px 12px;border-radius:8px;">Fechado</span></div>`:''}
      ${temPromo?`<div style="position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:7px;z-index:3;">🔥 -${l.desconto_percent}%</div>`:''}
    </div>
    <div class="store-info">
      <div class="store-name">${l.nome}</div>
      <div class="store-meta">
        <div class="store-tag"><span class="status-dot" style="background:${ab?'#22C55E':'#EF4444'};"></span>${ab?'Aberto':'Fechado'}</div>
        ${l.tempo_entrega?`<div class="store-tag">⏱ ${l.tempo_entrega}</div>`:`<div class="store-tag">⏱ 25–40 min</div>`}
        ${l.taxa_entrega>0?`<div class="store-tag">🛵 ${fmt(l.taxa_entrega)}</div>`:`<div class="store-tag" style="color:#22A85A;font-weight:700;">🛵 Grátis</div>`}
        ${l.cidade?`<div class="store-tag">📍 ${l.cidade}</div>`:''}
      </div>
    </div>
  </div>`;
}

// Card estilo B: horizontal com imagem à esquerda
function storeCardHTMLb(l, ab, temPromo) {
  const imgContent = l.logo_url
    ? `<img src="${l.logo_url}" alt="${l.nome}" onerror="this.style.display='none'">`
    : `<div class="store-card-b-emoji">${l._emoji}</div>`;
  return `<div class="store-card-b" onclick="abrirLoja('${l.id}')">
    <div class="store-card-b-img" style="background:${l._bg}18;">
      ${imgContent}
      ${!ab?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-size:11px;font-weight:700;background:rgba(0,0,0,.35);padding:4px 10px;border-radius:7px;">Fechado</span></div>`:''}

    </div>
    <div class="store-card-b-body">
      <div>
        <div class="store-card-b-nome">${l.nome}</div>
        ${l.descricao?`<div style="font-size:11px;color:var(--gray);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${l.descricao}</div>`:''}
      </div>
      <div class="store-card-b-meta">
        <span class="store-card-b-tag" style="color:${ab?'#16A34A':'#DC2626'};background:${ab?'rgba(22,163,74,.08)':'rgba(220,38,38,.08)'};">
          <span style="width:5px;height:5px;border-radius:50%;background:${ab?'#22C55E':'#EF4444'};display:inline-block;"></span>
          ${ab?'Aberto':'Fechado'}
        </span>
        ${l.tempo_entrega?`<span class="store-card-b-tag">⏱ ${l.tempo_entrega}</span>`:`<span class="store-card-b-tag">⏱ 25–40 min</span>`}
        ${l.taxa_entrega>0?`<span class="store-card-b-tag">🛵 ${fmt(l.taxa_entrega)}</span>`:`<span class="store-card-b-tag" style="color:#16A34A;font-weight:700;">🛵 Grátis</span>`}
      </div>
    </div>
  </div>`;
}

// CARROSSEL BANNER

let _bannerTimer=null, _bannerIdx=0, _promoItems=[], _carouselSlides=[];

// Slides fixos de desconto + slides de promoções reais
const SLIDES_FIXOS = [
  { desconto:10, cor1:'#1A0A08', cor2:'#3D1A10', emoji:'🔥', label:'Economize hoje' },
  { desconto:20, cor1:'#0F1A3D', cor2:'#1A2D6B', emoji:'⚡', label:'Oferta especial' },
  { desconto:30, cor1:'#1A0A1A', cor2:'#3D0F3D', emoji:'🎉', label:'Super desconto' },
];

async function renderBanner() {
  // Carrega promos reais do banco
  try {
    const {data} = await db.from('produtos')
      .select('id,nome,preco,desconto_percent,estabelecimento_id')
      .eq('em_promocao',true).gt('desconto_percent',0).eq('disponivel',true);
    _promoItems = (data||[]).map(p => ({
      ...p, name:p.nome, desconto:parseInt(p.desconto_percent||0),
      preco_com_desc: parseFloat(p.preco||0)*(1-parseInt(p.desconto_percent||0)/100),
    }));
  } catch(e) { _promoItems = []; }

  // Monta slides: promos reais primeiro, depois os fixos de demo
  _carouselSlides = [
    ..._promoItems.map(item => {
      const loja = _lojas.find(l=>l.id===item.estabelecimento_id)||{};
      return { tipo:'real', item, loja };
    }),
    ...SLIDES_FIXOS.map(s => ({ tipo:'demo', ...s })),
  ];
  _bannerIdx = 0;
  buildCarousel();
  iniciarTimer();
}

function buildCarousel() {
  const slides = _carouselSlides;
  if(!slides.length) return;

  const slidesHTML = slides.map((s,i) => {
    if(s.tipo==='real') {
      const {item,loja} = s;
      return `<div class="promo-slide" style="background:linear-gradient(135deg,#1A0A08,#3D1A10);cursor:pointer;" onclick="abrirLoja('${loja.id||''}')">
        <div>
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">🔥 Promoção ativa</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
              ${loja.logo_url?`<img src="${loja.logo_url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`:`<span style="font-size:20px;">${loja._emoji||'🍽️'}</span>`}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;color:rgba(255,255,255,.55);">${loja.nome||''}</div>
              <div style="font-size:15px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.name}</div>
            </div>
            <div style="background:#FFD166;border-radius:10px;padding:6px 12px;text-align:center;flex-shrink:0;">
              <div style="font-size:18px;font-weight:900;color:#1A0A08;line-height:1;">-${item.desconto}%</div>
              <div style="font-size:9px;font-weight:700;color:rgba(26,10,8,.6);">OFF</div>
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
          <div>
            <span style="font-size:12px;color:rgba(255,255,255,.4);text-decoration:line-through;">${fmt(item.preco)}</span>
            <span style="font-size:16px;font-weight:900;color:#FFD166;margin-left:8px;">${fmt(item.preco_com_desc)}</span>
          </div>
          <span style="font-size:11px;color:rgba(255,255,255,.55);">Ver oferta →</span>
        </div>
      </div>`;
    } else {
      // Slide de demo com percentual
      return `<div class="promo-slide" style="background:linear-gradient(135deg,${s.cor1},${s.cor2});cursor:pointer;" onclick="filtrarPorDesconto(${s.desconto})">
        <div>
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">${s.label}</div>
          <div style="font-size:44px;font-weight:900;color:#FFD166;line-height:1;">-${s.desconto}%</div>
          <div style="font-size:24px;font-weight:900;color:#fff;line-height:1.2;margin-top:2px;">OFF</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
          <div style="font-size:13px;color:rgba(255,255,255,.65);line-height:1.4;">${s.emoji} Em itens selecionados<br>dos restaurantes parceiros</div>
          <div style="background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;">Ver lojas →</div>
        </div>
      </div>`;
    }
  }).join('');

  const dotsHTML = slides.length>1 ? `<div class="carousel-dots" id="carousel-dots">
    ${slides.map((_,i)=>`<div class="carousel-dot" id="cdot-${i}" style="width:${i===0?'18':'6'}px;background:${i===0?'rgba(26,10,8,.5)':'rgba(26,10,8,.18)'};" onclick="irSlide(${i})"></div>`).join('')}
  </div>` : '';

  $('banner-wrap').innerHTML = `<div style="padding:14px 18px 0;">
    <div class="promo-carousel" id="promo-carousel" style="border-radius:18px;box-shadow:0 2px 12px rgba(26,10,8,.1);">
      <div class="promo-slides" id="promo-slides" style="transform:translateX(0%);">${slidesHTML}</div>
    </div>
    ${dotsHTML}
  </div>`;
}

function irSlide(idx) {
  clearTimeout(_bannerTimer);
  _bannerIdx = idx;
  const el = $('promo-slides');
  if(el) el.style.transform = `translateX(-${idx*100}%)`;
  atualizarDots(idx);
  iniciarTimer();
}

function atualizarDots(idx) {
  _carouselSlides.forEach((_,i) => {
    const d=$('cdot-'+i); if(!d) return;
    d.style.width   = i===idx ? '18px' : '6px';
    d.style.background = i===idx ? 'rgba(26,10,8,.5)' : 'rgba(26,10,8,.18)';
  });
}

function iniciarTimer() {
  clearTimeout(_bannerTimer);
  if(_carouselSlides.length<2) return;
  _bannerTimer = setTimeout(() => {
    _bannerIdx = (_bannerIdx+1) % _carouselSlides.length;
    irSlide(_bannerIdx);
  }, 3500);
}

async function abrirLoja(id) {
  const loja = _lojas.find(l => l.id===id); if(!loja) return;
  _loja = loja;
  _produtos = [];
  _prodMap.clear();
  _tabAtiva = 'cardapio';

  // Aplica tema da loja
  const hex = normalizeHex(loja.cor_primaria||'#C0392B');
  document.documentElement.style.setProperty('--st-red', hex);
  document.documentElement.style.setProperty('--st-red2', darken(hex,20));

  // Header — só nome, sem badge de promo
  $('store-header-nome').textContent = loja.nome;
  // Remove any leftover promo badge from nav
  const oldBadge = document.querySelector('.store-promo-nav-badge');
  if(oldBadge) oldBadge.remove();
  $('store-content').innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--gray);font-size:13px;">Carregando cardápio...</div>`;
  showScreen('store');
  atualizarCarrinhoBtns();

  // Carrega dados em paralelo
  const [prodRes, frRes] = await Promise.all([
    db.from('produtos').select('*').eq('estabelecimento_id', loja.id).eq('disponivel', true).order('created_at',{ascending:false}),
    db.from('fresquinhos').select('*').eq('estabelecimento_id', loja.id).gt('expires_at', new Date().toISOString()).order('created_at',{ascending:false})
  ]);

  _produtos = prodRes.data||[];
  const fresquinhos = frRes.data||[];

  // Carrega grupos de adicionais
  const gIds = [...new Set(_produtos.filter(p=>p.grupo_adicional_id).map(p=>p.grupo_adicional_id))];
  if(gIds.length) {
    try {
      const {data:grupos} = await db.from('grupos_adicionais').select('*').in('id', gIds);
      const gMap = {}; (grupos||[]).forEach(g=>{ gMap[g.id]=g; });
      _produtos.forEach(p => { if(p.grupo_adicional_id) p.grupo_adicionais = gMap[p.grupo_adicional_id]||null; });
    } catch(e){}
  }

  _produtos.forEach(p => _prodMap.set(p.id, p));
  renderStore(fresquinhos);
}

function renderStore(fresquinhos=[]) {
  const l = _loja;
  const ab = l.aberto!==false;
  const cats = ['Todos', ...new Set(_produtos.map(p=>p.categoria).filter(Boolean))];
  const promos = _produtos.filter(p=>p.promocao);
  const temPromo = promos.length>0;
  const temFresq = fresquinhos.length>0;

  // Fresquinho HTML
  const fresqHTML = temFresq ? `
    <div class="fresquinho-wrap">
      <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding:0 4px;">✨ Fresquinho</div>
      <div style="display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 4px 4px;">
        ${fresquinhos.map(f => {
          const rest = new Date(f.expires_at)-new Date();
          const h=Math.floor(rest/3600000), mn=Math.floor((rest%3600000)/60000);
          return `<div class="story-thumb" onclick="abrirStory('${f.url}','${f.tipo||'foto'}','${f.id}')">
            ${f.tipo==='video'?`<video src="${f.url}" muted playsinline loop preload="metadata" style="width:100%;height:100%;object-fit:cover;background:#000;"></video>`:
            `<img src="${f.url}" alt="" style="width:100%;height:100%;object-fit:cover;">`}
            <div class="story-timer">⏱ ${h>0?h+'h ':''} ${mn}min</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Filtros
  const filtrosHTML = `<div class="scroll-x" id="store-filtros">
    ${cats.map((c,i) => `<div class="filtro-pill${i===0?' ativo':''}" onclick="filtrarStore('${c}',this)">${c}</div>`).join('')}
  </div>`;

  $('store-content').innerHTML = `
    <!-- Capa igual ao cliente.html -->
    <div class="store-capa" style="background:${normalizeHex(l.cor_primaria||'#C0392B')};">
      <div class="loja-capa-header">
        <div class="loja-capa-logo">
          ${l.logo_url?`<img src="${l.logo_url}" alt="${l.nome}" onerror="this.style.display='none'">`:`${l._emoji}`}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="loja-capa-nome">${l.nome}</div>
          ${l.descricao?`<div class="loja-capa-desc">${l.descricao.slice(0,60)}${l.descricao.length>60?'...':''}</div>`:''}
        </div>
        <div class="loja-capa-badge" style="align-self:flex-start;">
          <span style="width:7px;height:7px;border-radius:50%;background:${ab?'#22C55E':'#EF4444'};"></span>
          ${ab?'Aberto':'Fechado'}
        </div>
      </div>
      <div class="loja-capa-meta">
        ${l.tempo_entrega?`<span class="loja-capa-badge">⏱ ${l.tempo_entrega}</span>`:`<span class="loja-capa-badge">⏱ 25–40 min</span>`}
        ${l.taxa_entrega>0?`<span class="loja-capa-badge">🛵 ${fmt(l.taxa_entrega)}</span>`:`<span class="loja-capa-badge" style="color:#4ade80;">🛵 Entrega grátis</span>`}
        ${l.cidade?`<span class="loja-capa-badge">📍 ${l.cidade}</span>`:''}
        ${l.whatsapp?`<span class="loja-capa-badge">📞 Contato</span>`:''}
      </div>
    </div>

    <!-- Tabs -->
    <div class="store-tabs">
      <button class="store-tab active" id="tab-cardapio" onclick="storeTab('cardapio',this)">CARDÁPIO</button>
      <button class="store-tab" id="tab-promo" onclick="storeTab('promo',this)" style="display:flex;align-items:center;justify-content:center;gap:4px;">PROMOÇÃO<span class="tab-dot${temPromo?' show':''}"></span></button>
      <button class="store-tab" id="tab-pedidos" onclick="storeTab('pedidos',this)">MEUS PEDIDOS</button>
    </div>

    <!-- Fresquinho -->
    ${fresqHTML}

    <!-- Conteúdo da tab -->
    <div id="tab-content-cardapio" class="tab-content">
      ${filtrosHTML}
      <div id="store-produtos" style="display:flex;flex-direction:column;gap:10px;padding:10px 14px 120px;"></div>
    </div>
    <div id="tab-content-promo" class="tab-content" style="display:none;">
      <div id="store-promos" style="display:flex;flex-direction:column;gap:10px;padding:14px 14px 120px;"></div>
    </div>
    <div id="tab-content-pedidos" class="tab-content" style="display:none;">
      <div id="store-pedidos" style="padding:14px 14px 100px;"></div>
    </div>
  `;

  renderStoreProdutos('Todos');
  renderStorePromos();
  renderStorePedidos();

  // Salva fresquinhos p/ story viewer
  window._storyFresq = fresquinhos;
}

function storeTab(tab, btn) {
  _tabAtiva = tab;
  document.querySelectorAll('.store-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  $('tab-content-'+tab).style.display='';
  if(tab==='pedidos') renderStorePedidos();
}

function filtrarStore(cat, btn) {
  document.querySelectorAll('#store-filtros .filtro-pill').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderStoreProdutos(cat);
}
window.filtrarStore = filtrarStore;

function renderStoreProdutos(cat) {
  const el = $('store-produtos'); if(!el) return;
  const filtrados = cat==='Todos' ? _produtos : _produtos.filter(p=>p.categoria===cat);
  el.innerHTML = filtrados.length ? filtrados.map(p=>produtoCardHTML(p)).join('') :
    '<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">Sem itens</div></div>';
}

function renderStorePromos() {
  const el = $('store-promos'); if(!el) return;
  const promos = _produtos.filter(p=>p.promocao||p.em_promocao);
  el.innerHTML = promos.length ? promos.map(p=>produtoCardHTML(p)).join('') :
    '<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">Sem promoções</div></div>';
}

function renderStorePedidos() {
  const el = $('store-pedidos'); if(!el) return;
  if(!_user) { el.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">Faça login para ver seus pedidos</div></div>'; return; }
  const slug = _loja?.slug;
  const peds = JSON.parse(localStorage.getItem('pw_peds_'+(slug||''))||'[]');
  if(!peds.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nenhum pedido aqui ainda</div></div>'; return; }
  el.innerHTML = peds.slice(0,10).map(p => pedidoCardHTML(p)).join('');
}

function pedidoCardHTML(p) {
  const STATUS = {
    novo:     { label:'Aguardando confirmação', cor:'#D97706', bg:'rgba(217,119,6,.1)',    icon:'⏳' },
    aceito:   { label:'Em preparo',             cor:'#EA580C', bg:'rgba(234,88,12,.1)',    icon:'🍳' },
    pronto:   { label:'Pronto para retirar',    cor:'#16A34A', bg:'rgba(22,163,74,.1)',    icon:'✅' },
    entregue: { label:'Entregue',               cor:'#16A34A', bg:'rgba(22,163,74,.08)',   icon:'🎉' },
    cancelado:{ label:'Cancelado',              cor:'#DC2626', bg:'rgba(220,38,38,.1)',    icon:'❌' },
  };
  const st = p.status||'novo';
  const s = STATUS[st]||STATUS.novo;

  // Barra de progresso visual
  const steps=['novo','aceito','pronto','entregue'];
  const stepIdx=steps.indexOf(st);
  const progressBar = st!=='cancelado' ? `
    <div style="display:flex;align-items:center;gap:4px;margin:10px 0 8px;">
      ${steps.map((step,i)=>{
        const done=i<=stepIdx;
        return `<div style="flex:1;height:4px;border-radius:2px;background:${done?s.cor:'rgba(26,10,8,.1)'};transition:background .4s;"></div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:${s.cor};font-weight:600;margin-bottom:8px;">${s.icon} ${s.label}</div>` : `
    <div style="margin:8px 0;"><span style="font-size:11px;color:#DC2626;font-weight:600;">❌ Pedido cancelado</span></div>`;

  return `<div class="pedido-card" style="border-left:3px solid ${s.cor};">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--gray);">Pedido #${String(p.id||'').slice(-4)||'----'}</div>
        ${p.lojaNome?`<div style="font-size:12px;font-weight:700;color:var(--dark);">${p.lojaNome}</div>`:''}
      </div>
      <span style="font-size:14px;font-weight:900;color:var(--dark);">${fmt(p.total)}</span>
    </div>
    ${progressBar}
    <div style="font-size:12px;color:var(--gray);line-height:1.5;">${(p.itens||[]).map(i=>i.qtd+'x '+i.nome).join(' · ')}</div>
  </div>`;
}

function produtoCardHTML(p) {
  const temPromoItem = p.promocao || p.em_promocao;
  return `<div class="produto-card" onclick="abrirProduto('${p.id}')">
    <div class="produto-img-wrap">
      ${p.foto_url
        ? `<img src="${p.foto_url}" alt="${p.nome}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div class="produto-emoji-bg">${p.emoji||'🍔'}</div>`}

    </div>
    <div class="produto-body">
      <div>
        <div class="produto-cat">${p.categoria||''}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-desc">${(p.descricao||'').slice(0,80)}${(p.descricao||'').length>80?'...':''}</div>
      </div>
      <div class="produto-footer">
        <div>
          ${(p.promocao||p.em_promocao)&&p.preco_original?`<div class="produto-preco-orig">${fmt(p.preco_original)}</div>`:''}
          <div class="produto-preco">${fmt(p.preco)}</div>
        </div>
        <button class="btn-mais" onclick="event.stopPropagation();adicionarDireto('${p.id}')">+</button>
      </div>
    </div>
  </div>`;
}

window.abrirProduto = function(id) {
  const p = _prodMap.get(id); if(!p) return;
  _prodAtual = p; _qtdAtual = 1;
  $('modal-qtd').textContent = 1;
  // Fotos
  const fotos = (p.fotos_urls&&p.fotos_urls.length)?p.fotos_urls:(p.foto_url?[p.foto_url]:[]);
  const media = $('modal-prod-media');
  if(fotos.length) {
    let fi=0;
    const dots=()=>fotos.map((_,i)=>`<div style="width:7px;height:7px;border-radius:50%;background:${i===fi?'#fff':'rgba(255,255,255,0.4)'};transition:background 0.2s"></div>`).join('');
    const renderF=()=>{ media.innerHTML=`<div style="position:relative;background:#000"><img class="modal-img" src="${fotos[fi]}" style="width:100%;display:block;max-height:260px;object-fit:cover;">${fotos.length>1?`<button onclick="_mfoto(-1)" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;">‹</button><button onclick="_mfoto(1)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:5;">›</button><div id="mdots" style="position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px">${dots()}</div>`:''}</div>`; };
    window._mfoto=dir=>{fi=(fi+dir+fotos.length)%fotos.length;const img=media.querySelector('img');if(img)img.src=fotos[fi];const d=$('mdots');if(d)d.innerHTML=dots();};
    renderF();
  } else {
    media.innerHTML=`<div class="modal-emoji">${p.emoji||'🍔'}</div>`;
  }
  $('modal-cat').textContent  = p.categoria||'';
  $('modal-nome').textContent = p.nome;
  $('modal-desc').textContent = p.descricao||'';
  $('modal-preco').textContent= fmt(p.preco);
  // Adicionais
  renderAdicionaisModal(p);
  $('modal-prod').classList.add('open');
  document.body.style.overflow='hidden';
};

function renderAdicionaisModal(p) {
  const el = $('modal-adicionais'); if(!el) return;
  const g = p.grupo_adicionais;
  if(!g || !g.opcoes) { el.innerHTML=''; return; }
  const opcoes = Array.isArray(g.opcoes)?g.opcoes:JSON.parse(g.opcoes||'[]');
  const min = parseInt(g.minimo||g.min||0), max = parseInt(g.maximo||g.max||opcoes.length);
  el.innerHTML = `<div class="adicional-grupo">
    <div class="adicional-titulo">${g.grupo||g.nome||'Adicionais'}</div>
    <div class="adicional-sub">${min>0?'Obrigatório: ':'Opcional: '}escolha até ${max}</div>
    <div id="aviso-adic" style="display:none;font-size:11px;color:var(--st-red);margin-bottom:6px;">Máximo de ${max} itens atingido</div>
    ${opcoes.map((o,i)=>`<label class="adicional-opcao" id="adic-lbl-${i}" onclick="toggleAdic(${i},${max})">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--dark);">${o.nome}</div>
        ${o.preco>0?`<div style="font-size:12px;color:var(--gray);">+ ${fmt(o.preco)}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="adic-cb-${i}" data-preco="${o.preco||0}" data-nome="${o.nome}" style="display:none;">
        <div class="adic-check" id="adic-chk-${i}">　</div>
      </div>
    </label>`).join('')}
  </div>`;
}

window.toggleAdic = function(i, max) {
  const cb=$('adic-cb-'+i), lbl=$('adic-lbl-'+i), chk=$('adic-chk-'+i);
  if(!cb) return;
  if(!cb.checked) {
    const total=document.querySelectorAll('[id^="adic-cb-"]:checked').length;
    if(total>=max){$('aviso-adic').style.display='block';setTimeout(()=>$('aviso-adic').style.display='none',2000);return;}
    cb.checked=true;lbl.style.borderColor='var(--st-red)';lbl.style.background='rgba(224,90,58,.05)';
    chk.style.background='var(--st-red)';chk.style.borderColor='var(--st-red)';chk.style.color='#fff';chk.textContent='✓';
  } else {
    cb.checked=false;lbl.style.borderColor='#e0dbd5';lbl.style.background='';
    chk.style.background='';chk.style.borderColor='#ddd';chk.style.color='';chk.textContent='　';
  }
};

window.mudaQtd = function(d) { _qtdAtual=Math.max(1,_qtdAtual+d); $('modal-qtd').textContent=_qtdAtual; };

window.fecharModal = function() { $('modal-prod').classList.remove('open'); _prodAtual=null; document.body.style.overflow=''; };

window.adicionarAoCarrinho = function() {
  if(!_prodAtual) return;
  const adics = [];
  document.querySelectorAll('[id^="adic-cb-"]:checked').forEach(cb => {
    adics.push({nome:cb.dataset.nome, preco:parseFloat(cb.dataset.preco||0)});
  });
  const extra = adics.reduce((s,a)=>s+a.preco,0);
  const item = {..._prodAtual, preco:_prodAtual.preco+extra, adicionais:adics};
  adicionarItem(item, _qtdAtual);
  fecharModal();
  toast('Adicionado! 🛒');
};

window.adicionarDireto = function(id) {
  const p = _prodMap.get(id); if(!p) return;
  if(p.grupo_adicionais) { abrirProduto(id); return; }
  adicionarItem(p, 1);
  toast(p.nome+' adicionado! 🛒');
};

// ═══════════════════════════════════════════════════════
// CARRINHO MULTI-LOJA
// ═══════════════════════════════════════════════════════
function adicionarItem(p, qtd) {
  const eid = _loja.id;
  if(!_carrinhos[eid]) _carrinhos[eid] = {loja:_loja, itens:[]};
  const c = _carrinhos[eid];
  if(p.adicionais&&p.adicionais.length) {
    c.itens.push({...p, qtd});
  } else {
    const idx = c.itens.findIndex(i=>i.id===p.id&&(!i.adicionais||!i.adicionais.length));
    if(idx>=0) c.itens[idx].qtd+=qtd;
    else c.itens.push({...p, qtd});
  }
  atualizarFab();
  atualizarCartBtn();
  atualizarCarrinhoBtns();
}

function cartTotal() {
  let t=0;
  Object.values(_carrinhos).forEach(c => c.itens.forEach(i=>t+=i.preco*i.qtd));
  return t;
}

function cartCount() {
  let n=0;
  Object.values(_carrinhos).forEach(c => c.itens.forEach(i=>n+=i.qtd));
  return n;
}

function atualizarFab(screen) {
  const sc = screen||_screen;
  const n=cartCount(), fab=$('fab-bar');
  if(!fab) return;
  if(n>0 && sc!=='cart') {
    fab.classList.add('show');
    $('fab-cnt').textContent=n;
    $('fab-total').textContent=fmt(cartTotal());
  } else {
    fab.classList.remove('show');
  }
  // Nav badge
  const nb=$('nav-cart-badge');
  if(nb){nb.textContent=n>0?n:'';nb.style.display=n>0?'flex':'none';}
}

function atualizarCartBtn() {
  const n=cartCount();
  const hb=$('home-cart-btn'), hc=$('home-cart-cnt');
  if(hb) hb.style.display=n>0?'flex':'none';
  if(hc) hc.textContent=n;
}

function atualizarCarrinhoBtns() {
  const eid=_loja?.id;
  const n = eid&&_carrinhos[eid] ? _carrinhos[eid].itens.reduce((s,i)=>s+i.qtd,0) : 0;
  const scb=$('store-cart-cnt');
  if(scb){scb.textContent=n>0?n:'';scb.style.display=n>0?'inline-flex':'none';}
}

// ═══════════════════════════════════════════════════════
// CARRINHO SCREEN — checkout em etapas
// ═══════════════════════════════════════════════════════
// Etapas: 1=Sacola, 2=Entrega, 3=Pagamento, 4=Confirmação
let _checkoutStep = {}; // { [lid]: 1|2|3|4 }
let _checkoutData = {}; // { [lid]: { opcaoEntrega, rua, num, compl, nome, tel, obs, pag } }

function getStep(lid) { return _checkoutStep[lid] || 1; }
function setStep(lid, step) { _checkoutStep[lid] = step; renderCarrinho(); }

window.nextStep = function(lid) { setStep(lid, getStep(lid)+1); };
window.prevStep = function(lid) { setStep(lid, getStep(lid)-1); };
window.goStep   = function(lid, s) { setStep(lid, s); };

function saveStepData(lid) {
  const d = _checkoutData[lid] || {};
  _checkoutData[lid] = {
    ...d,
    opcaoEntrega: d.opcaoEntrega||'entrega',
    rua:   $('rua-'+lid)?.value||d.rua||'',
    num:   $('num-'+lid)?.value||d.num||'',
    compl: $('compl-'+lid)?.value||d.compl||'',
    nome:  $('cli-nome-'+lid)?.value||d.nome||_user?.nome||'',
    tel:   $('cli-tel-'+lid)?.value||d.tel||_user?.tel||'',
    obs:   $('cli-obs-'+lid)?.value||d.obs||'',
    pag:   d.pag||'pix',
  };
}

function renderCarrinho() {
  const el=$('cart-content'); if(!el) return;
  const lojas=Object.values(_carrinhos).filter(c=>c.itens.length>0);
  if(!lojas.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Sacola vazia</div><div class="empty-desc">Adicione itens do cardápio</div></div>';
    return;
  }
  el.innerHTML = lojas.map(c => renderCheckoutLoja(c)).join('');
}

function renderCheckoutLoja(c) {
  const l = c.loja;
  const lid = l.id;
  const step = getStep(lid);
  const d = _checkoutData[lid] || {};

  const sub = c.itens.reduce((s,i)=>s+i.preco*i.qtd, 0);
  const taxa = parseFloat(l.taxa_entrega||0);
  const total = sub + (d.opcaoEntrega==='retirada' ? 0 : taxa);

  // Step indicator
  const steps = ['Itens','Entrega','Pagamento'];
  const stepBar = `<div style="display:flex;align-items:center;gap:0;margin-bottom:20px;">
    ${steps.map((s,i)=>{
      const n=i+1, done=step>n, active=step===n;
      return `
      <div style="display:flex;align-items:center;flex:1;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;">
          <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:${done?'pointer':'default'};
            background:${done?'#22C55E':active?'var(--st-red,#C0392B)':'rgba(26,10,8,.08)'};
            color:${done||active?'#fff':'var(--gray)'};
            transition:all .2s;" ${done?`onclick="goStep('${lid}',${n})"`:''}>
            ${done?'✓':n}
          </div>
          <div style="font-size:10px;font-weight:${active?'700':'500'};color:${active?'var(--st-red,#C0392B)':'var(--gray)'};">${s}</div>
        </div>
        ${i<2?`<div style="height:2px;flex:0 0 20px;background:${step>n+1?'#22C55E':step===n+1?'var(--st-red,#C0392B)':'rgba(26,10,8,.08)'};margin-bottom:14px;border-radius:1px;transition:background .3s;"></div>`:''}
      </div>`;
    }).join('')}
  </div>`;

  let content = '';

  // ── ETAPA 1: ITENS ──
  if(step===1) {
    content = `
    <div style="margin-bottom:16px;">
      ${c.itens.map((item,ii)=>`
      <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;color:var(--dark);">${item.nome}</div>
          ${item.adicionais&&item.adicionais.length?`<div style="font-size:11px;color:var(--gray);margin-top:2px;line-height:1.5;">${item.adicionais.map(a=>'+ '+a.nome).join(' · ')}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <button onclick="mudaCartItem('${lid}',${ii},-1)" style="width:28px;height:28px;border-radius:8px;background:var(--cream);border:none;font-size:1rem;font-weight:800;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;">−</button>
            <span style="font-size:14px;font-weight:700;color:var(--dark);min-width:18px;text-align:center;">${item.qtd}</span>
            <button onclick="mudaCartItem('${lid}',${ii},1)" style="width:28px;height:28px;border-radius:8px;background:var(--cream);border:none;font-size:1rem;font-weight:800;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;">+</button>
          </div>
          <span style="font-size:14px;font-weight:800;color:var(--st-red,#C0392B);min-width:60px;text-align:right;">${fmt(item.preco*item.qtd)}</span>
        </div>
      </div>`).join('')}
    </div>

    <div style="background:var(--cream);border-radius:12px;padding:14px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mid);margin-bottom:4px;"><span>Subtotal</span><span>${fmt(sub)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mid);"><span>Entrega</span><span>${taxa>0?fmt(taxa):'A calcular'}</span></div>
    </div>

    <button onclick="nextStep('${lid}')" style="width:100%;padding:15px;border-radius:14px;background:var(--st-red,#C0392B);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;">
      Continuar → Entrega
    </button>`;
  }

  // ── ETAPA 2: ENTREGA ──
  else if(step===2) {
    const temEnt = l.faz_entrega!==false;
    const temRet = l.faz_retirada!==false;
    const op = d.opcaoEntrega || (temEnt?'entrega':'retirada');
    content = `
    <div style="margin-bottom:18px;">
      <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Como quer receber?</div>
      <div style="display:flex;gap:10px;margin-bottom:18px;">
        ${temEnt?`<button id="btn-ent-${lid}" class="pag-btn${op==='entrega'?' ativo':''}"
          style="flex:1;padding:14px;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:4px;"
          onclick="setOpcaoEnt('${lid}','entrega')">
          <span style="font-size:22px;">🛵</span><span>Entrega</span>
          ${taxa>0?`<span style="font-size:11px;opacity:.7;">${fmt(taxa)}</span>`:`<span style="font-size:11px;color:#22A85A;font-weight:700;">Grátis</span>`}
        </button>`:''}
        ${temRet?`<button id="btn-ret-${lid}" class="pag-btn${op==='retirada'?' ativo':''}"
          style="flex:1;padding:14px;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:4px;"
          onclick="setOpcaoEnt('${lid}','retirada')">
          <span style="font-size:22px;">🏃</span><span>Retirada</span>
          <span style="font-size:11px;opacity:.7;">No local</span>
        </button>`:''}
      </div>

      <div id="campos-ent-${lid}" style="${op==='entrega'?'':'display:none;'}">
        <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Endereço de entrega</div>
        <input class="checkout-input" id="rua-${lid}" value="${d.rua||''}" placeholder="Rua / Avenida" style="margin-bottom:8px;">
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input class="checkout-input" id="num-${lid}" value="${d.num||''}" placeholder="Número" style="flex:0 0 100px;">
          <input class="checkout-input" id="compl-${lid}" value="${d.compl||''}" placeholder="Complemento" style="flex:1;">
        </div>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;margin-top:6px;">Seus dados</div>
      <input class="checkout-input" id="cli-nome-${lid}" value="${d.nome||_user?.nome||''}" placeholder="Seu nome completo" style="margin-bottom:8px;">
      <input class="checkout-input" id="cli-tel-${lid}" value="${d.tel||_user?.tel||''}" placeholder="WhatsApp (DDD + número)" oninput="mskTel(this)" type="tel" style="margin-bottom:8px;">
      <input class="checkout-input" id="cli-obs-${lid}" value="${d.obs||''}" placeholder="Observações (opcional)">
    </div>

    <div style="display:flex;gap:10px;">
      <button onclick="prevStep('${lid}')" style="padding:15px 20px;border-radius:14px;background:var(--cream);border:1.5px solid var(--border);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;color:var(--mid);">← Voltar</button>
      <button onclick="validarEntrega('${lid}')" style="flex:1;padding:15px;border-radius:14px;background:var(--st-red,#C0392B);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;">Continuar → Pagamento</button>
    </div>`;
  }

  // ── ETAPA 3: PAGAMENTO + RESUMO ──
  else if(step===3) {
    const op = d.opcaoEntrega||'entrega';
    const taxaFinal = op==='retirada' ? 0 : taxa;
    const totalFinal = sub + taxaFinal;
    const pag = d.pag||'pix';
    content = `
    <div style="background:var(--cream);border-radius:14px;padding:14px;margin-bottom:18px;">
      <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Resumo do pedido</div>
      ${c.itens.map(i=>`<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mid);padding:3px 0;"><span>${i.qtd}x ${i.nome}</span><span>${fmt(i.preco*i.qtd)}</span></div>`).join('')}
      <div style="border-top:1px solid var(--border);margin:10px 0;padding-top:10px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mid);margin-bottom:4px;"><span>Subtotal</span><span>${fmt(sub)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mid);margin-bottom:8px;"><span>${op==='retirada'?'Retirada':'Taxa de entrega'}</span><span style="${taxaFinal===0?'color:#22A85A;font-weight:700;':''}">${taxaFinal===0?'Grátis':fmt(taxaFinal)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:900;color:var(--dark);"><span>Total</span><span>${fmt(totalFinal)}</span></div>
      </div>
      <div style="font-size:12px;color:var(--mid);margin-top:6px;">📍 ${op==='retirada'?'Retirada no local':(d.rua?d.rua+(d.num?' Nº '+d.num:'')+(d.compl?' - '+d.compl:''):'Endereço não informado')}</div>
    </div>

    <div style="margin-bottom:18px;">
      <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;">Forma de pagamento</div>
      <div style="display:flex;gap:10px;">
        <button id="ppix-${lid}" class="pag-btn${pag==='pix'?' ativo':''}"
          style="flex:1;padding:14px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:5px;"
          onclick="setPagStep('${lid}','pix')">
          <span style="font-size:20px;">💠</span><span>PIX</span>
        </button>
        <button id="pcartao-${lid}" class="pag-btn${pag==='cartao'?' ativo':''}"
          style="flex:1;padding:14px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:5px;"
          onclick="setPagStep('${lid}','cartao')">
          <span style="font-size:20px;">💳</span><span>Cartão</span>
        </button>
        <button id="pdinheiro-${lid}" class="pag-btn${pag==='dinheiro'?' ativo':''}"
          style="flex:1;padding:14px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:5px;"
          onclick="setPagStep('${lid}','dinheiro')">
          <span style="font-size:20px;">💵</span><span>Dinheiro</span>
        </button>
      </div>
      <div id="troco-wrap-${lid}" style="margin-top:10px;${pag==='dinheiro'?'':'display:none;'}">
        <input class="checkout-input" id="troco-val-${lid}" placeholder="Troco para quanto? (opcional)">
      </div>
    </div>

    <div style="display:flex;gap:10px;">
      <button onclick="saveStepData('${lid}');prevStep('${lid}')" style="padding:15px 20px;border-radius:14px;background:var(--cream);border:1.5px solid var(--border);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;color:var(--mid);">← Voltar</button>
      <button onclick="finalizarPedido('${lid}')" style="flex:1;padding:15px;border-radius:14px;background:var(--st-red,#C0392B);color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;" id="btn-fin-${lid}">
        Mandar o pedido! 🚀
      </button>
    </div>`;
  }

  return `<div style="padding:18px 18px 24px;border-bottom:3px solid var(--cream);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      ${l.logo_url?`<img src="${l.logo_url}" style="width:36px;height:36px;border-radius:10px;object-fit:cover;" onerror="this.style.display='none'">`:`<div style="width:36px;height:36px;border-radius:10px;background:${l._bg}22;display:flex;align-items:center;justify-content:center;font-size:18px;">${l._emoji}</div>`}
      <div style="font-size:15px;font-weight:800;color:var(--dark);">${l.nome}</div>
    </div>
    ${stepBar}
    ${content}
  </div>`;
}

window.setOpcaoEnt = function(lid, op) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].opcaoEntrega=op;
  document.querySelectorAll(`[id^="btn-ent-${lid}"], [id^="btn-ret-${lid}"]`).forEach(b=>b.classList.remove('ativo'));
  $('btn-'+(op==='entrega'?'ent':'ret')+'-'+lid)?.classList.add('ativo');
  const campos=$('campos-ent-'+lid);
  if(campos) campos.style.display=op==='entrega'?'':'none';
};

window.setPagStep = function(lid, pag) {
  if(!_checkoutData[lid]) _checkoutData[lid]={};
  _checkoutData[lid].pag=pag;
  ['pix','cartao','dinheiro'].forEach(p=>{
    const b=$('p'+p+'-'+lid); if(b) b.classList.toggle('ativo',p===pag);
  });
  const tw=$('troco-wrap-'+lid); if(tw) tw.style.display=pag==='dinheiro'?'':'none';
};

window.validarEntrega = function(lid) {
  saveStepData(lid);
  const d=_checkoutData[lid]||{};
  const op=d.opcaoEntrega||'entrega';
  if(!d.nome||!d.nome.trim()) return toast('Digite seu nome');
  if(!d.tel||d.tel.replace(/\D/g,'').length<10) return toast('WhatsApp inválido');
  if(op==='entrega') {
    if(!d.rua||!d.rua.trim()) return toast('Digite a rua');
    if(!d.num||!d.num.trim()) return toast('Digite o número');
  }
  nextStep(lid);
};

window.mudaCartItem = function(lid, ii, d) {
  const c=_carrinhos[lid]; if(!c) return;
  c.itens[ii].qtd = Math.max(0, c.itens[ii].qtd+d);
  if(c.itens[ii].qtd===0) c.itens.splice(ii,1);
  if(!c.itens.length) delete _carrinhos[lid];
  renderCarrinho();
  atualizarFab('cart');
  atualizarCartBtn();
};





// ═══════════════════════════════════════════════════════
// FINALIZAR PEDIDO
// ═══════════════════════════════════════════════════════
window.finalizarPedido = async function(lid) {
  saveStepData(lid);
  const c=_carrinhos[lid]; if(!c||!c.itens.length) return toast('Sacola vazia');
  const l=c.loja;
  if(l.aberto===false) return toast('Loja fechada no momento');
  const d=_checkoutData[lid]||{};
  const nome  = d.nome?.trim();
  const whats = (d.tel||'').replace(/\D/g,'');
  const obs   = d.obs?.trim()||'';
  const op    = d.opcaoEntrega||'entrega';
  const rua   = d.rua?.trim()||'';
  const num   = d.num?.trim()||'';
  const compl = d.compl?.trim()||'';

  if(!nome) return toast('Digite seu nome');
  if(!whats||whats.length<10) return toast('WhatsApp inválido');
  if(op==='entrega') {
    if(!rua) return toast('Digite a rua');
    if(!num) return toast('Digite o número');
  }

  const endereco = op==='entrega' ? [rua, num?'Nº '+num:'', compl].filter(Boolean).join(', ') : 'Retirada no local';
  const sub = c.itens.reduce((s,i)=>s+i.preco*i.qtd,0);
  const taxa = op==='retirada' ? 0 : parseFloat(l.taxa_entrega||0);
  const total = sub+taxa;
  const itens = c.itens.map(i=>({id:i.id,nome:i.nome,preco:i.preco,qtd:i.qtd,emoji:i.emoji,adicionais:i.adicionais||[]}));

  const btn=document.querySelector(`[onclick="finalizarPedido('${lid}')"]`);
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}

  try {
    const {error} = await db.from('pedidos').insert({
      estabelecimento_id: lid,
      cliente_nome: nome,
      cliente_whats: whats,
      observacao: obs,
      itens, total,
      status: 'novo',
      endereco,
      pagamento: d.pag||'pix',
      taxa_entrega: taxa,
    });
    if(error) throw error;

    // Busca ID
    const {data:pNovo} = await db.from('pedidos')
      .select('id,status,itens,total,endereco')
      .eq('estabelecimento_id',lid).eq('cliente_whats',whats).eq('status','novo')
      .order('created_at',{ascending:false}).limit(1).maybeSingle();
    const pedId = pNovo?.id||('local_'+Date.now());

    // Salva localStorage
    const slug=l.slug;
    const peds=JSON.parse(localStorage.getItem('pw_peds_'+slug)||'[]');
    peds.unshift({id:pedId,itens,total,status:'novo',endereco,cliente_whats:whats,cliente_nome:nome});
    localStorage.setItem('pw_peds_'+slug,JSON.stringify(peds.slice(0,20)));

    // Salva dados do cliente
    if(!_user) _user={};
    _user.nome=nome; _user.tel=$('cli-tel-'+lid)?.value||'';
    localStorage.setItem('pw_cliente',JSON.stringify(_user));

    delete _carrinhos[lid];
    delete _checkoutStep[lid];
    delete _checkoutData[lid];
    atualizarFab('cart');
    atualizarCartBtn();
    renderCarrinho();
    // Aguarda um tick para o localStorage estar disponível
    setTimeout(() => {
      renderOrders();
      showScreen('orders');
      toast('Pedido enviado! Aguardando confirmação ✅');
    }, 100);

  } catch(e) {
    toast('Erro: '+(e.message||'Tente novamente'));
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Mandar o pedido! 🚀';}
  }
};

// MEUS PEDIDOS (global)
// ═══════════════════════════════════════════════════════
function renderOrders() {
  const el=$('orders-content'); if(!el) return;
  const allPeds=[];
  _lojas.forEach(l => {
    const peds=JSON.parse(localStorage.getItem('pw_peds_'+l.slug)||'[]');
    peds.forEach(p=>allPeds.push({...p,lojaNome:l.nome,lojaId:l.id}));
  });
  if(!allPeds.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nenhum pedido ainda</div><div class="empty-desc">Faça seu primeiro pedido!</div></div>';return;}
  allPeds.sort((a,b)=>b.id>a.id?1:-1);
  el.innerHTML = `<div style="font-size:16px;font-weight:800;color:var(--dark);margin-bottom:14px;">Meus pedidos</div>` +
    allPeds.slice(0,20).map(p => pedidoCardHTML(p)).join('');
}

async function pollarPedidos() {
  if(!_user?.tel) return;
  const whats=_user.tel.replace(/\D/g,'');
  if(!whats||whats.length<10) return;
  try {
    const {data} = await db.from('pedidos')
      .select('id,status,total,estabelecimento_id')
      .eq('cliente_whats',whats)
      .not('status','in','("cancelado")')
      .order('created_at',{ascending:false})
      .limit(20);

    let mudou=false;
    (data||[]).forEach(p => {
      const ant=_statusAnt[p.id];
      if(ant && ant!==p.status) {
        mudou=true;
        const loja=_lojas.find(l=>l.id===p.estabelecimento_id);
        const nomeLoja=loja?.nome||'Loja';
        const msgs={
          aceito:  `🍳 ${nomeLoja}: Pedido em preparo!`,
          pronto:  `🎉 ${nomeLoja}: Pedido pronto! Pode retirar.`,
          entregue:`✅ ${nomeLoja}: Pedido entregue!`,
          cancelado:`❌ ${nomeLoja}: Pedido cancelado.`,
        };
        if(msgs[p.status]) toast(msgs[p.status]);

        // Atualiza localStorage
        if(loja?.slug) {
          const peds=JSON.parse(localStorage.getItem('pw_peds_'+loja.slug)||'[]');
          const idx=peds.findIndex(pd=>pd.id===p.id);
          if(idx>=0) { peds[idx].status=p.status; localStorage.setItem('pw_peds_'+loja.slug,JSON.stringify(peds)); }
        }
      }
      _statusAnt[p.id]=p.status;
    });

    // Re-renderiza pedidos se houve mudança
    if(mudou && _screen==='orders') renderOrders();
    if(mudou && _screen==='store' && _tabAtiva==='pedidos') renderStorePedidos();
  } catch(e){}
}

const STORY_DUR = 5000;
window.abrirStory = function(url, tipo, id) {
  const fresq = window._storyFresq||[];
  _stories = fresq.map(f=>({url:f.url,tipo:f.tipo||'foto'}));
  if(!_stories.length) _stories=[{url,tipo}];
  _storyIdx = _stories.findIndex(s=>s.url===url); if(_storyIdx<0) _storyIdx=0;
  $('story-viewer').classList.add('open');
  $('story-loja-nome').textContent = _loja?.nome||'';
  renderStory();
};
function renderStory(){
  clearTimeout(_storyTimer);
  const s=_stories[_storyIdx]; if(!s){fecharStory();return;}
  const bg=$('story-bg'),vid=$('story-vid-el');
  if(s.tipo==='video'){if(bg){bg.style.backgroundImage='none';bg.style.display='none';}if(vid){vid.style.display='block';vid.src=s.url;vid.load();vid.play().catch(()=>{});}}
  else{if(vid){vid.pause();vid.src='';vid.style.display='none';}if(bg){bg.style.display='block';bg.style.backgroundImage=`url("${s.url}")`;}}
  const bars=$('story-bars');
  bars.innerHTML=_stories.map((_,i)=>`<div class="story-bar-bg"><div class="story-bar-fill" id="sbar-${i}"></div></div>`).join('');
  for(let i=0;i<_storyIdx;i++){const b=$('sbar-'+i);if(b)b.style.width='100%';}
  const ba=$('sbar-'+_storyIdx);
  if(ba){ba.style.transition='none';ba.style.width='0%';requestAnimationFrame(()=>requestAnimationFrame(()=>{ba.style.transition=`width ${STORY_DUR}ms linear`;ba.style.width='100%';}));}
  if(s.tipo==='video'){const v=$('story-vid-el');if(v){const oe=()=>{v.removeEventListener('ended',oe);storyProximo();};v.addEventListener('ended',oe);_storyTimer=setTimeout(()=>storyProximo(),31000);}else{_storyTimer=setTimeout(()=>storyProximo(),STORY_DUR);}}
  else{_storyTimer=setTimeout(()=>storyProximo(),STORY_DUR);}
}
function storyTap(e){const x=e.clientX,w=window.innerWidth;if(x<w/3)storyAnterior();else if(x>w*2/3)storyProximo();}
window.storyProximo=function(){if(_storyIdx<_stories.length-1){_storyIdx++;renderStory();}else fecharStory();};
window.storyAnterior=function(){if(_storyIdx>0){_storyIdx--;renderStory();}};
window.fecharStory=function(){clearTimeout(_storyTimer);$('story-viewer').classList.remove('open');const v=$('story-vid-el');if(v){v.pause();v.src='';}};

function abrirPerfil(primeiraVez=false) {
  const u=_user||{};
  $('perfil-content').innerHTML = `
    ${u.nome&&!primeiraVez?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);">
