/* ── CART ── */
const CartCtx=React.createContext(null);
const useCart=()=>React.useContext(CartCtx);
function CartProvider({children}){
  const[cart,setCart]=React.useState([]);
  const add=item=>setCart(c=>{const ex=c.find(i=>i.id===item.id);return ex?c.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i):[...c,{...item,qty:1}];});
  const remove=id=>setCart(c=>{const ex=c.find(i=>i.id===id);if(!ex)return c;return ex.qty===1?c.filter(i=>i.id!==id):c.map(i=>i.id===id?{...i,qty:i.qty-1}:i);});
  const clear=()=>setCart([]);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);
  return<CartCtx.Provider value={{cart,add,remove,clear,total,count}}>{children}</CartCtx.Provider>;
}

/* ── USER ── */
const UserCtx=React.createContext(null);
const useUser=()=>React.useContext(UserCtx);
function UserProvider({children}){
  const[user,setUser]=React.useState(()=>{try{const s=localStorage.getItem('pw_cliente');return s?JSON.parse(s):null;}catch{return null;}});
  const save=u=>{setUser(u);try{localStorage.setItem('pw_cliente',JSON.stringify(u));}catch{}};
  const initials=user?.nome?user.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase():'?';
  return<UserCtx.Provider value={{user,save,initials}}>{children}</UserCtx.Provider>;
}

/* ── LOGO ── */
function Logo({size=22}){
  return<span style={{fontFamily:P,fontWeight:900,fontSize:size,letterSpacing:'-0.03em',lineHeight:1}}>
    <span style={{color:DARK}}>PEDI</span><span style={{color:R}}>WAY</span>
  </span>;
}

/* ── CATS ── */
const CATS=[
  {id:'all',label:'Todos',emoji:'🍽️'},
  {id:'burger',label:'Burger',emoji:'🍔'},
  {id:'pizza',label:'Pizza',emoji:'🍕'},
  {id:'acai',label:'Açaí',emoji:'🍇'},
  {id:'restaurante',label:'Restaurante',emoji:'🥘'},
  {id:'lanche',label:'Lanches',emoji:'🥪'},
];
function matchCat(l,cat){
  if(!cat||cat==='all')return true;
  const n=(l.nome||'').toLowerCase();
  const m={burger:['burger','hamburguer','smash'],pizza:['pizza','pizzaria'],acai:['açaí','acai'],restaurante:['restaurante','marmita'],lanche:['lanche','sanduíche','tapioca']};
  return(m[cat]||[]).some(k=>n.includes(k));
}

/* ── PERFIL MODAL ── */
function PerfilModal({onClose}){
  const{user,save}=useUser();
  const[nome,setNome]=React.useState(user?.nome||'');
  const[tel,setTel]=React.useState(user?.tel||'');
  const[email,setEmail]=React.useState(user?.email||'');
  const[estados,setEstados]=React.useState([]);
  const[cidades,setCidades]=React.useState([]);
  const[uf,setUf]=React.useState(user?.estadoSigla||'');
  const[cidade,setCidade]=React.useState(user?.cidade||'');
  const[saving,setSaving]=React.useState(false);

  React.useEffect(()=>{fetch(IBGE+'/estados?orderBy=nome').then(r=>r.json()).then(setEstados).catch(()=>{});},[]);
  React.useEffect(()=>{
    if(!uf){setCidades([]);return;}
    fetch(`${IBGE}/estados/${uf}/municipios?orderBy=nome`).then(r=>r.json()).then(setCidades).catch(()=>{});
  },[uf]);

  function mskTel(v){
    v=v.replace(/D/g,'').slice(0,11);
    if(v.length>10)v=v.replace(/^(d{2})(d{5})(d{4})$/,'($1) $2-$3');
    else if(v.length>6)v=v.replace(/^(d{2})(d{4})(d*)$/,'($1) $2-$3');
    else if(v.length>2)v=v.replace(/^(d{2})(d*)$/,'($1) $2');
    else if(v.length>0)v='('+v;
    setTel(v);
  }

  async function salvar(){
    if(!nome.trim())return alert('Digite seu nome');
    if(!email.includes('@'))return alert('E-mail inválido');
    setSaving(true);
    const estadoNome=estados.find(e=>e.sigla===uf)?.nome||uf;
    try{await db.from('clientes').upsert({nome,telefone:tel.replace(/D/g,''),email,estado:estadoNome,cidade},{onConflict:'email'});}catch(e){console.warn(e);}
    save({nome,tel,email,estadoSigla:uf,estado:estadoNome,cidade});
    setSaving(false);
    onClose();
  }

  const inp={width:'100%',padding:'12px 14px',background:LIGHT,border:'1.5px solid rgba(26,10,8,.1)',borderRadius:12,fontFamily:P,fontSize:14,color:DARK,outline:'none'};
  const lbl={fontFamily:P,fontWeight:700,fontSize:11,color:GRAY,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:5,display:'block'};

  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div style={{fontFamily:P,fontWeight:800,fontSize:20,color:DARK,marginBottom:4}}>{user?'Meu perfil':'👋 Bem-vindo!'}</div>
        <div style={{fontFamily:P,fontSize:13,color:GRAY,marginBottom:22}}>{user?'Atualize seus dados':'Cadastro rápido para começar'}</div>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <div><label style={lbl}>Nome</label><input style={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="João Silva"/></div>
          <div><label style={lbl}>WhatsApp</label><input style={inp} value={tel} onChange={e=>mskTel(e.target.value)} placeholder="(11) 99999-9999" type="tel"/></div>
          <div><label style={lbl}>E-mail</label><input style={inp} value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" type="email"/></div>
          <div><label style={lbl}>Estado</label>
            <select style={inp} value={uf} onChange={e=>setUf(e.target.value)}>
              <option value="">Selecione...</option>
              {estados.map(e=><option key={e.sigla} value={e.sigla}>{e.nome}</option>)}
            </select>
          </div>
          <div><label style={lbl}>Cidade</label>
            <select style={inp} value={cidade} onChange={e=>setCidade(e.target.value)} disabled={!uf||cidades.length===0}>
              <option value="">{uf&&cidades.length===0?'Carregando...':'Selecione...'}</option>
              {cidades.map(c=><option key={c.id} value={c.nome}>{c.nome}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginTop:22,display:'flex',flexDirection:'column',gap:10}}>
          <div className="tap" onClick={salvar} style={{background:`linear-gradient(135deg,${R},${RD})`,borderRadius:14,padding:'15px',textAlign:'center',fontFamily:P,fontWeight:700,fontSize:15,color:'#fff',boxShadow:`0 8px 24px rgba(224,90,58,.35)`,opacity:saving?.7:1}}>
            {saving?'Salvando...':'Salvar e entrar'}
          </div>
          <div className="tap" onClick={onClose} style={{borderRadius:14,padding:'13px',textAlign:'center',fontFamily:P,fontWeight:600,fontSize:14,color:GRAY,border:'1.5px solid rgba(26,10,8,.1)'}}>
            Continuar sem cadastro
          </div>
        </div>
      </div>
    </div>
  );
}

                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 3h14l-2 9H5L3 3z" stroke="#fff" strokeWidth="1.6" strokeLinejoin="round"/><circle cx="7" cy="16.5" r="1.5" fill="#fff"/><circle cx="13" cy="16.5" r="1.5" fill="#fff"/></svg>
                  <div style={{position:'absolute',top:-5,right:-5}} className="badge">{count}</div>

/* ══ STORE ══ */
function StoreScreen({loja,navigate}){
  const{cart,add,remove,count}=useCart();
  const[items,setItems]=React.useState(null);
  const[activeCat,setActiveCat]=React.useState(null);

  React.useEffect(()=>{
    // Tenta tabelas comuns de cardápio
    const tentarTabelas=async()=>{
      const tabelas=['produtos','cardapio','itens','menu','items'];
      for(const t of tabelas){
        try{
          const{data,error}=await db.from(t).select('*').eq('estabelecimento_id',loja.id);
          if(!error&&data&&data.length>0){
            return data.map(p=>({
              id:p.id,
              name:p.nome||p.name||p.titulo||p.title||'Produto',
              desc:p.descricao||p.description||p.obs||'',
              price:parseFloat(p.preco||p.price||p.valor||0),
              cat:p.categoria||p.category||p.tipo||'Cardápio',
              img:p.foto||p.image||p.imagem||p.foto_url||p.image_url||null,
            }));
          }
        }catch(e){}
      }
      return null;
    };
    tentarTabelas().then(data=>{
      if(data){setItems(data);}
      else{
        // Fallback com itens genéricos
        setItems([
          {id:`${loja.id}-1`,name:'Entre em contato',desc:'Acesse o cardápio diretamente com o restaurante via WhatsApp',price:0,cat:'Informações',img:null},
        ]);
      }
    });
  },[loja.id]);

  const cats=items?[...new Set(items.map(i=>i.cat))]:[];
  const curCat=activeCat||cats[0];
  const shown=items?items.filter(i=>i.cat===curCat):[];
  const getQty=id=>cart.find(i=>i.id===id)?.qty||0;
  const ab=loja.aberto!==false;
  const cartTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

  return(
    <div className="screen-enter" style={{minHeight:'100vh',background:LIGHT,display:'flex',flexDirection:'column'}}>
      {/* Hero */}
      <div style={{position:'relative',height:200,background:loja._bg||'#2D1B0E',flexShrink:0,overflow:'hidden'}}>
        {loja.logo_url&&<img src={loja.logo_url} alt={loja.nome} style={{width:'100%',height:'100%',objectFit:'cover',opacity:.5}}/>}
        {!loja.logo_url&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:80,opacity:.25}}>{loja._emoji||'🏪'}</div>}
        {/* Nav */}
        <div style={{position:'absolute',top:0,left:0,right:0,padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="tap" onClick={()=>navigate('home')} style={{width:38,height:38,borderRadius:10,background:'rgba(0,0,0,.35)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div className="tap" onClick={()=>navigate('cart')} style={{position:'relative',width:38,height:38,borderRadius:10,background:count>0?R:'rgba(0,0,0,.35)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 3h14l-2 9H5L3 3z" stroke="#fff" strokeWidth="1.6" strokeLinejoin="round"/><circle cx="7" cy="16.5" r="1.5" fill="#fff"/><circle cx="13" cy="16.5" r="1.5" fill="#fff"/></svg>
            {count>0&&<div style={{position:'absolute',top:-4,right:-4}} className="badge">{count}</div>}
          </div>
        </div>
        {/* Store info */}
        <div style={{position:'absolute',bottom:16,left:20,right:20}}>
          <div style={{fontFamily:P,fontWeight:800,fontSize:24,color:'#fff',textShadow:'0 2px 8px rgba(0,0,0,.4)',marginBottom:4}}>{loja.nome}</div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:ab?'#4ADE80':'#F87171',display:'inline-block'}}/>
            <span style={{fontFamily:P,fontSize:12,color:ab?'#4ADE80':'rgba(255,255,255,.6)',fontWeight:600}}>{ab?'Aberto agora':'Fechado'}</span>
            {loja.cidade&&<><span style={{color:'rgba(255,255,255,.3)'}}>·</span><span style={{fontFamily:P,fontSize:12,color:'rgba(255,255,255,.7)'}}>📍 {loja.cidade}</span></>}
          </div>
        </div>
      </div>

      {/* Category tabs */}
      {cats.length>1&&(
        <div style={{background:CREAM,borderBottom:'1px solid rgba(26,10,8,.07)',overflowX:'auto',display:'flex',padding:'0 16px',gap:4,scrollbarWidth:'none',flexShrink:0}}>
          {cats.map(c=>(
            <div key={c} className="tap" onClick={()=>setActiveCat(c)} style={{flexShrink:0,padding:'12px 14px',fontFamily:P,fontWeight:curCat===c?700:500,fontSize:13,color:curCat===c?R:GRAY,borderBottom:`2.5px solid ${curCat===c?R:'transparent'}`,transition:'all .15s',whiteSpace:'nowrap'}}>{c}</div>
          ))}
        </div>
      )}

      {/* Items */}
      <div style={{flex:1,padding:'0 0 100px'}}>
        <div className="store-detail-wrap" style={{padding:'0 20px'}}>
          {/* Skeletons */}
          {items===null&&[1,2,3].map(i=>(
            <div key={i} style={{display:'flex',gap:14,padding:'16px 0',borderBottom:'1px solid rgba(26,10,8,.06)',alignItems:'center'}}>
              <div className="skel" style={{width:76,height:76,borderRadius:12,flexShrink:0}}/>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                <div className="skel" style={{height:14,width:'65%'}}/>
                <div className="skel" style={{height:11,width:'85%'}}/>
                <div className="skel" style={{height:16,width:'30%'}}/>
              </div>
            </div>
          ))}

          {shown.map(item=>{
            const qty=getQty(item.id);
            return(
              <div key={item.id} className="tap" onClick={()=>navigate('product',{item,loja})} style={{display:'flex',gap:14,padding:'16px 0',borderBottom:'1px solid rgba(26,10,8,.06)',alignItems:'center'}}>
                <div style={{width:76,height:76,borderRadius:12,flexShrink:0,overflow:'hidden',background:loja._bg||'#2D1B0E',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {item.img
                    ?<img src={item.img} alt={item.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    :<span style={{fontSize:32}}>{loja._emoji||'🍽️'}</span>
                  }
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,marginBottom:4}}>{item.name}</div>
                  {item.desc&&<div style={{fontFamily:P,fontWeight:400,fontSize:12,color:GRAY,lineHeight:1.5,marginBottom:6,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.desc}</div>}
                  {item.price>0&&<div style={{fontFamily:P,fontWeight:800,fontSize:15,color:DARK}}>{fmt(item.price)}</div>}
                </div>
                {item.price>0&&(
                  <div style={{flexShrink:0}} onClick={e=>{e.stopPropagation();add(item);}}>
                    {qty===0
                      ?<div style={{width:34,height:34,borderRadius:10,background:R,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(224,90,58,.35)'}}>
                        <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M4 9h10" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                       </div>
                      :<div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div onClick={e=>{e.stopPropagation();remove(item.id);}} style={{width:28,height:28,borderRadius:8,background:LIGHT,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke={DARK} strokeWidth="2" strokeLinecap="round"/></svg></div>
                        <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,minWidth:14,textAlign:'center'}}>{qty}</span>
                        <div style={{width:28,height:28,borderRadius:8,background:R,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div>
                       </div>
                    }
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {count>0&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'12px 20px 24px',background:CREAM,borderTop:'1px solid rgba(26,10,8,.07)'}}>
          <div style={{maxWidth:760,margin:'0 auto'}}>
            <div className="tap" onClick={()=>navigate('cart')} style={{background:R,borderRadius:14,padding:'15px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 8px 24px rgba(224,90,58,.4)'}}>
              <div style={{background:'rgba(255,255,255,.2)',borderRadius:8,padding:'3px 10px',fontFamily:P,fontWeight:700,fontSize:13,color:'#fff'}}>{count}</div>
              <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Ver carrinho</span>
              <span style={{fontFamily:P,fontWeight:700,fontSize:13,color:'rgba(255,255,255,.85)'}}>{fmt(cartTotal)}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ PRODUCT ══ */
function ProductScreen({item,loja,navigate}){
  const{add,remove,cart}=useCart();
  const qty=cart.find(i=>i.id===item.id)?.qty||0;
  return(
    <div className="screen-enter" style={{minHeight:'100vh',background:CREAM,display:'flex',flexDirection:'column'}}>
      <div style={{height:260,background:loja._bg||'#2D1B0E',position:'relative',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
        {item.img
          ?<img src={item.img} alt={item.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          :<div style={{fontSize:100,filter:'drop-shadow(0 6px 16px rgba(0,0,0,.3))'}}>{loja._emoji||'🍽️'}</div>
        }
        <div className="tap" onClick={()=>navigate('store',{loja})} style={{position:'absolute',top:16,left:20,width:38,height:38,borderRadius:10,background:'rgba(0,0,0,.35)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>
      <div style={{flex:1,padding:'24px 20px 120px',maxWidth:760,margin:'0 auto',width:'100%'}}>
        <div style={{fontFamily:P,fontWeight:700,fontSize:11,color:R,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>{loja.nome} · {item.cat}</div>
        <div style={{fontFamily:P,fontWeight:800,fontSize:24,color:DARK,marginBottom:10,lineHeight:1.2}}>{item.name}</div>
        {item.desc&&<div style={{fontFamily:P,fontWeight:400,fontSize:14,color:GRAY,lineHeight:1.7,marginBottom:20}}>{item.desc}</div>}
        <div style={{height:1,background:'rgba(26,10,8,.07)',marginBottom:18}}/>
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,marginBottom:10}}>Observações</div>
          <textarea style={{width:'100%',border:'1.5px solid rgba(26,10,8,.09)',borderRadius:12,padding:'12px 14px',fontFamily:P,fontSize:13,color:GRAY,lineHeight:1.5,resize:'none',outline:'none',background:LIGHT}} rows={3} placeholder="Ex: sem cebola, bem passado..."/>
        </div>
      </div>
      <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'12px 20px 24px',background:CREAM,borderTop:'1px solid rgba(26,10,8,.07)'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontFamily:P,fontWeight:400,fontSize:13,color:GRAY}}>Valor unitário</span>
            <span style={{fontFamily:P,fontWeight:900,fontSize:22,color:DARK}}>{fmt(item.price)}</span>
          </div>
          {qty===0
            ?<div className="tap" onClick={()=>{add(item);navigate('store',{loja});}} style={{background:R,borderRadius:14,padding:'15px',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 8px 24px rgba(224,90,58,.4)'}}>
              <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M4 9h10" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
              <span style={{fontFamily:P,fontWeight:700,fontSize:15,color:'#fff'}}>Adicionar ao carrinho</span>
             </div>
            :<div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{display:'flex',gap:10,alignItems:'center',background:LIGHT,borderRadius:12,padding:'11px 18px',flex:1,justifyContent:'center'}}>
                <div className="tap" onClick={()=>remove(item.id)} style={{width:30,height:30,borderRadius:8,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(0,0,0,.07)'}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke={DARK} strokeWidth="2" strokeLinecap="round"/></svg></div>
                <span style={{fontFamily:P,fontWeight:800,fontSize:18,color:DARK,minWidth:22,textAlign:'center'}}>{qty}</span>
                <div className="tap" onClick={()=>add(item)} style={{width:30,height:30,borderRadius:8,background:R,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 10px rgba(224,90,58,.3)'}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div>
              </div>
              <div className="tap" onClick={()=>navigate('cart')} style={{background:R,borderRadius:12,padding:'13px 18px',fontFamily:P,fontWeight:700,fontSize:13,color:'#fff',boxShadow:'0 6px 18px rgba(224,90,58,.4)',whiteSpace:'nowrap'}}>Ver carrinho</div>
             </div>
          }
        </div>
      </div>
    </div>
  );
}

/* ══ CART ══ */
function CartScreen({navigate}){
  const{cart,add,remove,total}=useCart();
  if(!cart.length)return(
    <div className="screen-enter" style={{minHeight:'100vh',background:CREAM,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40}}>
      <div style={{fontSize:60,marginBottom:18}}>🛒</div>
      <div style={{fontFamily:P,fontWeight:700,fontSize:18,color:DARK,marginBottom:8,textAlign:'center'}}>Carrinho vazio</div>
      <div style={{fontFamily:P,fontSize:13,color:GRAY,textAlign:'center',marginBottom:28}}>Adicione itens de um restaurante</div>
      <div className="tap" onClick={()=>navigate('home')} style={{background:R,borderRadius:12,padding:'13px 28px',fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Ver restaurantes</div>
    </div>
  );
  return(
    <div className="screen-enter" style={{minHeight:'100vh',background:LIGHT,display:'flex',flexDirection:'column'}}>
      <div style={{background:CREAM,padding:'14px 20px',borderBottom:'1px solid rgba(26,10,8,.07)',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}}>
        <div className="tap" onClick={()=>navigate('home')} style={{width:36,height:36,borderRadius:10,background:LIGHT,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke={DARK} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{fontFamily:P,fontWeight:700,fontSize:17,color:DARK}}>Carrinho</div>
      </div>
      <div style={{flex:1,padding:'16px 20px 140px',maxWidth:760,margin:'0 auto',width:'100%'}}>
        <div style={{background:CREAM,borderRadius:16,overflow:'hidden',marginBottom:14,border:'1px solid rgba(26,10,8,.06)'}}>
          {cart.map((item,idx)=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderBottom:idx<cart.length-1?'1px solid rgba(26,10,8,.06)':'none'}}>
              <div style={{width:44,height:44,borderRadius:10,background:'#2D1B0E',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                {item.img?<img src={item.img} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:8}}/>:(item.emoji||'🍽️')}
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:P,fontWeight:600,fontSize:13,color:DARK}}>{item.name}</div>
                <div style={{fontFamily:P,fontWeight:700,fontSize:13,color:R,marginTop:2}}>{fmt(item.price*item.qty)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div className="tap" onClick={()=>remove(item.id)} style={{width:26,height:26,borderRadius:7,background:LIGHT,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke={DARK} strokeWidth="1.8" strokeLinecap="round"/></svg></div>
                <span style={{fontFamily:P,fontWeight:700,fontSize:13,color:DARK,minWidth:14,textAlign:'center'}}>{item.qty}</span>
                <div className="tap" onClick={()=>add(item)} style={{width:26,height:26,borderRadius:7,background:R,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg></div>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:CREAM,borderRadius:16,padding:'16px',border:'1px solid rgba(26,10,8,.06)',marginBottom:14}}>
          <div style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,marginBottom:12}}>Resumo</div>
          {[{l:'Subtotal',v:fmt(total)},{l:'Entrega',v:'Grátis',g:true},{l:'Taxa PEDIWAY',v:'R$ 0,00',g:true}].map((r,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontFamily:P,fontSize:13,color:GRAY}}>{r.l}</span>
              <span style={{fontFamily:P,fontWeight:600,fontSize:13,color:r.g?'#22A85A':DARK}}>{r.v}</span>
            </div>
          ))}
          <div style={{height:1,background:'rgba(26,10,8,.07)',margin:'10px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK}}>Total</span>
            <span style={{fontFamily:P,fontWeight:900,fontSize:18,color:DARK}}>{fmt(total)}</span>
          </div>
        </div>
      </div>
      <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'12px 20px 24px',background:CREAM,borderTop:'1px solid rgba(26,10,8,.07)'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          <div className="tap" onClick={()=>navigate('confirm')} style={{background:R,borderRadius:14,padding:'15px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 8px 24px rgba(224,90,58,.4)'}}>
            <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Confirmar pedido</span>
            <span style={{fontFamily:P,fontWeight:900,fontSize:14,color:'rgba(255,255,255,.9)'}}>{fmt(total)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ CONFIRM ══ */
function ConfirmScreen({navigate}){
  const{clear}=useCart();
  const[step,setStep]=React.useState(0);
  const steps=['Pedido confirmado!','Preparando...','A caminho!','Entregue! 🎉'];
  const icons=['✅','👨\u200d🍳','🛵','🎉'];
  const descs=['Seu pedido foi recebido.','O restaurante está preparando.','O entregador está a caminho!','Bom apetite!'];
  React.useEffect(()=>{if(step<3){const t=setTimeout(()=>setStep(s=>s+1),step===0?1000:2200);return()=>clearTimeout(t);}},[step]);
  const prog=(step+1)/4;
  return(
    <div className="screen-enter" style={{minHeight:'100vh',background:CREAM,display:'flex',flexDirection:'column'}}>
      <div style={{background:CREAM,padding:'14px 20px',borderBottom:'1px solid rgba(26,10,8,.07)'}}><Logo size={20}/></div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,maxWidth:500,margin:'0 auto',width:'100%'}}>
        <div style={{fontSize:68,marginBottom:18}}>{icons[step]}</div>
        <div style={{fontFamily:P,fontWeight:800,fontSize:24,color:DARK,textAlign:'center',marginBottom:8}}>{steps[step]}</div>
        <div style={{fontFamily:P,fontSize:14,color:GRAY,textAlign:'center',marginBottom:32,lineHeight:1.6}}>{descs[step]}</div>
        <div style={{width:'100%',marginBottom:32}}>
          <div style={{height:6,background:LIGHT,borderRadius:3,overflow:'hidden',marginBottom:8}}>
            <div style={{height:'100%',background:R,borderRadius:3,width:`${prog*100}%`,transition:'width 1s cubic-bezier(.25,.46,.45,.94)',boxShadow:'0 0 8px rgba(224,90,58,.4)'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            {['Confirmado','Preparando','A caminho','Entregue'].map((s,i)=>(
              <div key={i} style={{fontFamily:P,fontSize:10,color:i<=step?R:'rgba(107,100,96,.3)',fontWeight:i===step?700:400,textAlign:'center',flex:1}}>{s}</div>
            ))}
          </div>
        </div>
        <div style={{background:LIGHT,borderRadius:14,padding:'14px 24px',textAlign:'center',marginBottom:28,border:'1px solid rgba(26,10,8,.07)'}}>
          <div style={{fontFamily:P,fontSize:11,color:GRAY,marginBottom:3}}>Código do pedido</div>
          <div style={{fontFamily:P,fontWeight:800,fontSize:22,color:DARK,letterSpacing:'.06em'}}>#PW{Math.floor(1000+Math.random()*9000)}</div>
        </div>
        {step===3&&<div className="tap" onClick={()=>{clear();navigate('home');}} style={{background:R,borderRadius:14,padding:'13px 36px',fontFamily:P,fontWeight:700,fontSize:14,color:'#fff',boxShadow:'0 8px 22px rgba(224,90,58,.35)'}}>Novo pedido</div>}
      </div>
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const[screen,setScreen]=React.useState(()=>{try{return JSON.parse(localStorage.getItem('pw-screen')||'"home"')}catch{return'home'}});
  const[params,setParams]=React.useState({});
  const navigate=(s,p={})=>{setScreen(s);setParams(p);try{localStorage.setItem('pw-screen',JSON.stringify(s))}catch{}};
  const screens={
    home:<HomeScreen navigate={navigate}/>,
    store:<StoreScreen loja={params.loja||{id:0,nome:'Loja',_bg:'#2D1B0E',_emoji:'🏪'}} navigate={navigate}/>,
    product:<ProductScreen item={params.item||{id:0,name:'Produto',price:0,emoji:'🍽️',cat:'Cardápio'}} loja={params.loja||{nome:'Loja',_bg:'#2D1B0E',_emoji:'🏪'}} navigate={navigate}/>,
    cart:<CartScreen navigate={navigate}/>,
    confirm:<ConfirmScreen navigate={navigate}/>,
  };
  return(
    <UserProvider>
      <CartProvider>
        {screens[screen]||screens.home}
      </CartProvider>
    </UserProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
