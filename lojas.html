<script type="text/babel">

/* ── BRAND ── */

const P = '"Poppins", sans-serif';

/* ── CART CONTEXT ── */
const CartCtx = React.createContext(null);
const useCart = () => React.useContext(CartCtx);

function CartProvider({ children }) {
  const [cart, setCart] = React.useState([]);
  const add    = item => setCart(c => { const ex=c.find(i=>i.id===item.id); return ex ? c.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i) : [...c,{...item,qty:1}]; });
  const remove = id   => setCart(c => { const ex=c.find(i=>i.id===id); if(!ex) return c; return ex.qty===1?c.filter(i=>i.id!==id):c.map(i=>i.id===id?{...i,qty:i.qty-1}:i); });
  const clear  = ()   => setCart([]);
  const total  = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count  = cart.reduce((s,i)=>s+i.qty,0);
  return <CartCtx.Provider value={{cart,add,remove,clear,total,count}}>{children}</CartCtx.Provider>;
}

/* ── USER CONTEXT ── */
const UserCtx = React.createContext(null);
const useUser = () => React.useContext(UserCtx);

function UserProvider({ children }) {
  const [user, setUser] = React.useState(() => {
    try { const s=localStorage.getItem('pw_cliente'); return s?JSON.parse(s):null; } catch { return null; }
  });
  const save = u => { setUser(u); try{localStorage.setItem('pw_cliente',JSON.stringify(u))}catch{} };
  const initials = user?.nome ? user.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : '?';
  return <UserCtx.Provider value={{user,save,initials}}>{children}</UserCtx.Provider>;
}

/* ── HELPERS ── */
function Logo({ size=22, darkColor=DARK, wayColor=R }) {
  return (
    <span style={{ fontFamily:P, fontWeight:900, fontSize:size, letterSpacing:'-0.03em', lineHeight:1 }}>
      <span style={{ color:darkColor }}>PEDI</span><span style={{ color:wayColor }}>WAY</span>
    </span>
  );
}

function StarIcon({ size=13 }) {
  return <svg width={size} height={size} viewBox="0 0 14 14" fill={R}><path d="M7 1l1.5 4h4l-3.3 2.4 1.3 4L7 9 3.5 11.4l1.3-4L1.5 5h4z"/></svg>;
}

function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.',','); }

/* ── CATEGORIES ── */
const CATS = [
  {id:'all',label:'Todos',emoji:'🍽️'},
  {id:'burger',label:'Burger',emoji:'🍔'},
  {id:'pizza',label:'Pizza',emoji:'🍕'},
  {id:'acai',label:'Açaí',emoji:'🍇'},
  {id:'restaurante',label:'Restaurante',emoji:'🥘'},
  {id:'lanche',label:'Lanches',emoji:'🥪'},
];

function matchCat(loja, cat) {
  if (!cat || cat==='all') return true;
  if (cat==='aberta') return loja.aberto===true;
  const n = (loja.nome||'').toLowerCase();
  const m = {burger:['burger','hamburguer','smash'],pizza:['pizza','pizzaria'],acai:['açaí','acai'],restaurante:['restaurante','marmita'],lanche:['lanche','sanduíche','tapioca']};
  return (m[cat]||[]).some(k=>n.includes(k));
}

/* ── STORE CARD ── */

              onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
          : null

        <div style={{fontSize:60,display:loja.logo_url?'none':'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',filter:'drop-shadow(0 4px 10px rgba(0,0,0,0.3))'}}>
          {loja._emoji||'🏪'}
        </div>
        {!ab && (

            <span style={{fontFamily:P,fontWeight:700,fontSize:13,color:'rgba(255,255,255,0.7)',background:'rgba(0,0,0,0.4)',padding:'6px 14px',borderRadius:8}}>Fechado</span>

}

/* ── MODAL PERFIL / CADASTRO ── */
function PerfilModal({ onClose }) {
  const {user,save} = useUser();
  const [nome,  setNome]  = React.useState(user?.nome||'');
  const [tel,   setTel]   = React.useState(user?.tel||'');
  const [email, setEmail] = React.useState(user?.email||'');
  const [estados, setEstados] = React.useState([]);
  const [cidades, setCidades] = React.useState([]);
  const [uf,    setUf]    = React.useState(user?.estadoSigla||'');
  const [cidade,setCidade]= React.useState(user?.cidade||'');
  const [saving,setSaving]= React.useState(false);

  React.useEffect(()=>{
    fetch(IBGE+'/estados?orderBy=nome').then(r=>r.json()).then(setEstados).catch(()=>{});
  },[]);

  React.useEffect(()=>{
    if(!uf){setCidades([]);return;}
    fetch(`${IBGE}/estados/${uf}/municipios?orderBy=nome`).then(r=>r.json()).then(setCidades).catch(()=>{});
  },[uf]);

  function mskTel(v){
    v=v.replace(/\D/g,'').slice(0,11);
    if(v.length>10) v=v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
    else if(v.length>6) v=v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3');
    else if(v.length>2) v=v.replace(/^(\d{2})(\d*)$/,'($1) $2');
    else if(v.length>0) v='('+v;
    setTel(v);
  }

  async function salvar(){
    if(!nome.trim()) return alert('Digite seu nome');
    if(!email.includes('@')) return alert('E-mail inválido');
    setSaving(true);
    const estadoNome = estados.find(e=>e.sigla===uf)?.nome||uf;
    try {
      await db.from('clientes').upsert({nome,telefone:tel.replace(/\D/g,''),email,estado:estadoNome,cidade},{onConflict:'email'});
    } catch(e){ console.warn(e); }
    save({nome,tel,email,estadoSigla:uf,estado:estadoNome,cidade});
    setSaving(false);
    onClose();
  }

  const inputSt = { width:'100%', padding:'12px 14px', background:LIGHT, border:`1.5px solid rgba(26,10,8,0.1)`, borderRadius:12, fontFamily:P, fontSize:14, color:DARK, outline:'none' };
  const labelSt = { fontFamily:P, fontWeight:700, fontSize:11, color:GRAY, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:5, display:'block' };

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div style={{fontFamily:P,fontWeight:800,fontSize:20,color:DARK,marginBottom:4}}>
          {user ? 'Meu perfil' : '👋 Bem-vindo!'}
        </div>
        <div style={{fontFamily:P,fontSize:13,color:GRAY,marginBottom:24}}>
          {user ? 'Atualize seus dados' : 'Cadastro rápido para começar'}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={labelSt}>Nome</label><input style={inputSt} value={nome} onChange={e=>setNome(e.target.value)} placeholder="João Silva"/></div>
          <div><label style={labelSt}>WhatsApp</label><input style={inputSt} value={tel} onChange={e=>mskTel(e.target.value)} placeholder="(11) 99999-9999" type="tel"/></div>
          <div><label style={labelSt}>E-mail</label><input style={inputSt} value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" type="email"/></div>
          <div>
            <label style={labelSt}>Estado</label>
            <select style={inputSt} value={uf} onChange={e=>setUf(e.target.value)}>
              <option value="">Selecione o estado...</option>
              {estados.map(e=><option key={e.sigla} value={e.sigla}>{e.nome}</option>)}
            </select>
          </div>
          <div>
            <label style={labelSt}>Cidade</label>
            <select style={inputSt} value={cidade} onChange={e=>setCidade(e.target.value)} disabled={!uf||cidades.length===0}>
              <option value="">{uf&&cidades.length===0?'Carregando...':'Selecione a cidade...'}</option>
              {cidades.map(c=><option key={c.id} value={c.nome}>{c.nome}</option>)}
            </select>
          </div>
        </div>

        <div style={{marginTop:24,display:'flex',flexDirection:'column',gap:10}}>
          <div className="tap" onClick={salvar} style={{
            background:`linear-gradient(135deg,${R},${RD})`, borderRadius:14, padding:'16px',
            textAlign:'center', fontFamily:P, fontWeight:700, fontSize:15, color:'#fff',
            boxShadow:`0 8px 24px rgba(224,90,58,0.35)`,
            opacity:saving?0.7:1,
          }}>{saving?'Salvando...':'Salvar e entrar'}</div>
          <div className="tap" onClick={onClose} style={{
            borderRadius:14, padding:'14px', textAlign:'center',
            fontFamily:P, fontWeight:600, fontSize:14, color:GRAY,
            border:`1.5px solid rgba(26,10,8,0.1)`,
          }}>Continuar sem cadastro</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN: HOME
══════════════════════════════════════ */

    const EMOJIS = ['🍔','🍕','🍣','🍗','🥗','🍜','🥩','🌮','🥪','🍱'];

  const cidades = lojas ? [...new Set(lojas.map(l=>l.cidade).filter(Boolean))].sort() : [];
  const filtered = lojas ? lojas.filter(l=>{
    const mc = !cidade || l.cidade===cidade;

  return (

      {/* Header */}

        position:'relative', zIndex:10, flexShrink:0,

        borderBottom: headerSolid ? '1px solid rgba(26,10,8,0.08)' : 'none',

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            {cidade && <div style={{fontFamily:P,fontSize:11,color:GRAY,marginBottom:2}}>📍 {cidade}</div>}
            <Logo size={22} dark/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {count>0 && (
              <div className="tap" onClick={()=>navigate('cart')} style={{
                position:'relative',width:40,height:40,borderRadius:11,
                background:R,display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:`0 4px 12px rgba(224,90,58,0.4)`,
              }}>
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <path d="M3 3h14l-2 9H5L3 3z" stroke="#fff" strokeWidth="1.6" strokeLinejoin="round"/>
                  <circle cx="7" cy="16.5" r="1.5" fill="#fff"/>
                  <circle cx="13" cy="16.5" r="1.5" fill="#fff"/>
                </svg>
                <div style={{position:'absolute',top:-5,right:-5}} className="badge">{count}</div>
              </div>
            )}
            {/* Avatar */}
            <div className="tap" onClick={()=>setShowPerfil(true)} style={{
              width:40,height:40,borderRadius:11,
              background:`linear-gradient(135deg,${R},${RD})`,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:`0 4px 12px rgba(224,90,58,0.25)`,
            }}>
              <span style={{fontFamily:P,fontWeight:800,fontSize:14,color:'#fff'}}>{initials}</span>
            </div>
          </div>
        </div>
        {/* Search */}
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1,position:'relative'}}>
            <svg style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}} width="15" height="15" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="5" stroke={GRAY} strokeWidth="1.5"/><path d="M11 11l3 3" stroke={GRAY} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
            <input value={busca} onChange={e=>setBusca(e.target.value)}
              style={{width:'100%',padding:'11px 12px 11px 34px',background:LIGHT,border:'1.5px solid rgba(26,10,8,0.08)',borderRadius:12,fontFamily:P,fontSize:13,color:DARK,outline:'none'}}
              placeholder="Buscar restaurante..."/>
          </div>
          {cidades.length>1 && (
            <select value={cidade} onChange={e=>setCidade(e.target.value)} style={{
              padding:'0 12px',background:LIGHT,border:'1.5px solid rgba(26,10,8,0.08)',borderRadius:12,fontFamily:P,fontSize:12,color:DARK,outline:'none',flexShrink:0,

              <option value="">Todas</option>
              {cidades.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* Body */}
      <div className="scroll" style={{flex:1}} onScroll={e=>setScrollY(e.target.scrollTop)}>

        {/* Banner */}
        <div style={{padding:'14px 20px 0'}}>
          <div style={{

          }}>
            <div style={{position:'absolute',right:-16,bottom:-24,fontSize:88,opacity:0.12}}>🍽️</div>
            <div style={{fontFamily:P,fontWeight:700,fontSize:11,color:'rgba(255,255,255,0.55)',marginBottom:4,letterSpacing:'0.06em',textTransform:'uppercase'}}>Plataforma independente</div>
            <div style={{fontFamily:P,fontWeight:800,fontSize:18,color:'#fff',lineHeight:1.25,marginBottom:12}}>Peça direto.<br/>Sem taxa extra.</div>
            <div style={{display:'inline-block',background:R,borderRadius:8,padding:'7px 16px',fontFamily:P,fontWeight:700,fontSize:12,color:'#fff'}}>Ver restaurantes ↓</div>
          </div>
        </div>

        {/* Categories */}
        <div style={{paddingTop:16,paddingBottom:4}}>
          <div style={{overflowX:'auto',display:'flex',gap:8,padding:'0 20px',scrollbarWidth:'none'}}>
            {CATS.map(c=>(
              <div key={c.id} className="tap" onClick={()=>setCat(c.id)} style={{
                flexShrink:0,display:'flex',alignItems:'center',gap:5,
                padding:'8px 14px',borderRadius:100,
                background:cat===c.id?R:'#fff',
                border:`1.5px solid ${cat===c.id?R:'rgba(26,10,8,0.09)'}`,
                fontFamily:P,fontWeight:cat===c.id?700:500,fontSize:12,
                color:cat===c.id?'#fff':DARK,
                boxShadow:cat===c.id?`0 4px 12px rgba(224,90,58,0.3)`:'none',
                transition:'all 0.18s',
              }}>
                <span style={{fontSize:14}}>{c.emoji}</span>{c.label}
              </div>
            ))}
          </div>
        </div>

        {/* Stores */}
        <div style={{padding:'14px 20px 24px'}}>
          <div style={{fontFamily:P,fontWeight:700,fontSize:16,color:DARK,marginBottom:12}}>
            {cat==='all'?'Todos os restaurantes':CATS.find(c=>c.id===cat)?.label}
            {lojas && <span style={{fontFamily:P,fontWeight:400,fontSize:12,color:GRAY,marginLeft:8}}>{filtered.length} lojas</span>}
          </div>

          {/* Loading skeletons */}
          {lojas===null && [1,2,3].map(i=>(
            <div key={i} style={{marginBottom:14}}>
              <div className="skel" style={{height:130,borderRadius:'14px 14px 0 0'}}/>
              <div style={{background:'#fff',borderRadius:'0 0 20px 20px',padding:'14px 16px',display:'flex',flexDirection:'column',gap:8}}>
                <div className="skel" style={{height:16,width:'60%'}}/>
                <div className="skel" style={{height:12,width:'40%'}}/>
              </div>
            </div>
          ))}

          {/* Empty */}
          {lojas && filtered.length===0 && (
            <div style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>🔍</div>
              <div style={{fontFamily:P,fontWeight:700,fontSize:16,color:DARK,marginBottom:6}}>Nenhum restaurante encontrado</div>
              <div style={{fontFamily:P,fontSize:13,color:GRAY}}>Tente mudar a cidade ou os filtros.</div>
            </div>
          )}

          {/* Cards */}
          {filtered.map(l=>(
            <StoreCard key={l.id} loja={l} onPress={l=>navigate('store',{loja:l})}/>
          ))}
        </div>
      </div>

      <BottomNav active="home" navigate={navigate}/>
      {showPerfil && <PerfilModal onClose={()=>setShowPerfil(false)}/>}
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN: STORE (cardápio)
══════════════════════════════════════ */
function StoreScreen({ loja, navigate }) {
  const {cart,add,remove,count} = useCart();
  const [items,    setItems]    = React.useState(null);
  const [activeCat,setActiveCat]= React.useState(null);
  const [scrollY,  setScrollY]  = React.useState(0);

  React.useEffect(()=>{
    // Tentar buscar itens do cardápio pelo slug da loja
    db.from('produtos')
      .select('*')
      .eq('estabelecimento_id', loja.id)
      .order('categoria')
      .then(({data})=>{
        if(data && data.length>0){
          setItems(data.map(p=>({
            id: p.id,
            name: p.nome||p.name,
            desc: p.descricao||p.description||'',
            price: parseFloat(p.preco||p.price||0),
            cat: p.categoria||p.category||'Cardápio',
            emoji: '🍽️',
          })));
        } else {
          // Fallback: itens de exemplo
          setItems([
            {id:`${loja.id}-1`,name:'Prato do dia',desc:'Peça já e descubra o sabor',price:22.90,cat:'Destaques',emoji:'⭐'},
            {id:`${loja.id}-2`,name:'Combo especial',desc:'Inclui bebida e sobremesa',price:38.90,cat:'Destaques',emoji:'🎁'},
            {id:`${loja.id}-3`,name:'Bebida gelada',desc:'Refrigerante ou suco 500ml',price:8.90,cat:'Bebidas',emoji:'🥤'},
          ]);
        }
      })
      .catch(()=>{
        setItems([
          {id:`${loja.id}-1`,name:'Prato do dia',desc:'Peça já e descubra o sabor',price:22.90,cat:'Destaques',emoji:'⭐'},
          {id:`${loja.id}-2`,name:'Combo especial',desc:'Inclui bebida e sobremesa',price:38.90,cat:'Destaques',emoji:'🎁'},
          {id:`${loja.id}-3`,name:'Bebida gelada',desc:'Refrigerante ou suco 500ml',price:8.90,cat:'Bebidas',emoji:'🥤'},
        ]);
      });
  },[loja.id]);

  const cats = items ? [...new Set(items.map(i=>i.cat))] : [];
  const curCat = activeCat||cats[0];
  const shown = items ? items.filter(i=>i.cat===curCat) : [];
  const getQty = id => cart.find(i=>i.id===id)?.qty||0;
  const ab = loja.aberto !== false;

  return (
    <div className="screen-enter" style={{position:'absolute',inset:0,background:CREAM,display:'flex',flexDirection:'column'}}>

      {/* Hero */}
      <div style={{position:'relative',height:scrollY>70?62:190,transition:'height 0.28s ease',flexShrink:0}}>
        <div style={{position:'absolute',inset:0,background:loja._bg||'#2D1B0E',overflow:'hidden',opacity:scrollY>70?0:1,transition:'opacity 0.28s'}}>
          {loja.logo_url
            ? <img src={loja.logo_url} alt={loja.nome} style={{width:'100%',height:'100%',objectFit:'cover',opacity:0.5}}/>
            : <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:80,opacity:0.25}}>{loja._emoji||'🏪'}</div>
          }
        </div>
        <div style={{
          position:'absolute',inset:0,zIndex:5,
          background:scrollY>70?CREAM:'transparent',
          display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:scrollY>70?'0 20px':'14px 20px',
          borderBottom:scrollY>70?'1px solid rgba(26,10,8,0.08)':'none',
          transition:'background 0.28s',
        }}>
          <div className="tap" onClick={()=>navigate('home')} style={{
            width:36,height:36,borderRadius:10,
            background:scrollY>70?LIGHT:'rgba(0,0,0,0.35)',
            backdropFilter:scrollY>70?'none':'blur(8px)',
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke={scrollY>70?DARK:'#fff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          {scrollY>70 && <div style={{fontFamily:P,fontWeight:700,fontSize:15,color:DARK}}>{loja.nome}</div>}
          <div className="tap" onClick={()=>navigate('cart')} style={{
            position:'relative',width:36,height:36,borderRadius:10,
            background:count>0?R:(scrollY>70?LIGHT:'rgba(0,0,0,0.35)'),
            backdropFilter:scrollY>70?'none':'blur(8px)',
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 3h14l-2 9H5L3 3z" stroke={count>0?'#fff':(scrollY>70?DARK:'#fff')} strokeWidth="1.6" strokeLinejoin="round"/><circle cx="7" cy="16.5" r="1.5" fill={count>0?'#fff':(scrollY>70?DARK:'#fff')}/><circle cx="13" cy="16.5" r="1.5" fill={count>0?'#fff':(scrollY>70?DARK:'#fff')}/></svg>
            {count>0 && <div style={{position:'absolute',top:-4,right:-4}} className="badge">{count}</div>}
          </div>
        </div>
        {scrollY<=70 && (
          <div style={{position:'absolute',bottom:14,left:20,right:20,zIndex:5}}>
            <div style={{fontFamily:P,fontWeight:800,fontSize:22,color:'#fff',textShadow:'0 2px 8px rgba(0,0,0,0.4)',marginBottom:4}}>{loja.nome}</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:ab?'#4ADE80':'#F87171',display:'inline-block'}}/>
              <span style={{fontFamily:P,fontSize:12,color:ab?'#4ADE80':'rgba(255,255,255,0.6)',fontWeight:600}}>{ab?'Aberto agora':'Fechado'}</span>
              {loja.cidade && <><span style={{color:'rgba(255,255,255,0.3)'}}>·</span><span style={{fontFamily:P,fontSize:12,color:'rgba(255,255,255,0.65)'}}>📍 {loja.cidade}</span></>}
            </div>
          </div>
        )}
      </div>

      {/* Category tabs */}
      {cats.length>0 && (
        <div style={{background:CREAM,borderBottom:'1px solid rgba(26,10,8,0.07)',overflowX:'auto',display:'flex',padding:'0 16px',gap:4,scrollbarWidth:'none',flexShrink:0}}>
          {cats.map(c=>(
            <div key={c} className="tap" onClick={()=>setActiveCat(c)} style={{
              flexShrink:0,padding:'12px 14px',fontFamily:P,fontWeight:curCat===c?700:500,
              fontSize:13,color:curCat===c?R:GRAY,
              borderBottom:`2.5px solid ${curCat===c?R:'transparent'}`,
              transition:'all 0.15s',whiteSpace:'nowrap',
            }}>{c}</div>
          ))}
        </div>
      )}

      {/* Items */}
      <div className="scroll" style={{flex:1,padding:'12px 20px 24px'}} onScroll={e=>setScrollY(e.target.scrollTop)}>
        {items===null && [1,2,3].map(i=>(
          <div key={i} style={{display:'flex',gap:14,padding:'16px 0',borderBottom:'1px solid rgba(26,10,8,0.06)',alignItems:'center'}}>
            <div className="skel" style={{width:76,height:76,borderRadius:12,flexShrink:0}}/>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
              <div className="skel" style={{height:14,width:'70%'}}/>
              <div className="skel" style={{height:11,width:'90%'}}/>
              <div className="skel" style={{height:16,width:'30%'}}/>
            </div>
          </div>
        ))}
        {shown.map(item=>{
          const qty=getQty(item.id);
          return (
            <div key={item.id} className="tap" onClick={()=>navigate('product',{item,loja})} style={{display:'flex',gap:14,padding:'16px 0',borderBottom:'1px solid rgba(26,10,8,0.06)',alignItems:'center'}}>
              <div style={{width:76,height:76,borderRadius:12,flexShrink:0,background:loja._bg||'#2D1B0E',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>{item.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,marginBottom:4}}>{item.name}</div>
                {item.desc && <div style={{fontFamily:P,fontWeight:400,fontSize:12,color:GRAY,lineHeight:1.5,marginBottom:6,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.desc}</div>}
                <div style={{fontFamily:P,fontWeight:800,fontSize:15,color:DARK}}>{fmt(item.price)}</div>
              </div>
              <div style={{flexShrink:0}} onClick={e=>{e.stopPropagation();add(item);}}>
                {qty===0
                  ? <div style={{width:34,height:34,borderRadius:10,background:R,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 12px rgba(224,90,58,0.35)`}}>
                      <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M4 9h10" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                    </div>
                  : <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div onClick={e=>{e.stopPropagation();remove(item.id);}} style={{width:28,height:28,borderRadius:8,background:LIGHT,display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke={DARK} strokeWidth="2" strokeLinecap="round"/></svg>
                      </div>
                      <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,minWidth:14,textAlign:'center'}}>{qty}</span>
                      <div style={{width:28,height:28,borderRadius:8,background:R,display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                      </div>
                    </div>
                }
              </div>
            </div>
          );
        })}
      </div>

      {count>0 && (
        <div style={{padding:'12px 20px 8px',background:CREAM,borderTop:'1px solid rgba(26,10,8,0.07)'}}>
          <div className="tap" onClick={()=>navigate('cart')} style={{
            background:R,borderRadius:14,padding:'15px 20px',
            display:'flex',justifyContent:'space-between',alignItems:'center',
            boxShadow:`0 8px 24px rgba(224,90,58,0.4)`,
          }}>
            <div style={{background:'rgba(255,255,255,0.2)',borderRadius:8,padding:'3px 10px',fontFamily:P,fontWeight:700,fontSize:13,color:'#fff'}}>{count}</div>
            <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Ver carrinho</span>
            <span style={{fontFamily:P,fontWeight:700,fontSize:13,color:'rgba(255,255,255,0.85)'}}>{fmt(cart.reduce((s,i)=>s+i.price*i.qty,0))}</span>
          </div>
        </div>
      )}
    </div>
  );
}

              <div style={{display:'flex',gap:10,alignItems:'center',background:LIGHT,borderRadius:12,padding:'11px 18px',flex:1,justifyContent:'center'}}>
                <div className="tap" onClick={()=>remove(item.id)} style={{width:30,height:30,borderRadius:8,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(0,0,0,0.07)'}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke={DARK} strokeWidth="2" strokeLinecap="round"/></svg></div>
                <span style={{fontFamily:P,fontWeight:800,fontSize:18,color:DARK,minWidth:22,textAlign:'center'}}>{qty}</span>
                <div className="tap" onClick={()=>add(item)} style={{width:30,height:30,borderRadius:8,background:R,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 10px rgba(224,90,58,0.3)`}}><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div>
              </div>
              <div className="tap" onClick={()=>navigate('cart')} style={{background:R,borderRadius:12,padding:'13px 18px',fontFamily:P,fontWeight:700,fontSize:13,color:'#fff',boxShadow:`0 6px 18px rgba(224,90,58,0.4)`,whiteSpace:'nowrap'}}>Ver carrinho</div>
            </div>
        }
      </div>
    </div>
  );
}

   SCREEN: CART

function CartScreen({ navigate }) {
  const {cart,add,remove,total} = useCart();
  if(cart.length===0) return (
    <div className="screen-enter" style={{position:'absolute',inset:0,background:CREAM,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40}}>
      <div style={{fontSize:60,marginBottom:18}}>🛒</div>
      <div style={{fontFamily:P,fontWeight:700,fontSize:18,color:DARK,marginBottom:8,textAlign:'center'}}>Carrinho vazio</div>
      <div style={{fontFamily:P,fontSize:13,color:GRAY,textAlign:'center',marginBottom:28}}>Adicione itens de um restaurante</div>
      <div className="tap" onClick={()=>navigate('home')} style={{background:R,borderRadius:12,padding:'13px 28px',fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Ver restaurantes</div>
    </div>
  );
  return (
    <div className="screen-enter" style={{position:'absolute',inset:0,background:LIGHT,display:'flex',flexDirection:'column'}}>
      <div style={{background:CREAM,padding:'14px 20px',borderBottom:'1px solid rgba(26,10,8,0.07)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <div className="tap" onClick={()=>navigate('home')} style={{width:36,height:36,borderRadius:10,background:LIGHT,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke={DARK} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{fontFamily:P,fontWeight:700,fontSize:17,color:DARK}}>Carrinho</div>
      </div>
      <div className="scroll" style={{flex:1,padding:'16px 20px'}}>
        {/* Items */}
        <div style={{background:CREAM,borderRadius:16,overflow:'hidden',marginBottom:14,border:'1px solid rgba(26,10,8,0.06)'}}>
          {cart.map((item,idx)=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderBottom:idx<cart.length-1?'1px solid rgba(26,10,8,0.06)':'none'}}>

              <div style={{flex:1}}>
                <div style={{fontFamily:P,fontWeight:600,fontSize:13,color:DARK}}>{item.name}</div>
                <div style={{fontFamily:P,fontWeight:700,fontSize:13,color:R,marginTop:2}}>{fmt(item.price*item.qty)}</div>

                <div className="tap" onClick={()=>add(item)} style={{width:26,height:26,borderRadius:7,background:R,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg></div>
              </div>
            </div>
          ))}
        </div>
        {/* Summary */}
        <div style={{background:CREAM,borderRadius:16,padding:'16px',border:'1px solid rgba(26,10,8,0.06)',marginBottom:14}}>
          <div style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK,marginBottom:12}}>Resumo do pedido</div>
          {[{l:'Subtotal',v:fmt(total)},{l:'Entrega',v:'Grátis',g:true},{l:'Taxa',v:'R$ 0,00',g:true}].map((r,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontFamily:P,fontSize:13,color:GRAY}}>{r.l}</span>
              <span style={{fontFamily:P,fontWeight:600,fontSize:13,color:r.g?'#22A85A':DARK}}>{r.v}</span>
            </div>
          ))}
          <div style={{height:1,background:'rgba(26,10,8,0.07)',margin:'10px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:DARK}}>Total</span>
            <span style={{fontFamily:P,fontWeight:900,fontSize:18,color:DARK}}>{fmt(total)}</span>
          </div>
        </div>
        {/* Address */}
        <div style={{background:CREAM,borderRadius:14,padding:'13px 16px',border:'1px solid rgba(26,10,8,0.06)',display:'flex',gap:10,alignItems:'center'}}>
          <div style={{width:36,height:36,background:`rgba(224,90,58,0.1)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 010 10C6 12 3 9 3 7a6 6 0 1112 0c0 2-3 5-6 5z" stroke={R} strokeWidth="1.5"/><circle cx="9" cy="7" r="2" stroke={R} strokeWidth="1.5"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:P,fontWeight:600,fontSize:13,color:DARK}}>Endereço de entrega</div>
            <div style={{fontFamily:P,fontSize:12,color:GRAY}}>Confirme ao finalizar o pedido</div>
          </div>
          <span style={{fontFamily:P,fontWeight:600,fontSize:12,color:R,flexShrink:0}}>Alterar</span>
        </div>
      </div>
      <div style={{padding:'12px 20px 8px',background:CREAM,borderTop:'1px solid rgba(26,10,8,0.07)'}}>
        <div className="tap" onClick={()=>navigate('confirm')} style={{
          background:R,borderRadius:14,padding:'15px',
          display:'flex',alignItems:'center',justifyContent:'space-between',
          boxShadow:`0 8px 24px rgba(224,90,58,0.4)`,
        }}>
          <span style={{fontFamily:P,fontWeight:700,fontSize:14,color:'#fff'}}>Confirmar pedido</span>
          <span style={{fontFamily:P,fontWeight:900,fontSize:14,color:'rgba(255,255,255,0.9)'}}>{fmt(total)}</span>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN: CONFIRM
══════════════════════════════════════ */
function ConfirmScreen({ navigate }) {
  const {clear} = useCart();
  const [step,setStep] = React.useState(0);
  const steps = ['Pedido confirmado!','Preparando...','A caminho!','Entregue! 🎉'];
  const icons  = ['✅','👨‍🍳','🛵','🎉'];
  const descs  = ['Seu pedido foi recebido.','O restaurante está preparando.','O entregador está a caminho!','Bom apetite!'];
  React.useEffect(()=>{ if(step<3){const t=setTimeout(()=>setStep(s=>s+1),step===0?1000:2200);return()=>clearTimeout(t);} },[step]);
  const prog = (step+1)/4;
  return (
    <div className="screen-enter" style={{position:'absolute',inset:0,background:CREAM,display:'flex',flexDirection:'column'}}>
      <div style={{background:CREAM,padding:'14px 20px',borderBottom:'1px solid rgba(26,10,8,0.07)',flexShrink:0}}><Logo size={20} dark/></div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28}}>
        <div style={{fontSize:68,marginBottom:18,transition:'all 0.4s'}}>{icons[step]}</div>
        <div style={{fontFamily:P,fontWeight:800,fontSize:22,color:DARK,textAlign:'center',marginBottom:8}}>{steps[step]}</div>
        <div style={{fontFamily:P,fontSize:14,color:GRAY,textAlign:'center',marginBottom:32,lineHeight:1.6}}>{descs[step]}</div>
        <div style={{width:'100%',maxWidth:260,marginBottom:32}}>
          <div style={{height:6,background:LIGHT,borderRadius:3,overflow:'hidden',marginBottom:8}}>
            <div style={{height:'100%',background:R,borderRadius:3,width:`${prog*100}%`,transition:'width 1s cubic-bezier(0.25,0.46,0.45,0.94)',boxShadow:`0 0 8px rgba(224,90,58,0.4)`}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            {['Confirmado','Preparando','A caminho','Entregue'].map((s,i)=>(
              <div key={i} style={{fontFamily:P,fontSize:9,color:i<=step?R:'rgba(107,100,96,0.3)',fontWeight:i===step?700:400,textAlign:'center',flex:1}}>{s}</div>
            ))}
          </div>
        </div>
        <div style={{background:LIGHT,borderRadius:12,padding:'12px 22px',textAlign:'center',marginBottom:28,border:'1px solid rgba(26,10,8,0.07)'}}>
          <div style={{fontFamily:P,fontSize:11,color:GRAY,marginBottom:3}}>Código do pedido</div>
          <div style={{fontFamily:P,fontWeight:800,fontSize:20,color:DARK,letterSpacing:'0.06em'}}>#PW{Math.floor(1000+Math.random()*9000)}</div>
        </div>
        {step===3 && (
          <div className="tap" onClick={()=>{clear();navigate('home');}} style={{background:R,borderRadius:14,padding:'13px 36px',fontFamily:P,fontWeight:700,fontSize:14,color:'#fff',boxShadow:`0 8px 22px rgba(224,90,58,0.35)`}}>
            Novo pedido
          </div>
        )}
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ── */
function BottomNav({ active, navigate }) {
  const {count} = useCart();
  const items = [
    {id:'home',label:'Início',icon:a=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 10L11 3l8 7v8a1 1 0 01-1 1H14v-5H8v5H4a1 1 0 01-1-1v-8z" stroke={a?R:GRAY} strokeWidth="1.8" strokeLinejoin="round" fill={a?`rgba(224,90,58,0.1)`:'none'}/></svg>},
    {id:'search',label:'Buscar',icon:a=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="10" cy="10" r="7" stroke={a?R:GRAY} strokeWidth="1.8"/><path d="M16 16l3.5 3.5" stroke={a?R:GRAY} strokeWidth="1.8" strokeLinecap="round"/></svg>},
    {id:'cart',label:'Carrinho',icon:a=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 3h16l-2.5 10H5.5L3 3z" stroke={a?R:GRAY} strokeWidth="1.8" strokeLinejoin="round" fill={a?`rgba(224,90,58,0.1)`:'none'}/><circle cx="8.5" cy="18.5" r="2" stroke={a?R:GRAY} strokeWidth="1.6"/><circle cx="15.5" cy="18.5" r="2" stroke={a?R:GRAY} strokeWidth="1.6"/></svg>},
    {id:'orders',label:'Pedidos',icon:a=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="4" y="3" width="14" height="16" rx="2" stroke={a?R:GRAY} strokeWidth="1.8" fill={a?`rgba(224,90,58,0.1)`:'none'}/><path d="M8 8h6M8 12h4" stroke={a?R:GRAY} strokeWidth="1.8" strokeLinecap="round"/></svg>},
  ];
  return (
    <div style={{background:CREAM,borderTop:'1px solid rgba(26,10,8,0.08)',padding:'8px 0 4px',display:'flex',flexShrink:0}}>
      {items.map(item=>(
        <div key={item.id} className="tap" onClick={()=>navigate(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 0',position:'relative'}}>
          {item.id==='cart'&&count>0&&<div style={{position:'absolute',top:0,right:'18%'}} className="badge">{count}</div>}
          {item.icon(active===item.id)}
          <span style={{fontFamily:P,fontSize:10,fontWeight:active===item.id?700:500,color:active===item.id?R:GRAY}}>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ── APP ROUTER ── */
function App() {
  const [screen,setScreen] = React.useState(()=>{ try{return JSON.parse(localStorage.getItem('pw-app-screen')||'"home"')}catch{return'home'} });
  const [params,setParams] = React.useState({});
  const navigate = (s,p={}) => { setScreen(s); setParams(p); try{localStorage.setItem('pw-app-screen',JSON.stringify(s))}catch{} };
  const screens = {
    home:    <HomeScreen navigate={navigate}/>,
    store:   <StoreScreen loja={params.loja||{id:0,nome:'Loja',_bg:'#2D1B0E',_emoji:'🏪'}} navigate={navigate}/>,
    product: <ProductScreen item={params.item||{id:0,name:'Produto',price:0,emoji:'🍽️',cat:'Cardápio'}} loja={params.loja||{nome:'Loja',_bg:'#2D1B0E',_emoji:'🏪'}} navigate={navigate}/>,
    cart:    <CartScreen navigate={navigate}/>,
    confirm: <ConfirmScreen navigate={navigate}/>,
    search:  <HomeScreen navigate={navigate}/>,
    orders:  <CartScreen navigate={navigate}/>,
  };
  return (
    <UserProvider>
      <CartProvider>
        <IOSDevice statusBarStyle="dark">
          <div style={{position:'absolute',inset:0,overflow:'hidden',background:CREAM}}>
            {screens[screen]||screens.home}
          </div>
        </IOSDevice>
      </CartProvider>
    </UserProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
