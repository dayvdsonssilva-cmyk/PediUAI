      <div><div style="font-size:15px;font-weight:800;color:var(--dark);">${u.nome}</div><div style="font-size:12px;color:var(--gray);">${u.cidade||'Cidade não definida'}</div></div>
    </div>`:`<div style="font-size:19px;font-weight:800;color:var(--dark);margin-bottom:4px;">👋 ${primeiraVez?'Bem-vindo!':'Meu perfil'}</div><div style="font-size:13px;color:var(--gray);margin-bottom:18px;">Cadastro rápido para começar</div>`}
    <div class="form-field"><label class="form-label">Seu nome</label><input class="form-input" id="pf-nome" value="${u.nome||''}" placeholder="João Silva"></div>
    <div class="form-field"><label class="form-label">WhatsApp</label><input class="form-input" id="pf-tel" value="${u.tel||''}" placeholder="(11) 99999-9999" oninput="mskTel(this)" type="tel"></div>
    <div class="form-field"><label class="form-label">E-mail</label><input class="form-input" id="pf-email" value="${u.email||''}" placeholder="seu@email.com" type="email"></div>
    <div class="form-field"><label class="form-label">Estado</label>
      <select class="form-input" id="pf-estado" onchange="carregarCidadesIBGE(this.value,'pf-cidade')">
        <option value="">Selecione...</option>
        ${_estados.map(e=>`<option value="${e.sigla}" ${(u.estadoSigla||'')===(e.sigla)?'selected':''}>${e.nome}</option>`).join('')}
      </select>
    </div>
    <div class="form-field"><label class="form-label">Cidade</label>
      <select class="form-input" id="pf-cidade">
        ${u.cidade?`<option value="${u.cidade}" selected>${u.cidade}</option>`:'<option value="">Selecione o estado primeiro</option>'}
      </select>

    <button class="btn-primary" onclick="salvarPerfil()">${u.nome&&!primeiraVez?'💾 Salvar':'Entrar →'}</button>
    ${u.nome&&!primeiraVez?`<button class="btn-ghost" style="margin-top:8px;color:#EF4444;border-color:rgba(239,68,68,.2);" onclick="sair()">Sair da conta</button>`:''}
    ${primeiraVez?`<button class="btn-ghost" style="margin-top:8px;" onclick="fecharPerfil()">Continuar sem cadastro</button>`:''}
  `;
  $('modal-perfil').classList.add('open');

function fecharPerfil() { $('modal-perfil').classList.remove('open'); }

async function salvarPerfil() {
  const nome  = $('pf-nome')?.value.trim();
  const tel   = $('pf-tel')?.value.trim();
  const email = $('pf-email')?.value.trim();
  const estSel= $('pf-estado');
  const uf    = estSel?.value;
  const estadoNome=estSel?.options[estSel.selectedIndex]?.text||uf;
  const cidade=$('pf-cidade')?.value;

  if(!nome) return toast('Digite seu nome');
  if(!tel||tel.replace(/\D/g,'').length<10) return toast('WhatsApp inválido');
  if(!uf)    return toast('Selecione o estado');
  if(!cidade) return toast('Selecione a cidade');

  _user={nome,tel,email,estado:estadoNome,estadoSigla:uf,cidade};
  localStorage.setItem('pw_cliente',JSON.stringify(_user));

  // Salva no Supabase
  try { await db.from('clientes').upsert({nome,telefone:tel.replace(/\D/g,''),email,estado:estadoNome,cidade},{onConflict:'email'}); } catch(e){}

  // Atualiza avatar
  $('home-avatar').textContent=nome[0].toUpperCase();
  $('search-avatar').textContent=nome[0].toUpperCase();

  // Aplica cidade
  _cidade=cidade;
  $('home-cidade').textContent='📍 '+cidade;
  $('home-cidade').style.display='block';

  fecharPerfil();
  renderHome();
  toast('✅ Bem-vindo, '+nome.split(' ')[0]+'!');
}

function sair() {
  _user=null; _cidade='';
  localStorage.removeItem('pw_cliente');
  $('home-avatar').textContent='?';
  $('search-avatar').textContent='?';
  $('home-cidade').style.display='none';
  fecharPerfil();
  renderHome();
  toast('Até logo! 👋');
}

// HELPERS
// ═══════════════════════════════════════════════════════
function normalizeHex(cor) {
  if(!cor) return '#C0392B';
  if(cor.startsWith('#')) return cor;
  const m=cor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  return m?'#'+[m[1],m[2],m[3]].map(n=>(+n).toString(16).padStart(2,'0')).join(''):'#C0392B';
}

function darken(hex,amt) {
  const m=hex.replace('#','').match(/.{2}/g);
  if(!m||m.length<3) return hex;
  return '#'+m.map(h=>Math.max(0,parseInt(h,16)-amt).toString(16).padStart(2,'0')).join('');
}

function lojaEmoji(nome) {
  const n=(nome||'').toLowerCase();
  if(n.includes('pizza')||n.includes('pizz')) return '🍕';
  if(n.includes('burger')||n.includes('hamburguer')||n.includes('burguer')) return '🍔';
  if(n.includes('açaí')||n.includes('acai')) return '🍧';
  if(n.includes('sushi')||n.includes('japonês')) return '🍣';
  if(n.includes('doce')||n.includes('confeit')||n.includes('bolo')) return '🍰';
  if(n.includes('lanche')) return '🥪';
  if(n.includes('churrasco')||n.includes('carne')) return '🥩';
  return '🍽️';
}

function mskTel(inp) {
  let v=(inp.value||'').replace(/\D/g,'').slice(0,11);
  if(v.length>10) v=v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
  else if(v.length>6) v=v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d*)$/,'($1) $2');
  else if(v.length>0) v='('+v;
  inp.value=v;
}
window.mskTel=mskTel;

let _toastTimer=null;
function toast(msg) {
  const el=$('app-toast'); if(!el) return;
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
