<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Comandas — PEDIWAY</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'Poppins',sans-serif;background:#f5f0eb;color:#1a1a1a}
    :root{--red:#C0392B;--border:#e0dbd5}
    .gc-header{background:#1a1a1a;color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .gc-logo{font-weight:800;font-size:1rem}.gc-logo span{color:var(--red)}
    .gc-loja{font-size:.72rem;color:#aaa;font-weight:500;margin-top:1px}
    .gc-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:4px 10px;border-radius:50px;font-size:.68rem;font-weight:700;color:#ddd}
    .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:#aaa}
    .spinner{width:34px;height:34px;border:3px solid #e0dbd5;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .gc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 14px 0}
    .stat-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center}
    .stat-label{font-size:.58rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .stat-num{font-size:1.3rem;font-weight:800}
    .stat-num.red{color:var(--red)}.stat-num.green{color:#22c55e}
    .section-title{font-size:.7rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;padding:14px 14px 8px}
    .mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;padding:0 14px 100px}
    .mesa-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:14px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;min-height:105px;justify-content:center;transition:all .2s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .mesa-card:active{transform:scale(.97)}
    .mesa-card.ocupada{border-color:#16a34a;background:linear-gradient(135deg,#f0fdf4,#fff);animation:pulse 2.5s ease-in-out infinite}
    .mesa-card.fechando{border-color:var(--red);background:#fff5f5;animation:none}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.1)}50%{box-shadow:0 0 0 8px rgba(22,163,74,0)}}
    .mesa-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:9px;right:9px}
    .mesa-dot.livre{background:#d1d5db}.mesa-dot.ocup{background:#16a34a;animation:blink 1.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .mesa-num{font-size:1.8rem;font-weight:800;line-height:1}
    .mesa-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#bbb}
    .mesa-total{font-size:.85rem;font-weight:800;color:var(--red)}.mesa-qtd{font-size:.65rem;color:#aaa}
    #gc-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end;justify-content:center}
    #gc-modal.open{display:flex}
    #gc-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;display:flex;flex-direction:column;height:94vh;overflow:hidden}
    .modal-hdr{padding:15px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
    .modal-mesa{font-size:1.2rem;font-weight:800}.modal-sub{font-size:.6rem;color:#aaa;margin-top:1px}
    .modal-total-lbl{font-size:.58rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
    .modal-total-val{font-size:1.1rem;font-weight:800;color:var(--red)}
    .btn-x{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#aaa;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
    .btn-x:hover{background:#f0e9e0}
    .nome-wrap{padding:9px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
    .nome-input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'Poppins',sans-serif;font-size:.88rem;outline:none;background:#faf8f5;transition:border-color .2s}
    .nome-input:focus{border-color:var(--red);background:#fff}
    .modal-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0}
    .mtab{flex:1;padding:11px;border:none;background:none;font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s}
    .mtab.on{color:var(--red);border-bottom-color:var(--red);font-weight:700}
    .panel{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
    #gc-cardapio{overflow-y:auto;flex:1;padding:8px 12px;-webkit-overflow-scrolling:touch}
    .cat-lbl{font-size:.6rem;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.08em;padding:8px 0 4px;display:block}
    .prod-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px;user-select:none}
    .prod-item:active{background:#f0e9e0;transform:scale(.98)}
    .prod-emoji{font-size:1.4rem;width:34px;text-align:center;flex-shrink:0}
    .prod-nome{font-size:.86rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .prod-preco{font-size:.85rem;font-weight:800;color:var(--red);flex-shrink:0}
    .carr-sep{border-top:2px dashed var(--border);background:#faf8f5;flex-shrink:0}
    .carr-top{padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
    .carr-top-lbl{font-size:.68rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em}
    .carr-subtotal{font-size:.9rem;font-weight:800;color:var(--red)}
    #gc-carr{max-height:155px;overflow-y:auto;padding:0 12px 4px;-webkit-overflow-scrolling:touch}
    .carr-empty{color:#ccc;font-size:.75rem;text-align:center;padding:10px 0}
    .carr-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border)}
    .carr-row:last-child{border-bottom:none}
    .carr-emoji{font-size:1rem;flex-shrink:0}.carr-nome{font-size:.82rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .carr-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .carr-btn{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800}
    .carr-btn.plus{border:none;background:var(--red);color:#fff}
    .carr-qtd{font-size:.88rem;font-weight:800;min-width:16px;text-align:center}
    .carr-sub{font-size:.78rem;font-weight:700;color:var(--red);min-width:56px;text-align:right}
    .gc-actions{padding:10px 14px 20px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;border-top:1px solid var(--border)}
    .btn-enviar{background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Poppins',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;width:100%;transition:opacity .2s}
    .btn-enviar:disabled{opacity:.4;cursor:not-allowed}
    .btn-fechar{background:#1a1a1a;color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Poppins',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;width:100%}
    .hist-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#faf8f5;flex-shrink:0}
    .hist-hdr-lbl{font-size:.7rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em}
    .btn-print{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-family:'Poppins',sans-serif;font-size:.7rem;font-weight:700;color:#555;cursor:pointer}
    #gc-historico{overflow-y:auto;flex:1;padding:10px 12px;-webkit-overflow-scrolling:touch}
    .hist-bloco{border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;background:#fff}
    .hist-id{font-size:.68rem;font-weight:700;color:#aaa;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
    .hist-item-row{display:flex;justify-content:space-between;font-size:.82rem;padding:2px 0}
    .hist-sub{text-align:right;font-size:.78rem;color:var(--red);font-weight:700;margin-top:4px}
    .s-novo{color:#f59e0b;font-weight:700}.s-preparo{color:#3b82f6;font-weight:700}.s-pronto{color:#22c55e;font-weight:700}
    #gc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:50px;font-weight:700;font-size:.82rem;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none}
  </style>
</head>
<body>
<div class="gc-header">
  <div>
    <div class="gc-logo">PEDI<span>WAY</span></div>
    <div class="gc-loja" id="gc-loja-nome">Carregando...</div>
  </div>
  <div class="gc-badge" id="gc-badge-nome">&#127829; Carregando...</div>
</div>
<div id="gc-loading" class="loading-wrap"><div class="spinner"></div><div style="font-size:.82rem">Carregando...</div></div>
<div id="gc-main" style="display:none">
  <div class="gc-stats">
    <div class="stat-box"><div class="stat-label">Ocupadas</div><div class="stat-num red" id="gc-ocup">0</div></div>
    <div class="stat-box"><div class="stat-label">Pedidos</div><div class="stat-num" id="gc-peds">0</div></div>
    <div class="stat-box"><div class="stat-label">Total</div><div class="stat-num green" id="gc-total">R$0</div></div>
  </div>
  <div class="section-title">Mesas</div>
  <div class="mesas-grid" id="gc-grid"></div>
</div>
<div id="gc-modal">
  <div id="gc-sheet">
    <div class="modal-hdr">
      <div style="flex:1;min-width:0">
        <div class="modal-mesa" id="gc-modal-mesa">Mesa --</div>
        <div class="modal-sub">Comanda digital</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="modal-total-lbl">Total da mesa</div>
        <div class="modal-total-val" id="gc-modal-total">R$ 0,00</div>
      </div>
      <button class="btn-x" onclick="gcFechar()">&#10005;</button>
    </div>
    <div class="nome-wrap">
      <input class="nome-input" id="gc-nome" placeholder="Nome do cliente (opcional)" oninput="gcSalvarNome(this.value)">
    </div>
    <div class="modal-tabs">
      <button class="mtab on" id="tab-novo" onclick="gcTab('novo')">&#10133; Novo pedido</button>
      <button class="mtab"    id="tab-hist" onclick="gcTab('hist')">&#128203; Comanda</button>
    </div>
    <div id="gc-novo-panel" class="panel">
      <!-- Busca de produto -->
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff">
        <input id="gc-busca" placeholder="&#128269; Buscar item..." oninput="gcBuscar(this.value)"
          style="width:100%;border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'Poppins',sans-serif;font-size:.85rem;outline:none;background:#faf8f5;transition:border-color .2s">
      </div>
      <div id="gc-cardapio"></div>
      <div class="carr-sep">
        <div class="carr-top"><span class="carr-top-lbl">Selecionados</span><span class="carr-subtotal" id="gc-carr-sub">R$ 0,00</span></div>
        <div id="gc-carr"><div class="carr-empty">Nenhum item</div></div>
      </div>
      <div class="gc-actions">
        <button class="btn-enviar" id="gc-btn-env" disabled onclick="gcEnviar()">Enviar para cozinha &#127859;</button>
        <button class="btn-fechar" onclick="gcFecharComanda()">Fechar comanda &#9989;</button>
      </div>
    </div>
    <div id="gc-hist-panel" class="panel" style="display:none;flex-direction:column">
      <div class="hist-hdr">
        <span class="hist-hdr-lbl">Pedidos da mesa</span>
        <button class="btn-print" onclick="gcImprimir()">&#128424; Imprimir</button>
      </div>
      <div id="gc-historico"></div>
      <div class="gc-actions"><button class="btn-fechar" onclick="gcFecharComanda()">Fechar comanda &#9989;</button></div>
    </div>
  </div>
</div>
<div id="gc-toast"></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SUPA_URL = 'https://nmttkjmfazcipefeakkx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdHRram1mYXpjaXBlZmVha2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTM3NjQsImV4cCI6MjA5MDI4OTc2NH0.MMTX_6iQJk7Uv3HPSk0m32_BihvqsWhHJ_qiRkw0WYo';
const db=createClient(SUPA_URL,SUPA_KEY);
const $=id=>document.getElementById(id);
const fmtR=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');

// EXTRAI SLUG — /comandas/nome_da_loja → nome_da_loja
// Usa o mesmo padrão do cliente.html mas pega o 2o segmento
const _p=location.pathname;
const _segs=_p.replace(/^\/|\/$/g,'').split('/');
// _segs = ['comandas','nome_da_loja'] → slug = _segs[1]
// ou _segs = ['nome_da_loja'] → slug = _segs[0] (fallback)
const slug=_segs.length>=2&&_segs[0]==='comandas'?_segs[1]:_segs[_segs.length-1]||'';
console.log('[Garcom] pathname='+_p+' slug='+slug);

let estab=null,produtos=[],pedMesas={},nomes={},carrinhos={},mesaAtual=null,fechadas=new Set();

async function init(){
  if(!slug){$('gc-loading').innerHTML='<p style="color:#aaa;padding:40px;text-align:center">Link invalido - slug nao encontrado</p>';return;}
  const{data:est,error}=await db.from('estabelecimentos').select('*').eq('slug',slug).maybeSingle();
  console.log('[Garcom] resultado:',est?.nome,'erro:',error?.message);
  if(!est){
    $('gc-loading').innerHTML='<p style="color:#aaa;padding:40px;text-align:center;line-height:2">Loja nao encontrada<br><small style="font-size:.7rem">slug: "'+slug+'"</small></p>';
    return;
  }
  estab=est;$('gc-loja-nome').textContent=est.nome;document.title='Garcom - '+est.nome;var b=$('gc-badge-nome');if(b)b.textContent='🍽️ '+est.nome;
  const{data:prods}=await db.from('produtos').select('id,nome,preco,emoji,categoria,disponivel').eq('estabelecimento_id',est.id).eq('disponivel',true).order('categoria');
  produtos=prods||[];
  await loadPedidos();iniciarRealtime();
  $('gc-loading').style.display='none';$('gc-main').style.display='block';renderMesas();
}

async function loadPedidos(){
  // Só carrega pedidos ATIVOS — mesa fica limpa após fechar comanda
  const{data}=await db.from('pedidos').select('*')
    .eq('estabelecimento_id',estab.id)
    .ilike('endereco','No local%')
    .in('status',['novo','preparo'])
    .order('created_at',{ascending:true});
  pedMesas={};
  (data||[]).forEach(p=>{const parts=(p.endereco||'').split('—');if(parts.length<2)return;const key=parts[1].trim();if(!pedMesas[key])pedMesas[key]=[];pedMesas[key].push(p);});
}

function iniciarRealtime(){
  db.channel('gc-'+estab.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'pedidos'},async payload=>{
      const p=payload.new;
      if(!p||p.estabelecimento_id!==estab.id)return;
      if(!p.endereco?.startsWith('No local'))return;
      if(!['novo','preparo'].includes(p.status))return;
      const key=(p.endereco||'').split('—')[1]?.trim();if(!key)return;
      if(!pedMesas[key])pedMesas[key]=[];
      if(!pedMesas[key].find(x=>x.id===p.id)){pedMesas[key].push(p);renderMesas();toast('Novo pedido na '+key+'!');if(mesaAtual===key)renderHistorico();}
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pedidos'},payload=>{
      const p=payload.new;if(p.estabelecimento_id!==estab.id)return;
      // Atualiza status; remove se virou pronto/recusado (mesa fica limpa)
Object.keys(pedMesas).forEach(k=>{
  const idx=pedMesas[k].findIndex(x=>x.id===p.id);
  if(idx>=0){
    if(['pronto','recusado'].includes(p.status)){
      pedMesas[k].splice(idx,1);
      if(!pedMesas[k].length)delete pedMesas[k];
    } else {
      pedMesas[k][idx]={...pedMesas[k][idx],...p};
    }
  }
});
      renderMesas();if(mesaAtual)renderHistorico();
    }).subscribe();
}

function numMesas(){return parseInt(localStorage.getItem('pw_num_mesas_'+(estab?.id||''))||localStorage.getItem('gc_num_mesas_'+(estab?.id||''))||'10',10);}

function renderMesas(){
  const n=numMesas();const grid=$('gc-grid');if(!grid)return;
  const allP=Object.values(pedMesas).flat();
  const allAtivos=allP.filter(p=>['novo','preparo'].includes(p.status));
  const mOcup=Object.keys(pedMesas).filter(k=>pedMesas[k].some(p=>['novo','preparo'].includes(p.status))).length;
  const tot=allAtivos.reduce((s,p)=>s+Number(p.total||0),0);
  $('gc-ocup').textContent=mOcup;$('gc-peds').textContent=allP.length;$('gc-total').textContent='R$'+tot.toFixed(0);
  grid.innerHTML=Array.from({length:n},(_,i)=>{
    const num=i+1,key='Mesa '+num,peds=pedMesas[key]||[],ativ=peds.length>0,fech=fechadas.has(key);
    const ativos=peds.filter(p=>['novo','preparo'].includes(p.status));
    const t=ativos.reduce((s,p)=>s+Number(p.total||0),0);
    const q=ativos.reduce((s,p)=>s+(Array.isArray(p.itens)?p.itens.reduce((a,i)=>a+(i.qtd||1),0):0),0);
    const ativ2=ativos.length>0;
    let cls='',dot='livre',info='<span class="mesa-lbl">Livre</span>';
    if(fech){cls='fechando';info='<span class="mesa-lbl" style="color:var(--red)">✗ Fechada</span>';}
    else if(ativ2){cls='ocupada';dot='ocup';info='<span class="mesa-total">'+fmtR(t)+'</span><span class="mesa-qtd">'+peds.length+' ped &#183; '+q+' itens</span>';}
    return '<div class="mesa-card '+cls+'" onclick="gcAbrir('+num+')"><div class="mesa-dot '+dot+'"></div><div class="mesa-num">'+num+'</div><div style="display:flex;flex-direction:column;align-items:center;gap:3px">'+info+'</div></div>';
  }).join('');
}

window.gcAbrir=async function(num){
  mesaAtual='Mesa '+num;if(!carrinhos[mesaAtual])carrinhos[mesaAtual]=[];
  $('gc-modal-mesa').textContent=mesaAtual;$('gc-nome').value=nomes[mesaAtual]||'';
  renderCardapio();renderCarrinho();renderHistorico();atualizarTotalMesa();gcTab('novo');
  const buscaEl=$('gc-busca');if(buscaEl)buscaEl.value='';
  $('gc-modal').classList.add('open');document.body.style.overflow='hidden';
};
window.gcFechar=function(){$('gc-modal').classList.remove('open');document.body.style.overflow='';mesaAtual=null;};
window.gcSalvarNome=function(v){if(mesaAtual)nomes[mesaAtual]=v.trim();};
window.gcTab=function(t){['novo','hist'].forEach(x=>{$('tab-'+x).classList.toggle('on',x===t);$('gc-'+x+'-panel').style.display=x===t?'flex':'none';});};

function renderCardapio(){
  const el=$('gc-cardapio');if(!el)return;
  if(!produtos.length){el.innerHTML='<div style="color:#aaa;text-align:center;padding:24px;font-size:.82rem">Nenhum produto disponivel</div>';return;}
  const cats={};
  produtos.forEach(p=>{const cat=p.categoria||'Outros';if(!cats[cat])cats[cat]=[];cats[cat].push(p);});
  el.innerHTML=Object.entries(cats).map(([cat,items])=>
    `<span class="cat-lbl">${cat}</span>` +
    items.map(p=>{
      const nm=p.nome.replace(/"/g,'&quot;');
      const em=p.emoji||'🍽️';
      return `<div class="prod-item" onclick="gcAdd('${p.id}','${p.nome.replace(/'/g,"\'")}',${p.preco},'${em}')">
        <span class="prod-emoji">${em}</span>
        <span class="prod-nome">${p.nome}</span>
        <span class="prod-preco">R$ ${Number(p.preco).toFixed(2).replace('.',',')}</span>
      </div>`;
    }).join('')
  ).join('');
}

window.gcBuscar=function(termo){
  const t=(termo||'').toLowerCase().trim();
  const items=document.querySelectorAll('#gc-cardapio .prod-item');
  const labels=document.querySelectorAll('#gc-cardapio .cat-lbl');
  items.forEach(el=>{
    const txt=el.querySelector('.prod-nome')?.textContent?.toLowerCase()||'';
    el.style.display=(!t||txt.includes(t))?'':'none';
  });
  // Esconde categoria se todos os itens estão ocultos
  labels.forEach(lbl=>{
    let next=lbl.nextElementSibling;let algumVisivel=false;
    while(next&&next.classList.contains('prod-item')){if(next.style.display!=='none')algumVisivel=true;next=next.nextElementSibling;}
    lbl.style.display=algumVisivel?'':'none';
  });
};

window.gcAdd=function(id,nome,preco,emoji){
  if(!mesaAtual)return;if(!carrinhos[mesaAtual])carrinhos[mesaAtual]=[];
  const ex=carrinhos[mesaAtual].find(x=>x.id===id);
  if(ex)ex.qtd++;else carrinhos[mesaAtual].push({id,nome,preco:Number(preco),emoji,qtd:1});
  renderCarrinho();
};
window.gcRm=function(id){
  if(!mesaAtual||!carrinhos[mesaAtual])return;
  const ex=carrinhos[mesaAtual].find(x=>x.id===id);if(!ex)return;
  if(ex.qtd>1)ex.qtd--;else carrinhos[mesaAtual]=carrinhos[mesaAtual].filter(x=>x.id!==id);
  renderCarrinho();
};

function renderCarrinho(){
  const carr=carrinhos[mesaAtual]||[];const tot=carr.reduce((s,i)=>s+i.preco*i.qtd,0);
  const el=$('gc-carr'),btn=$('gc-btn-env');
  if($('gc-carr-sub'))$('gc-carr-sub').textContent=fmtR(tot);
  if(btn)btn.disabled=!carr.length;if(!el)return;
  if(!carr.length){el.innerHTML='<div class="carr-empty">Nenhum item</div>';return;}
  el.innerHTML=carr.map(i=>{
    const em=i.emoji||'🍽️';
    const nm=i.nome.replace(/'/g,"\'");
    return `<div class="carr-row">
      <span class="carr-emoji">${em}</span>
      <span class="carr-nome">${i.nome}</span>
      <div class="carr-ctrl">
        <button class="carr-btn" onclick="gcRm('${i.id}')">&#8722;</button>
        <span class="carr-qtd">${i.qtd}</span>
        <button class="carr-btn plus" onclick="gcAdd('${i.id}','${nm}',${i.preco},'${em}')">+</button>
      </div>
      <span class="carr-sub">${fmtR(i.preco*i.qtd)}</span>
    </div>`;
  }).join('');
}

window.gcEnviar=async function(){
  if(!mesaAtual)return;const carr=carrinhos[mesaAtual]||[];if(!carr.length)return;
  const btn=$('gc-btn-env');if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  try{
    const nome=nomes[mesaAtual]||mesaAtual;const total=carr.reduce((s,i)=>s+i.preco*i.qtd,0);
    const{error}=await db.from('pedidos').insert({estabelecimento_id:estab.id,cliente_nome:nome,cliente_whats:'',endereco:'No local — '+mesaAtual,itens:carr.map(i=>({nome:i.nome,preco:i.preco,qtd:i.qtd,emoji:i.emoji})),total,status:'novo',pagamento:'No local'});
    if(error)throw error;
    carrinhos[mesaAtual]=[];renderCarrinho();
    // Limpa nome para próxima pessoa na mesa
    const nomeEl=$('gc-nome');if(nomeEl)nomeEl.value='';nomes[mesaAtual]='';
    toast('Pedido de '+nome+' enviado! 🍳');
    await loadPedidos();renderMesas();renderHistorico();atualizarTotalMesa();
  }catch(e){toast('Erro: '+e.message,'#ef4444');}
  finally{if(btn){btn.disabled=false;btn.textContent='Enviar para cozinha 🍳';}}
};

window.gcFecharComanda=async function(){
  if(!mesaAtual)return;
  const peds=pedMesas[mesaAtual]||[];const carr=carrinhos[mesaAtual]||[];
  const total=peds.reduce((s,p)=>s+Number(p.total||0),0);
  if(carr.length&&!confirm('Ha itens nao enviados. Fechar mesmo assim?'))return;
  if(!confirm('Fechar comanda da '+mesaAtual+'?\n\nTotal: '+fmtR(total)+'\nPedidos: '+peds.length+'\n\nA mesa sera liberada.'))return;
  if(peds.length)await db.from('pedidos').update({status:'pronto'}).in('id',peds.map(p=>p.id));
  delete pedMesas[mesaAtual];delete carrinhos[mesaAtual];fechadas.add(mesaAtual);
  const mf=mesaAtual;setTimeout(()=>{fechadas.delete(mf);renderMesas();},5000);
  toast('Comanda da '+mesaAtual+' fechada! '+fmtR(total));gcFechar();renderMesas();
};

function renderHistorico(){
  atualizarTotalMesa();const el=$('gc-historico');if(!el)return;
  const peds=pedMesas[mesaAtual]||[];
  const stC={novo:'s-novo',preparo:'s-preparo',pronto:'s-pronto'};
  const stL={novo:'⏳ Aguardando',preparo:'🍳 Preparando',pronto:'✅ Pronto'};
  if(!peds.length){el.innerHTML='<div style="color:#aaa;font-size:.8rem;text-align:center;padding:24px">Nenhum pedido lancado</div>';return;}

  // Agrupa pedidos pelo nome do cliente
  const grupos={};
  peds.forEach(p=>{
    const nm=p.cliente_nome||'Cliente';
    if(!grupos[nm])grupos[nm]=[];
    grupos[nm].push(p);
  });

  el.innerHTML=Object.entries(grupos).map(([nome,gpeds])=>{
    const subtotal=gpeds.reduce((s,p)=>s+Number(p.total||0),0);
    const itensHtml=gpeds.map(p=>{
      const itens=Array.isArray(p.itens)?p.itens:[];
      const dt=new Date(p.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return '<div style="margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed #f0e9e0">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
        +'<span style="font-size:.65rem;color:#aaa">'+dt+'</span>'
        +'<span class="'+(stC[p.status]||'')+'" style="font-size:.65rem">'+(stL[p.status]||p.status)+'</span>'
        +'</div>'
        +itens.map(it=>'<div class="hist-item-row"><span>'+(it.qtd||1)+'x '+it.nome+'</span><span>R$ '+((it.preco||0)*(it.qtd||1)).toFixed(2).replace('.',',')+'</span></div>').join('')
        +'</div>';
    }).join('');
    return '<div class="hist-bloco">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;gap:7px">'
      +'<div style="width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0">'+nome.charAt(0).toUpperCase()+'</div>'
      +'<span style="font-size:.9rem;font-weight:800">'+nome+'</span>'
      +'</div>'
      +'<span style="font-size:.82rem;font-weight:800;color:var(--red)">'+fmtR(subtotal)+'</span>'
      +'</div>'
      +itensHtml
      +'</div>';
  }).join('');
}

function atualizarTotalMesa(){
  const peds=pedMesas[mesaAtual]||[];const el=$('gc-modal-total');
  if(el)el.textContent=fmtR(peds.reduce((s,p)=>s+Number(p.total||0),0));
}

window.gcImprimir=function(){
  if(!mesaAtual)return;
  const peds=pedMesas[mesaAtual]||[];const total=peds.reduce((s,p)=>s+Number(p.total||0),0);
  const agora=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  // Agrupa por nome
  const grupos={};
  peds.forEach(p=>{const nm=p.cliente_nome||'Cliente';if(!grupos[nm])grupos[nm]=[];grupos[nm].push(p);});
  const rows=Object.entries(grupos).map(([nome,gpeds])=>{
    const sub=gpeds.reduce((s,p)=>s+Number(p.total||0),0);
    return '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1.5px solid #ddd">'
      +'<div style="font-size:12px;font-weight:800;margin-bottom:5px">'+nome+'</div>'
      +gpeds.map(p=>{const itens=Array.isArray(p.itens)?p.itens:[];const dt=new Date(p.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});return '<div style="font-size:10px;color:#888;margin-bottom:2px">'+dt+'</div>'+itens.map(it=>'<div style="display:flex;justify-content:space-between;font-size:11px;padding:1px 0"><span>'+(it.qtd||1)+'x '+it.nome+'</span><span>R$ '+((it.preco||0)*(it.qtd||1)).toFixed(2).replace('.',',')+'</span></div>').join('');}).join('<div style="height:4px"></div>')
      +'<div style="text-align:right;font-size:11px;color:#C0392B;font-weight:700;margin-top:4px">'+fmtR(sub)+'</div>'
      +'</div>';
  }).join('');
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Comanda</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:12px;padding:16px;max-width:300px;margin:0 auto}.logo{font-size:16px;font-weight:900;text-align:center;margin-bottom:4px}.logo span{color:#C0392B}hr{border:none;border-top:1px dashed #ddd;margin:8px 0}.total{display:flex;justify-content:space-between;font-size:14px;font-weight:800;margin-top:8px;border-top:2px solid #1a1a1a;padding-top:8px}@media print{body{padding:0}}</style></head><body><div class="logo">PEDI<span>WAY</span></div><div style="text-align:center;font-size:11px;color:#888;margin-bottom:6px">'+(estab?.nome||'')+'</div><hr><div style="font-size:14px;font-weight:800;text-align:center;margin:6px 0">'+mesaAtual+'</div><div style="font-size:9px;text-align:center;color:#aaa;margin-bottom:8px">'+agora+'</div><hr>'+rows+'<div class="total"><span>TOTAL</span><span style="color:#C0392B">'+fmtR(total)+'</span></div><div style="text-align:center;font-size:9px;color:#aaa;margin-top:12px">PEDIWAY</div></body></html>';
  const w=window.open('','_blank','width=320,height=600');if(!w){alert('Permita pop-ups para imprimir.');return;}
  w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);
};

function toast(msg,cor='#22c55e'){const t=$('gc-toast');t.textContent=msg;t.style.background=cor;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

init();
</script>
</body>
